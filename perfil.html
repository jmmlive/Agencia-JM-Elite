<title>Perfil Elite</title>


<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif
}

:root{
  --gold:#f7d774;
  --gold2:#e1af34;
  --blue:#00a2ff;
  --blue2:#005cff;
  --deep:#020713;
  --soft:#dce8ff;
}

body{
  background:#020713;
  color:white;
  min-height:100vh;
  padding-bottom:82px;
  overflow-x:hidden
}

a{
  text-decoration:none;
  color:inherit
}

button{
  border:0;
  cursor:pointer
}

.profile{
  min-height:100vh;
  position:relative;
  background:
    radial-gradient(
      circle at 15% 8%,
      rgba(0,126,255,.28),
      transparent 28%
    ),
    radial-gradient(
      circle at 90% 30%,
      rgba(0,80,220,.18),
      transparent 30%
    ),
    radial-gradient(
      circle at 50% 72%,
      rgba(0,50,140,.12),
      transparent 35%
    ),
    linear-gradient(
      180deg,
      #04132c 0%,
      #020713 52%,
      #01040c 100%
    )
}

.profile::before{
  content:"";
  position:fixed;
  width:220px;
  height:220px;
  border-radius:50%;
  background:rgba(0,162,255,.08);
  filter:blur(55px);
  top:180px;
  left:-90px;
  pointer-events:none
}

.profile::after{
  content:"";
  position:fixed;
  width:240px;
  height:240px;
  border-radius:50%;
  background:rgba(247,215,116,.05);
  filter:blur(65px);
  right:-110px;
  bottom:180px;
  pointer-events:none
}


/* CABECERA LIMPIA */

.header{
  position:relative;
  height:292px;
  margin-bottom:18px
}

.cover{
  position:relative;
  height:232px;
  background:
    linear-gradient(
      135deg,
      #061326,
      #003a8f,
      #020713
    );
  overflow:hidden;
  border-radius:0 0 34px 34px;
  box-shadow:
    0 22px 48px rgba(0,0,0,.48)
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      180deg,
      rgba(0,0,0,.02),
      rgba(2,7,19,.18) 55%,
      rgba(2,7,19,.82)
    );
  pointer-events:none
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:
    brightness(.84)
    saturate(1.12)
}

.coverFallback{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:44px;
  color:rgba(255,255,255,.3)
}


/* AVATAR */

.avatar{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:108px;
  height:108px;
  border-radius:50%;
  border:3px solid var(--gold);
  background:#07162c;
  overflow:hidden;
  box-shadow:
    0 0 0 7px rgba(2,7,19,.9),
    0 0 35px rgba(0,162,255,.62),
    0 16px 35px rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover
}

.avatarFallback{
  font-size:50px;
  display:none
}


/* IDENTIDAD */

.identity{
  text-align:center;
  padding:0 18px
}

.identity h1{
  font-size:28px;
  color:var(--gold);
  margin-bottom:5px;
  font-weight:800;
  letter-spacing:.15px;
  text-shadow:
    0 3px 18px
    rgba(247,215,116,.12)
}

.identity p{
  color:rgba(255,255,255,.88);
  font-size:14px;
  margin-bottom:17px
}


/* INSIGNIAS */

.badges{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:0 15px;
  margin-bottom:22px
}

.badges span{
  min-height:39px;
  border-radius:999px;
  background:
    linear-gradient(
      145deg,
      rgba(0,99,210,.34),
      rgba(0,39,100,.36)
    );
  backdrop-filter:blur(15px);
  border:
    1px solid
    rgba(0,183,255,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  text-align:center;
  padding:6px 5px;
  color:rgba(255,255,255,.92);
  box-shadow:
    inset 0 1px 0
    rgba(255,255,255,.09),
    0 10px 24px
    rgba(0,0,0,.2)
}


/* ESTADISTICAS */

.stats{
  display:grid;
  grid-template-columns:
    repeat(4,minmax(0,1fr));
  gap:8px;
  padding:0 14px;
  margin-bottom:22px
}

.stat{
  min-width:0;
  min-height:80px;
  border-radius:21px;
  background:
    linear-gradient(
      145deg,
      rgba(0,76,170,.36),
      rgba(3,15,45,.8)
    );
  backdrop-filter:blur(16px);
  border:
    1px solid
    rgba(0,183,255,.24);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:9px 5px;
  box-shadow:
    inset 0 1px 0
    rgba(255,255,255,.07),
    0 14px 30px
    rgba(0,0,0,.28)
}

.stat b{
  color:var(--gold);
  font-size:17px;
  line-height:1.05;
  width:100%;
  padding:0 2px;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap
}

.stat span{
  font-size:10px;
  color:rgba(220,232,255,.82);
  margin-top:6px;
  text-align:center;
  line-height:1.15
}


/* BOTONES */

.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
  padding:0 16px;
  margin-bottom:22px
}

.actions button{
  min-height:50px;
  border-radius:17px;
  font-weight:900;
  font-size:13px;
  padding:8px 5px;
  box-shadow:
    0 12px 28px
    rgba(0,0,0,.26);
  transition:
    transform .2s ease,
    opacity .2s ease
}

.actions button:active{
  transform:scale(.96)
}

.actions button:disabled{
  opacity:.52;
  cursor:not-allowed
}

.blue{
  background:
    linear-gradient(
      135deg,
      #00a2ff,
      #0048ff
    );
  color:white
}

.gold{
  background:
    linear-gradient(
      135deg,
      #dba92d,
      #ffd767
    );
  color:#061326
}

.dark{
  background:rgba(7,22,44,.7);
  backdrop-filter:blur(14px);
  color:white;
  border:
    1px solid
    rgba(0,183,255,.32)
}


/* INFORMACION */

.card{
  margin:0 16px 20px;
  background:
    linear-gradient(
      145deg,
      rgba(0,42,100,.38),
      rgba(0,13,40,.75)
    );
  backdrop-filter:blur(17px);
  border:
    1px solid
    rgba(247,215,116,.2);
  border-radius:25px;
  padding:18px;
  box-shadow:
    inset 0 1px 0
    rgba(255,255,255,.06),
    0 18px 40px
    rgba(0,0,0,.34)
}

.card h3{
  color:var(--gold);
  font-size:19px;
  margin-bottom:11px;
  font-weight:800
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 0;
  border-bottom:
    1px solid
    rgba(255,255,255,.065);
  font-size:13px
}

.row:last-child{
  border-bottom:0
}

.row span{
  color:rgba(220,232,255,.76)
}

.row b{
  text-align:right;
  font-size:13px;
  max-width:64%;
  word-break:break-word;
  color:rgba(255,255,255,.96)
}


/* AVISOS */

.profileNotice{
  margin:0 16px 18px;
  padding:12px 14px;
  border-radius:17px;
  background:rgba(0,75,180,.18);
  border:
    1px solid
    rgba(0,162,255,.25);
  color:var(--soft);
  font-size:12px;
  line-height:1.45;
  text-align:center
}


/* CARGA */

.loading{
  text-align:center;
  padding:40px;
  color:var(--soft)
}


/* NAVEGACION */

.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:74px;
  background:rgba(2,7,19,.92);
  backdrop-filter:blur(18px);
  border-top:
    1px solid
    rgba(247,215,116,.16);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
  box-shadow:
    0 -12px 30px
    rgba(0,0,0,.28)
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:10px;
  gap:3px;
  color:rgba(255,255,255,.74)

.nav-item .icon{
  font-size:23px

.nav-item.active{
  color:var(--gold)

@media(max-width:350px){

  }

  .badges{
    gap:6px;
    padding:0 10px
  }

</style>

<script>

const AGENT_EMAILS=[

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();


const params=
  new URLSearchParams(
    window.location.search
  );


const perfilSolicitado=
  params.get("id");


const myEmail=(
  localStorage.getItem("jm_email") || ""
).toLowerCase();


const roleLocal=(
  localStorage.getItem("jm_role") || ""
).toLowerCase();


const content=
  document.getElementById(
    "profileContent"
  );


let perfilActualId="";

let miPerfilId="";

let esMiPerfilActual=false;

let siguiendoActual=false;


function esAgente(email){

  return AGENT_EMAILS.includes(
    (email || "").toLowerCase()
  );
}


function valor(
  dato,
  defecto="—"
){

  return dato &&
    String(dato).trim() !== ""
    ? dato
    : defecto;
}


function calcularDias(
  fechaInicio
){

  if(!fechaInicio){
    return "—";
  }


  const partes=
    fechaInicio.split("/");


  if(partes.length !== 3){
    return "—";
  }


  const inicio=
    new Date(
      Number(partes[2]),
      Number(partes[1])-1,
      Number(partes[0])
    );


  if(isNaN(inicio.getTime())){
    return "—";
  }


  const hoy=new Date();


  inicio.setHours(
    0,0,0,0
  );


  hoy.setHours(
    0,0,0,0
  );


  return Math.max(
    0,
    Math.floor(
      (hoy-inicio) /
      (1000*60*60*24)
    )
  );
}


function mostrarImagenes(u){

  const avatarFallback=

    );


  const coverImg=

    );


  const coverFallback=
    document.getElementById(
      "coverFallback"
    );


  const fotoPerfil=
    u.fotoPerfil ||
    u.photoURL ||
    "";


  const fotoPortada=
    u.fotoPortada ||
    u.coverURL ||
    "";


  if(fotoPerfil){

    avatarImg.src=fotoPerfil;

    avatarImg.style.display=
      "block";


    avatarFallback.style.display=
      "none";


  }else{

    avatarImg.style.display=
      "none";


    avatarFallback.style.display=
      "block";
  }


  avatarImg.onerror=function(){

    avatarImg.style.display=
      "none";


    avatarFallback.style.display=
      "block";
  };


  if(fotoPortada){

    coverImg.src=fotoPortada;

    coverImg.style.display=
      "block";


    coverFallback.style.display=
      "none";


  }else{

    coverImg.style.display=
      "none";


    coverFallback.style.display=
      "flex";
  }


  coverImg.onerror=function(){

    coverImg.style.display=
      "none";


    coverFallback.style.display=
      "flex";
  };
}


function puedeEditarPerfil(
  perfilEmail,
  esMiPerfil
){

  if(esMiPerfil){
    return true;
  }


  if(esAgente(myEmail)){
    return true;
  }


  if(
    roleLocal === "administrador" ||
    roleLocal === "agente"
  ){

    return true;
  }


  return false;
}


async function comprobarSeguimiento(){

  siguiendoActual=false;


  if(
    !miPerfilId ||
    !perfilActualId ||
    miPerfilId === perfilActualId
  ){

    return;
  }


  const idSeguimiento=
    miPerfilId+
    "_"+
    perfilActualId;


  const snap=
    await db
    .collection("seguimientos")
    .doc(idSeguimiento)
    .get();


  siguiendoActual=
    snap.exists;
}


window.cambiarSeguimiento=
async function(){

  if(
    !miPerfilId ||
    !perfilActualId
  ){

    alert(
      "No se pudo identificar el perfil."
    );

    return;
  }


  if(
    miPerfilId === perfilActualId
  ){

    return;
  }


  const idSeguimiento=
    miPerfilId+
    "_"+
    perfilActualId;


  const ref=
    db
    .collection("seguimientos")
    .doc(idSeguimiento);


  try{

    if(siguiendoActual){

      await ref.delete();

      siguiendoActual=false;


    }else{

      await ref.set({

        seguidorId:
          miPerfilId,

        seguidoId:
          perfilActualId,

        fecha:
          firebase.firestore
          .FieldValue
          .serverTimestamp()

      });


      siguiendoActual=true;
    }


    const boton=
      document.getElementById(
        "followBtn"
      );


    if(boton){

      boton.innerHTML=
        siguiendoActual
        ? "✓ Siguiendo"
        : "➕ Seguir";


      boton.className=
        siguiendoActual
        ? "gold"
        : "dark";
    }


    const mensajeBtn=
      document.getElementById(
        "messageBtn"
      );


    if(mensajeBtn){

      mensajeBtn.disabled=
        !siguiendoActual;
    }


  }catch(error){

    alert(
      "Error al cambiar seguimiento: "+
      error.message
    );
  }
};


window.abrirMensajePrivado=
async function(){

  if(esMiPerfilActual){

    alert(
      "Este es tu propio perfil."
    );

    return;
  }


  if(!siguiendoActual){

    alert(
      "Debes seguir a esta persona antes de enviarle un mensaje."
    );

    return;
  }


  if(
    !miPerfilId ||
    !perfilActualId
  ){

    alert(
      "No se pudo abrir el chat."
    );

    return;
  }


  const participantes=[
    miPerfilId,
    perfilActualId
  ].sort();


  const chatId=
    participantes.join("_");


  try{

    await db
    .collection("chats_privados")
    .doc(chatId)
    .set({

      participantes:
        participantes,

      actualizado:
        firebase.firestore
        .FieldValue
        .serverTimestamp()

    },{
      merge:true
    });


    location.href=
      "chat.html?privado="+
      encodeURIComponent(chatId)+
      "&usuario="+
      encodeURIComponent(perfilActualId);


  }catch(error){

    alert(
      "Error al abrir el chat: "+
      error.message
    );
  }
};


window.editarPerfilActual=
function(){

};

  u,
  idDocumento,
  esMiPerfil=false
){

  perfilActualId=

  esMiPerfilActual=
    esMiPerfil;


  mostrarImagenes(u);


  const emailPerfil=(
    u.email ||
    u.correo ||
    ""
  ).toLowerCase();


  const nombre=
    valor(

      u.nombreArtistico ||
      u.artisticName,

    );


  const pais=
    valor(
      u.pais ||
      u.country,

    );


  const poppoId=

  const edad=

    );


  const genero=
    valor(

    );

    );


  const coins=

      u.diamantes ||
      u.coins ||
      u.diamonds,

    );


  const dias=
    calcularDias(

  let botones="";

        disabled>
        👤 Mi perfil
      </button>

  }else{

    botones=`

      <button
        id="messageBtn"
        class="blue"
        onclick="abrirMensajePrivado()"
        ${siguiendoActual ? "" : "disabled"}>
        💬 Mensaje
      </button>


      ${
        puedeEditarPerfil(
          emailPerfil,
          esMiPerfil
        )

        `
        <button
          class="gold"
          onclick="editarPerfilActual()">
          ✏️ Editar
        </button>
        `
        :
        `
        <button
          class="dark"
          disabled>
          🔒 Perfil
        </button>
        `
      }


      <button
        id="followBtn"
        class="${
          siguiendoActual
          ? "gold"
          : "dark"
        }"
        onclick="cambiarSeguimiento()">

        ${
          siguiendoActual
          ? "✓ Siguiendo"
          : "➕ Seguir"
        }

      </button>

    `;
  }


  content.innerHTML=`

    <section class="identity">

      <h1>${nombre}</h1>

      <p>
        👑 ${rol} · Agencia JM Elite
      </p>


      <div class="badges">

        <span>
          🟣 Nivel ${nivel}
        </span>

        <span>
          🆔 ${poppoId}
        </span>

        <span>
          🌍 ${pais}
        </span>

        <span>
          ♂ ${genero}
        </span>

        <span>
          🎂 ${edad}
        </span>

        <span>
          ✅ Activa
        </span>

      </div>

    </section>


    <section class="stats">

      <div class="stat">

        <b>${seguidores}</b>

        <span>
          Seguidores

    ${

      <div class="profileNotice">

        🔒 Sigue a esta persona para poder
        iniciar un chat privado.

      </div>
      `

      ""
    }


    <section class="card">

  `;
}async function buscarMiPerfil(){

  if(!myEmail){
    return null;
  }

  const snap=
    await db
    .collection("usuarios")
    .where("email","==",myEmail)
    .limit(1)
    .get();

  if(snap.empty){
    return null;
  }

  return snap.docs[0];
}


async function crearPerfilFundadorSiFalta(){

  if(!esAgente(myEmail)){
    return null;
  }


  const idFundador=
    "fundador_elpepolan35";


  const ref=
    db
    .collection("usuarios")
    .doc(idFundador);


  const snap=
    await ref.get();


  if(!snap.exists){

    await ref.set({

      email:myEmail,

      nombre:"Jesús Melián",

      nombreArtistico:"Jesús Melián",

      artisticName:"Jesús Melián",

      pais:"España",

      country:"España",

      poppoId:"19758906",

      fechaInicioPoppo:"12/03/2024",

      nivel:"45",

      level:"45",

      role:"agente",

      edad:"49",

      genero:"Hombre",

      seguidores:"1981",

      diamantes:"272M",

      status:"activa"

    },{
      merge:true
    });
  }


  return await ref.get();
}


async function cargarPerfil(){

  if(
    localStorage.getItem("jm_logged")
    !==
    "yes"
  ){

    location.replace("index.html");

    return;
  }


  try{

    const miPerfil=
      await buscarMiPerfil()
      ||
      await crearPerfilFundadorSiFalta();


    if(miPerfil){

      miPerfilId=
        miPerfil.id;
    }


    if(perfilSolicitado){

      const docPerfil=
        await db
        .collection("usuarios")
        .doc(perfilSolicitado)
        .get();


      if(!docPerfil.exists){

        content.innerHTML=
          '<div class="loading">No se encontró este perfil.</div>';

        return;
      }


      const datos=
        docPerfil.data();


      const emailPerfil=(
        datos.email ||
        datos.correo ||
        ""
      ).toLowerCase();


      const esMio=
        emailPerfil === myEmail;


      perfilActualId=
        docPerfil.id;


      esMiPerfilActual=
        esMio;


      await comprobarSeguimiento();


      pintarPerfil(
        datos,
        docPerfil.id,
        esMio
      );


      return;
    }


    if(miPerfil){

      perfilActualId=
        miPerfil.id;


      esMiPerfilActual=
        true;


      siguiendoActual=
        false;


      pintarPerfil(
        miPerfil.data(),
        miPerfil.id,
        true
      );


      return;
    }


    content.innerHTML=
      '<div class="loading">No se encontró tu perfil.</div>';


  }catch(error){

    console.error(error);


    content.innerHTML=
      '<div class="loading">Error cargando perfil: '+
      error.message+
      '</div>';
  }
}


cargarPerfil();

</script>
