<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --blue:#007bff;
  --dark:#020713;
  --soft:#dce8ff;
}

body{
  background:#020713;
  color:white;
  min-height:100vh;
  padding-bottom:92px;
}

button{
  border:0;
  cursor:pointer;
}

/* PANTALLA */
.profile{
  width:100%;
  min-height:100vh;
  background:
    radial-gradient(circle at top,#064fae 0%,#031b45 42%,#020713 100%);
  overflow:hidden;
}

/* CABECERA */
.header{
  position:relative;
  width:100%;
  height:330px;
}

.cover{
  width:100%;
  height:100%;
  overflow:hidden;
  position:relative;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.05) 0%,
    rgba(1,24,58,.20) 45%,
    rgba(0,88,210,.92) 100%
  );
}

.menu-profile{
  position:absolute;
  top:18px;
  right:18px;
  width:56px;
  height:56px;
  border-radius:19px;
  background:rgba(0,15,40,.45);
  border:1px solid rgba(247,215,116,.35);
  color:white;
  font-size:28px;
  z-index:20;
}

/* FOTO MEDIA LUNA */
.avatar{
  position:absolute;
  left:50%;
  bottom:-68px;
  transform:translateX(-50%);
  width:136px;
  height:136px;
  border-radius:50%;
  overflow:hidden;
  border:5px solid var(--gold);
  background:#061326;
  box-shadow:0 0 30px rgba(0,170,255,.9);
  z-index:30;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* IDENTIDAD */
.identity{
  text-align:center;
  padding:82px 14px 0;
}

.identity h1{
  font-size:34px;
  color:var(--gold);
  margin-bottom:6px;
  font-weight:800;
}

.identity p{
  font-size:18px;
  color:white;
  margin-bottom:16px;
}

/* INSIGNIAS */
.badges{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:0 18px;
  margin-bottom:18px;
}

.badges span{
  min-height:42px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(247,215,116,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  color:white;
  white-space:nowrap;
}

/* ESTADÍSTICAS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:0 14px;
  margin-bottom:18px;
}

.stat{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(247,215,116,.22);
  border-radius:18px;
  text-align:center;
  padding:14px 4px;
}

.stat b{
  display:block;
  font-size:26px;
  color:var(--gold);
  margin-bottom:5px;
}

.stat span{
  font-size:12px;
  color:var(--soft);
}

/* SEIS BOTONES */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:0 14px;
  margin-bottom:20px;
}

.actions button{
  height:58px;
  border-radius:17px;
  font-size:13px;
  font-weight:bold;
}

.action-blue{
  background:linear-gradient(135deg,#007bff,#00b7ff);
  color:white;
}

.action-gold{
  background:linear-gradient(135deg,#d5a927,#ffcf55);
  color:#061326;
}

.action-dark{
  background:rgba(255,255,255,.06);
  color:white;
  border:1px solid rgba(247,215,116,.25);
}

/* INFO */
.card{
  margin:0 14px 18px;
  background:rgba(0,18,45,.65);
  border:1px solid rgba(247,215,116,.22);
  border-radius:20px;
  padding:16px;
}

.card h3{
  color:var(--gold);
  font-size:19px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.row:last-child{
  border-bottom:none;
}

.row span{
  color:var(--soft);
}

.row b{
  color:white;
}

/* MENÚ INFERIOR */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:86px;
  background:rgba(0,18,45,.97);
  border-top:1px solid rgba(247,215,116,.22);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
}

.nav-item{
  background:transparent;
  color:white;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}

.nav-item .icon{
  font-size:27px;
}

.nav-item.active{
  color:var(--gold);
}

@media(max-width:390px){
  .header{
    height:310px;
  }

  .avatar{
    width:126px;
    height:126px;
    bottom:-63px;
  }

  .identity{
    padding-top:76px;
  }

  .identity h1{
    font-size:30px;
  }

  .identity p{
    font-size:16px;
  }

  .badges{
    gap:8px;
    padding:0 14px;
  }

  .badges span{
    font-size:12px;
    min-height:38px;
  }

  .stat b{
    font-size:23px;
  }

  .actions button{
    height:54px;
    font-size:12px;
  }
}
</style>
</head>

<body>

<main class="profile">

  <section class="header">

    <div class="cover">
      <img src="file_00000000b87071f4b2cf26f846b51b6e.png" alt="Portada">
    </div>

    <button class="menu-profile">⋮</button>

    <div class="avatar">
      <img src="file_00000000f71471f499e5839986bab33b.png" alt="Foto de perfil">
    </div>

  </section>

  <section class="identity">

    <h1>Jesús Melián</h1>
    <p>👑 Fundador · Agencia JM Elite</p>

    <div class="badges">
      <span>🟣 Nivel 45</span>
      <span>💎 VIP 3</span>
      <span>🆔 19758906</span>
      <span>🏅 Star 7</span>
      <span>♂ Hombre</span>
      <span>🎂 49 años</span>
    </div>

  </section>

  <section class="stats">

    <div class="stat">
      <b>1981</b>
      <span>Seguidores</span>
    </div>

    <div class="stat">
      <b>34</b>
      <span>Emisoras</span>
    </div>

    <div class="stat">
      <b>125K</b>
      <span>Diamantes</span>
    </div>

    <div class="stat">
      <b>845</b>
      <span>Días</span>
    </div>

  </section>

  <section class="actions">

    <button class="action-blue">💬 Mensaje</button>
    <button class="action-gold">✏️ Editar</button>
    <button class="action-dark">➕ Añadir</button>
    <button class="action-dark">🔗 Compartir</button>
    <button class="action-dark">🔑 Copiar ID</button>
    <button class="action-dark">🗑️ Papelera</button>

  </section>

  <section class="card">

    <h3>Información</h3>

    <div class="row">
      <span>ID Poppo</span>
      <b>19758906</b>
    </div>

    <div class="row">
      <span>País</span>
      <b>España</b>
    </div>

    <div class="row">
      <span>Rol</span>
      <b>Fundador</b>
    </div>

  </section>

</main>

<nav class="bottom-nav">

  <button class="nav-item">
    <span class="icon">🏠</span>
    <span>Inicio</span>
  </button>

  <button class="nav-item">
    <span class="icon">🎙️</span>
    <span>Sala</span>
  </button>

  <button class="nav-item active">
    <span class="icon">👤</span>
    <span>Perfil</span>
  </button>

  <button class="nav-item">
    <span class="icon">💬</span>
    <span>Chat</span>
  </button>

  <button class="nav-item">
    <span class="icon">☰</span>
    <span>Más</span>
  </button>

</nav>

</body>
      </html>
