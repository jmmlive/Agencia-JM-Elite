<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

:root{
--blue:#008cff;
--gold:#f7d774;
--soft:#d9e5ff;
--dark:#020713;
}

body{
background:#020713;
color:white;
min-height:100vh;
padding-bottom:90px;
overflow:visible;
}

button{
cursor:pointer;
border:0;
}

.profile{
padding:0;
}

.cover{
position:relative;
width:100%;
height:300px;
overflow:hidden;
background:#061326;
}

.cover>img{
width:100%;
height:100%;
object-fit:contain;
object-position:center center;
display:block;
}

.cover:after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,.05) 25%,rgba(2,7,19,.94) 100%);
}

.menu-profile{
position:absolute;
top:16px;
right:16px;
z-index:10;
width:56px;
height:56px;
border-radius:20px;
background:rgba(0,15,40,.55);
border:1px solid rgba(247,215,116,.45);
color:white;
font-size:34px;
backdrop-filter:blur(10px);
box-shadow:0 0 22px rgba(0,140,255,.45);
}
  .avatar{
position:relative;
width:130px;
height:130px;
margin:-145px auto 22px;
border-radius:50%;
overflow:hidden;
border:4px solid var(--gold);
background:#061326;
box-shadow:0 0 25px rgba(0,170,255,.8);
z-index:999;
  }


.avatar img{
width:100%;
height:100%;
object-fit:cover;
}


.identity{
margin-top:42px;
text-align:center;
padding:0 16px;
position:relative;
z-index:999;
}

.identity h2{
font-size:30px;
color:var(--gold);
margin-bottom:6px;
font-weight:700;
}

.identity p{
font-size:16px;
color:var(--soft);
margin-bottom:12px;
}

.badges{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-bottom:20px;
}

.badges span{
padding:7px 12px;
border-radius:999px;
background:rgba(255,255,255,.08);
border:1px solid rgba(247,215,116,.25);
font-size:12px;
color:white;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:0 14px;
margin:20px 0;
}
  .stat{
text-align:center;
padding:14px 6px;
background:rgba(255,255,255,.05);
border-radius:18px;
border:1px solid rgba(247,215,116,.18);
}

.stat b{
display:block;
font-size:22px;
color:var(--gold);
margin-bottom:4px;
}

.stat span{
font-size:12px;
color:var(--soft);
}

.actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:0 14px;
margin:22px 0;
}

.action-blue,
.action-gold,
.action-dark{
padding:15px 10px;
border-radius:18px;
font-size:14px;
font-weight:bold;
}

.action-blue{
background:linear-gradient(90deg,#006cff,#00aaff);
color:white;
}

.action-gold{
background:linear-gradient(90deg,#d4af37,#ffcc55);
color:#061326;
}

.action-dark{
background:rgba(255,255,255,.08);
color:white;
border:1px solid rgba(247,215,116,.20);
}

.cards{
display:flex;
flex-direction:column;
gap:18px;
padding:0 14px;
}

.card{
background:rgba(8,24,55,.82);
border:1px solid rgba(247,215,116,.25);
border-radius:22px;
padding:18px;
}

.card h3{
color:var(--gold);
font-size:22px;
margin-bottom:14px;
}
  .row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.row:last-child{
border-bottom:none;
}

.row span{
color:var(--soft);
}

.row b{
color:white;
}

.tabs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:0 14px;
margin:24px 0;
}

.tab{
padding:14px 6px;
border-radius:18px;
background:rgba(255,255,255,.06);
border:1px solid rgba(247,215,116,.20);
color:white;
font-weight:bold;
}

.tab.active{
background:linear-gradient(90deg,#007dff,#00b7ff);
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:0 14px 20px;
}

.post{
aspect-ratio:1;
overflow:hidden;
border-radius:18px;
background:#0d1d3c;
}

.post img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.bottom-space{
height:95px;
}
  </style>
</head>

<body>

<main class="profile">

<section class="cover">

<img src="file_00000000b87071f4b2cf26f846b51b6e.png" alt="Portada">

<button class="menu-profile">⋮</button>



</section>

<section class="identity">
<div class="avatar">
<img
src="file_00000000f71471f499e5839986bab33b.png" alt="Perfil">
</div>
<h2>Jesús Melián</h2>

<p>👑 Fundador · Agencia JM Elite</p>

<div class="badges">
<span>🟣 Nivel 45</span>
<span>💎 VIP 3</span>
<span>🆔 19758906</span>
<span>🏅 Star 7</span>
<span>♂ Hombre</span>
<span>🎂 49 años</span>
</div>

</section>

<section class="stats">

<div class="stat">
<b>1981</b>
<span>Seguidores</span>
</div>

<div class="stat">
<b>34</b>
<span>Emisoras</span>
</div>

<div class="stat">
<b>125K</b>
<span>Diamantes</span>
</div>

<div class="stat">
<b>845</b>
<span>Días</span>
</div>

</section>

<section class="actions">

<button class="action-blue">💬 Mensaje</button>

<button class="action-gold">✏️ Editar</button>

<button class="action-dark">🔗 Compartir</button>

</section>

<section class="cards">

<div class="card">
<h3>Información</h3>

<div class="row">
<span>ID Poppo</span>
<b>19758906</b>
</div>

<div class="row">
<span>País</span>
<b>España</b>
</div>

<div class="row">
<span>Rol</span>
<b>Fundador</b>
</div>

</div>

</section>

<section class="tabs">
<button class="tab active">📷 Fotos</button>
<button class="tab">🎥 Vídeos</button>
<button class="tab">📝 Posts</button>
<button class="tab">🏆 Logros</button>
</section>

<section class="gallery">

<div class="post"><img src="file_00000000b87071f4b2cf26f846b51b6e.png"></div>
<div class="post"><img src="file_00000000f71471f499e5839986bab33b.png"></div>
<div class="post"><img src="file_00000000b87071f4b2cf26f846b51b6e.png"></div>

</section>

<div class="bottom-space"></div>

</main>

</body>
</html>
