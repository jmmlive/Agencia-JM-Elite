<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --soft:#d9e5ff;
  --blue:#007bff;
  --dark:#020713;
}

body{
  background:linear-gradient(180deg,#00142f 0%,#005fe8 45%,#003ba8 100%);
  color:white;
  min-height:100vh;
  padding-bottom:96px;
}

button{
  border:0;
  cursor:pointer;
}

.profile{
  width:100%;
  overflow:hidden;
}

/* CABECERA */
.hero{
  position:relative;
  width:100%;
  height:365px;
}

.cover{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#061326;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.05) 0%,
    rgba(0,35,95,.30) 55%,
    rgba(0,102,235,.96) 100%
  );
}

.menu-profile{
  position:absolute;
  top:18px;
  right:18px;
  z-index:10;
  width:54px;
  height:54px;
  border-radius:20px;
  background:rgba(0,15,40,.48);
  border:1px solid rgba(247,215,116,.32);
  color:white;
  font-size:28px;
  line-height:1;
  box-shadow:0 0 18px rgba(0,140,255,.28);
}

.avatar{
  position:absolute;
  left:50%;
  bottom:-64px;
  transform:translateX(-50%);
  width:132px;
  height:132px;
  border-radius:50%;
  overflow:hidden;
  border:5px solid var(--gold);
  background:#061326;
  box-shadow:0 0 24px rgba(0,170,255,.85);
  z-index:12;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* IDENTIDAD */
.identity{
  text-align:center;
  padding:74px 14px 0;
}

.identity h1{
  font-size:33px;
  color:var(--gold);
  margin-bottom:6px;
  font-weight:800;
  text-shadow:0 2px 8px rgba(0,0,0,.38);
}

.identity p{
  font-size:19px;
  color:white;
  margin-bottom:14px;
}

/* INSIGNIAS */
.badges{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  padding:0 14px;
  margin-bottom:18px;
}

.badges span{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.22);
  font-size:13px;
  color:white;
}

/* ESTADÍSTICAS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  margin:6px 14px 18px;
  padding:16px 0 14px;
  border-top:1px solid rgba(255,255,255,.18);
  border-bottom:1px solid rgba(255,255,255,.15);
}

.stat{
  text-align:center;
  border-right:1px solid rgba(255,255,255,.12);
}

.stat:last-child{
  border-right:none;
}

.stat b{
  display:block;
  font-size:28px;
  color:white;
  margin-bottom:3px;
}

.stat span{
  font-size:12px;
  color:var(--soft);
}

/* BOTONES */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:0 14px;
  margin-bottom:18px;
}

.actions button{
  min-height:54px;
  border-radius:16px;
  font-size:14px;
  font-weight:bold;
}

.action-blue{
  background:linear-gradient(90deg,#006cff,#00aaff);
  color:white;
}

.action-gold{
  background:linear-gradient(90deg,#d4af37,#ffcc55);
  color:#061326;
}

.action-dark{
  background:rgba(255,255,255,.08);
  color:white;
  border:1px solid rgba(247,215,116,.25);
}

/* INFORMACIÓN */
.card{
  margin:0 14px 18px;
  padding:16px;
  border-radius:20px;
  background:rgba(0,20,55,.46);
  border:1px solid rgba(247,215,116,.22);
}

.card h3{
  color:var(--gold);
  font-size:20px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.09);
}

.row:last-child{
  border-bottom:none;
}

.row span{
  color:var(--soft);
}

.row b{
  color:white;
}

/* MENÚ INFERIOR */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:88px;
  background:rgba(0,18,45,.96);
  border-top:1px solid rgba(247,215,116,.22);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
}

.nav-item{
  background:transparent;
  color:white;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}

.nav-item .icon{
  font-size:27px;
}

.nav-item.active{
  color:var(--gold);
}

@media(max-width:390px){
  .hero{
    height:345px;
  }

  .avatar{
    width:124px;
    height:124px;
    bottom:-60px;
  }

  .identity{
    padding-top:70px;
  }

  .identity h1{
    font-size:30px;
  }

  .identity p{
    font-size:17px;
  }

  .badges span{
    font-size:12px;
    padding:7px 10px;
  }

  .stat b{
    font-size:25px;
  }

  .actions button{
    font-size:13px;
    min-height:50px;
  }
}
</style>
</head>

<body>

<main class="profile">

  <section class="hero">

    <div class="cover">
      <img src="file_00000000b87071f4b2cf26f846b51b6e.png" alt="Portada">
    </div>

    <button class="menu-profile">•••</button>

    <div class="avatar">
      <img src="file_00000000f71471f499e5839986bab33b.png" alt="Foto de perfil">
    </div>

  </section>

  <section class="identity">

    <h1>Jesús Melián</h1>
    <p>👑 Fundador · Agencia JM Tenerife</p>

    <div class="badges">
      <span>💙 Fan azul</span>
      <span>⭐ Insignia Star</span>
      <span>★ Agencia Tenerife JMM</span>
      <span>💎 VIP 3</span>
      <span>🟣 Nivel 45</span>
      <span>🆔 19758906</span>
      <span>🏅 Star Activo Nivel 7</span>
    </div>

  </section>

  <section class="stats">

    <div class="stat">
      <b>1981</b>
      <span>Seguidores</span>
    </div>

    <div class="stat">
      <b>34</b>
      <span>Emisoras</span>
    </div>

    <div class="stat">
      <b>125K</b>
      <span>Diamantes</span>
    </div>

    <div class="stat">
      <b>845</b>
      <span>Días</span>
    </div>

  </section>

  <section class="actions">

    <button class="action-blue">💬 Mensaje</button>
    <button class="action-gold">✏️ Editar</button>
    <button class="action-dark">🔗 Compartir</button>

  </section>

  <section class="card">

    <h3>Información</h3>

    <div class="row">
      <span>ID Poppo</span>
      <b>19758906</b>
    </div>

    <div class="row">
      <span>País</span>
      <b>España</b>
    </div>

    <div class="row">
      <span>Rol</span>
      <b>Fundador</b>
    </div>

  </section>

</main>

<nav class="bottom-nav">

  <button class="nav-item">
    <span class="icon">🏠</span>
    <span>Inicio</span>
  </button>

  <button class="nav-item">
    <span class="icon">🎙️</span>
    <span>Sala</span>
  </button>

  <button class="nav-item active">
    <span class="icon">👤</span>
    <span>Perfil</span>
  </button>

  <button class="nav-item">
    <span class="icon">💬</span>
    <span>Chat</span>
  </button>

  <button class="nav-item">
    <span class="icon">☰</span>
    <span>Más</span>
  </button>

</nav>

</body>
</html>
