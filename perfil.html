<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --blue:#008cff;
  --gold:#f7d774;
  --soft:#d9e5ff;
  --dark:#020713;
}

body{
  background:linear-gradient(180deg,#001b45 0%,#005eea 38%,#003fba 100%);
  color:white;
  min-height:100vh;
  padding-bottom:110px;
}

button{
  border:0;
  cursor:pointer;
}

.profile{
  width:100%;
}

/* CABECERA */
.header{
  position:relative;
  height:520px;
  width:100%;
  overflow:visible;
}

.cover{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:430px;
  overflow:hidden;
  background:#061326;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.05) 20%,
    rgba(0,70,180,.35) 70%,
    rgba(0,94,234,1) 100%
  );
}

.menu-profile{
  position:absolute;
  top:18px;
  right:18px;
  z-index:10;
  width:78px;
  height:78px;
  border-radius:28px;
  background:rgba(0,15,40,.45);
  border:1px solid rgba(247,215,116,.35);
  color:white;
  font-size:36px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 22px rgba(0,140,255,.35);
}

.avatar{
  position:absolute;
  left:50%;
  top:340px;
  transform:translateX(-50%);
  width:155px;
  height:155px;
  border-radius:50%;
  overflow:hidden;
  border:5px solid var(--gold);
  background:#061326;
  box-shadow:0 0 28px rgba(0,170,255,.95);
  z-index:20;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* IDENTIDAD */
.identity{
  text-align:center;
  padding:0 16px;
  margin-top:-6px;
}

.identity h2{
  font-size:40px;
  color:var(--gold);
  margin-bottom:8px;
  font-weight:800;
  text-shadow:0 2px 8px rgba(0,0,0,.35);
}

.identity p{
  font-size:22px;
  color:white;
  margin-bottom:18px;
}

/* INSIGNIAS */
.badges{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:0 22px;
  margin-bottom:28px;
}

.badges span{
  padding:9px 15px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.22);
  color:white;
  font-size:15px;
  box-shadow:inset 0 0 12px rgba(255,255,255,.05);
}

/* ESTADÍSTICAS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  padding:20px 8px 18px;
  margin:12px 14px 22px;
  border-top:1px solid rgba(255,255,255,.18);
  border-bottom:1px solid rgba(255,255,255,.15);
}

.stat{
  text-align:center;
  border-right:1px solid rgba(255,255,255,.12);
}

.stat:last-child{
  border-right:none;
}

.stat b{
  display:block;
  font-size:34px;
  color:white;
  margin-bottom:5px;
  font-weight:700;
}

.stat span{
  font-size:14px;
  color:var(--soft);
}

/* BOTONES */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:0 14px;
  margin-bottom:26px;
}

.action-blue,
.action-gold,
.action-dark{
  min-height:62px;
  border-radius:18px;
  font-size:16px;
  font-weight:bold;
}

.action-blue{
  background:linear-gradient(90deg,#006cff,#00aaff);
  color:white;
}

.action-gold{
  background:linear-gradient(90deg,#d4af37,#ffcc55);
  color:#061326;
}

.action-dark{
  background:rgba(255,255,255,.08);
  color:white;
  border:1px solid rgba(247,215,116,.25);
}

/* TARJETA INFO */
.cards{
  padding:0 14px;
  margin-bottom:24px;
}

.card{
  background:rgba(0,20,55,.45);
  border:1px solid rgba(247,215,116,.25);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(8px);
}

.card h3{
  color:var(--gold);
  font-size:22px;
  margin-bottom:14px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.10);
}

.row:last-child{
  border-bottom:none;
}

.row span{
  color:var(--soft);
}

.row b{
  color:white;
}

/* MENÚ INFERIOR */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:92px;
  background:rgba(0,18,45,.96);
  border-top:1px solid rgba(247,215,116,.25);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
  box-shadow:0 -8px 28px rgba(0,0,0,.35);
}

.nav-item{
  color:white;
  background:transparent;
  font-size:13px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.nav-item .icon{
  font-size:30px;
}

.nav-item.active{
  color:var(--gold);
}

@media(max-width:390px){
  .header{
    height:495px;
  }

  .cover{
    height:405px;
  }

  .avatar{
    top:320px;
    width:145px;
    height:145px;
  }

  .identity h2{
    font-size:35px;
  }

  .identity p{
    font-size:19px;
  }

  .badges span{
    font-size:13px;
    padding:8px 12px;
  }

  .stat b{
    font-size:29px;
  }

  .actions{
    gap:10px;
  }

  .action-blue,
  .action-gold,
  .action-dark{
    font-size:14px;
  }
}
</style>
</head>

<body>

<main class="profile">

  <!-- CABECERA CON FOTO GRANDE -->
  <section class="header">

    <div class="cover">
      <img src="file_00000000b87071f4b2cf26f846b51b6e.png" alt="Portada">
    </div>

    <button class="menu-profile">...</button>

    <div class="avatar">
      <img src="file_00000000f71471f499e5839986bab33b.png" alt="Foto de perfil">
    </div>

  </section>

  <!-- NOMBRE Y DATOS -->
  <section class="identity">

    <h2>Jesús Melián</h2>

    <p>👑 Fundador · Agencia JM Tenerife</p>

    <div class="badges">
      <span>💙 Fan azul</span>
      <span>⭐ Insignia Star</span>
      <span>★ Agencia Tenerife JMM</span>
      <span>💎 VIP 3</span>
      <span>🟣 Nivel 45</span>
      <span>🆔 19758906</span>
      <span>🏅 Star Activo Nivel 7</span>
    </div>

  </section>

  <!-- ESTADÍSTICAS -->
  <section class="stats">

    <div class="stat">
      <b>1981</b>
      <span>Seguidores</span>
    </div>

    <div class="stat">
      <b>34</b>
      <span>Emisoras</span>
    </div>

    <div class="stat">
      <b>125K</b>
      <span>Diamantes</span>
    </div>

    <div class="stat">
      <b>845</b>
      <span>Días</span>
    </div>

  </section>

  <!-- BOTONES -->
  <section class="actions">

    <button class="action-blue">💬 Mensaje</button>
    <button class="action-gold">✏️ Editar perfil</button>
    <button class="action-dark">🔗 Compartir</button>

  </section>

  <!-- INFORMACIÓN -->
  <section class="cards">

    <div class="card">
      <h3>Información</h3>

      <div class="row">
        <span>ID Poppo</span>
        <b>19758906</b>
      </div>

      <div class="row">
        <span>País</span>
        <b>España</b>
      </div>

      <div class="row">
        <span>Rol</span>
        <b>Fundador</b>
      </div>
    </div>

  </section>

</main>

<!-- MENÚ INFERIOR -->
<nav class="bottom-nav">

  <button class="nav-item">
    <span class="icon">🏠</span>
    <span>Inicio</span>
  </button>

  <button class="nav-item">
    <span class="icon">🎙️</span>
    <span>Sala</span>
  </button>

  <button class="nav-item active">
    <span class="icon">👤</span>
    <span>Perfil</span>
  </button>

  <button class="nav-item">
    <span class="icon">💬</span>
    <span>Chat</span>
  </button>

  <button class="nav-item">
    <span class="icon">☰</span>
    <span>Más</span>
  </button>

</nav>

</body>
</html>
