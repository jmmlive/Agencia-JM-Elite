<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --gold2:#ffcc3d;
  --electric:#006bff;
  --electric2:#00a2ff;
  --deep:#020713;
  --card:#061b52;
  --soft:#dce8ff;
}

body{
  background:#020713;
  color:white;
  min-height:100vh;
  padding-bottom:78px;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  border:0;
  cursor:pointer;
}

.profile{
  width:100%;
  min-height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 34%, rgba(0,162,255,.95) 0%, rgba(0,80,255,.72) 28%, rgba(0,20,85,.92) 62%, #020713 100%);
}

/* CABECERA */
.header{
  position:relative;
  width:100%;
  height:355px;
  overflow:visible;
}

.cover{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:310px;
  overflow:hidden;
  background:#020713;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  filter:saturate(1.35) contrast(1.12) brightness(.96);
}

.cover::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 85% 10%, rgba(0,160,255,.38), transparent 30%),
    linear-gradient(180deg, rgba(0,0,0,.04) 0%, rgba(0,35,130,.12) 46%, rgba(0,97,255,.98) 100%);
  z-index:2;
}

.cover::after{
  content:"";
  position:absolute;
  left:-10%;
  right:-10%;
  bottom:-1px;
  height:70px;
  background:linear-gradient(180deg, rgba(0,100,255,0), #006bff 70%, #0058ef 100%);
  z-index:3;
}

/* BOTÓN 3 PUNTOS */
.menu-profile{
  position:absolute;
  top:16px;
  right:16px;
  width:52px;
  height:52px;
  border-radius:18px;
  background:rgba(0,14,45,.48);
  border:1px solid rgba(247,215,116,.55);
  color:white;
  font-size:30px;
  z-index:20;
  box-shadow:0 0 18px rgba(0,115,255,.45);
}

/* FOTO PERFIL */
.avatar{
  position:absolute;
  left:50%;
  bottom:-3px;
  transform:translateX(-50%);
  width:112px;
  height:112px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid var(--gold);
  background:#061326;
  box-shadow:
    0 0 0 2px rgba(0,162,255,.55),
    0 0 32px rgba(0,162,255,1);
  z-index:25;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* IDENTIDAD */
.identity{
  text-align:center;
  padding:4px 14px 0;
}

.identity h1{
  font-size:32px;
  line-height:1.05;
  color:var(--gold);
  font-weight:900;
  margin-bottom:8px;
  text-shadow:0 3px 12px rgba(0,0,0,.45);
}

.identity p{
  font-size:17px;
  color:white;
  margin-bottom:16px;
}

/* INSIGNIAS */
.badges{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:0 22px;
  margin-bottom:18px;
}

.badges span{
  height:42px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(0,83,255,.62), rgba(0,31,130,.72));
  border:1px solid rgba(0,170,255,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  color:white;
  box-shadow:
    inset 0 0 18px rgba(0,170,255,.18),
    0 0 12px rgba(0,88,255,.18);
  white-space:nowrap;
}

/* ESTADÍSTICAS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:0 18px;
  margin-bottom:18px;
}

.stat{
  min-height:78px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(0,65,210,.52), rgba(0,24,92,.72));
  border:1px solid rgba(0,170,255,.42);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 0 18px rgba(0,162,255,.12);
}

.stat b{
  font-size:27px;
  color:var(--gold);
  margin-bottom:5px;
}

.stat span{
  font-size:12px;
  color:white;
}

/* BOTONES */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:0 18px;
  margin-bottom:18px;
}

.actions button{
  height:58px;
  border-radius:18px;
  font-size:15px;
  font-weight:800;
}

.action-blue{
  background:linear-gradient(135deg,#008cff,#004dff);
  color:white;
  box-shadow:0 0 22px rgba(0,140,255,.5);
}

.action-gold{
  background:linear-gradient(135deg,#d8a92d,#ffcf55);
  color:#061326;
  box-shadow:0 0 18px rgba(247,215,116,.35);
}

.action-dark{
  background:linear-gradient(180deg, rgba(0,55,180,.50), rgba(0,18,70,.78));
  color:white;
  border:1px solid rgba(0,170,255,.35);
}

/* INFO, QUEDA ABAJO */
.card{
  margin:0 18px 18px;
  background:rgba(0,18,55,.72);
  border:1px solid rgba(247,215,116,.24);
  border-radius:18px;
  padding:14px;
}

.card h3{
  color:var(--gold);
  font-size:18px;
  margin-bottom:8px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:13px;
}

.row:last-child{
  border-bottom:none;
}

.row span{
  color:var(--soft);
}

.row b{
  color:white;
}

/* MENÚ INFERIOR */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:74px;
  background:rgba(0,12,38,.98);
  border-top:1px solid rgba(247,215,116,.25);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
}

.nav-item{
  background:transparent;
  color:white;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}

.nav-item .icon{
  font-size:24px;
}

.nav-item.active{
  color:var(--gold);
}

@media(max-width:390px){
  .header{
    height:335px;
  }

  .cover{
    height:292px;
  }

  .avatar{
    width:104px;
    height:104px;
    bottom:-2px;
  }

  .identity h1{
    font-size:29px;
  }

  .identity p{
    font-size:15px;
    margin-bottom:13px;
  }

  .badges{
    gap:8px;
    padding:0 16px;
    margin-bottom:15px;
  }

  .badges span{
    height:37px;
    font-size:11.5px;
  }

  .stats{
    gap:9px;
    padding:0 14px;
    margin-bottom:14px;
  }

  .stat{
    min-height:68px;
  }

  .stat b{
    font-size:23px;
  }

  .stat span{
    font-size:10.5px;
  }

  .actions{
    gap:9px;
    padding:0 14px;
  }

  .actions button{
    height:50px;
    font-size:13px;
  }
}
</style>
</head>

<body>
