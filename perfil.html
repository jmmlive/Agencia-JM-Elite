<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --gold2:#ffcc45;
  --electric:#008cff;
  --electric2:#005dff;
  --dark:#020713;
  --navy:#061326;
  --soft:#dce8ff;
}

body{
  background:#020713;
  color:white;
  min-height:100vh;
  padding-bottom:92px;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  border:0;
  cursor:pointer;
}

.profile{
  width:100%;
  min-height:100vh;
  background:
    radial-gradient(circle at top,#008cff 0%,#004dff 38%,#020713 100%);
  overflow:hidden;
}

/* CABECERA */
.header{
  position:relative;
  width:100%;
  height:258px;
  background:#061326;
  overflow:visible;
}

.cover{
  width:100%;
  height:100%;
  position:relative;
  overflow:hidden;
  background:#061326;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center top;
  display:block;
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.02) 0%,
    rgba(0,45,130,.10) 45%,
    rgba(0,140,255,.95) 100%
  );
}

.menu-profile{
  position:absolute;
  top:14px;
  right:14px;
  width:40px;
  height:40px;
  border-radius:14px;
  background:rgba(0,15,40,.52);
  border:1px solid rgba(247,215,116,.45);
  color:white;
  font-size:22px;
  z-index:20;
}

/* FOTO PERFIL */
.avatar{
  position:absolute;
  left:50%;
  bottom:-50px;
  transform:translateX(-50%);
  width:96px;
  height:96px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid var(--gold);
  background:#061326;
  box-shadow:0 0 24px rgba(0,140,255,.95);
  z-index:30;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* IDENTIDAD */
.identity{
  text-align:center;
  padding:56px 12px 0;
}

.identity h1{
  font-size:25px;
  color:var(--gold);
  margin-bottom:4px;
  font-weight:800;
}

.identity p{
  font-size:13.5px;
  color:white;
  margin-bottom:9px;
}

/* INSIGNIAS */
.badges{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:0 12px;
  margin-bottom:10px;
}

.badges span{
  min-height:30px;
  border-radius:999px;
  background:rgba(0,93,255,.32);
  border:1px solid rgba(247,215,116,.35);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  color:white;
  white-space:nowrap;
}

/* ESTADÍSTICAS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  padding:0 12px;
  margin-bottom:10px;
}

.stat{
  background:rgba(0,60,180,.34);
  border:1px solid rgba(247,215,116,.28);
  border-radius:14px;
  text-align:center;
  padding:9px 3px;
}

.stat b{
  display:block;
  font-size:19px;
  color:var(--gold);
  margin-bottom:2px;
}

.stat span{
  font-size:9.5px;
  color:var(--soft);
}

/* SEIS BOTONES */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  padding:0 12px;
  margin-bottom:12px;
}

.actions button{
  height:41px;
  border-radius:13px;
  font-size:10px;
  font-weight:bold;
}

.action-blue{
  background:linear-gradient(135deg,#005dff,#00b7ff);
  color:white;
  box-shadow:0 0 16px rgba(0,140,255,.40);
}

.action-gold{
  background:linear-gradient(135deg,#d5a927,#ffcf55);
  color:#061326;
}

.action-dark{
  background:rgba(0,26,85,.65);
  color:white;
  border:1px solid rgba(247,215,116,.25);
}

/* INFORMACIÓN */
.card{
  margin:0 12px 16px;
  background:rgba(0,18,55,.72);
  border:1px solid rgba(247,215,116,.25);
  border-radius:17px;
  padding:12px;
}

.card h3{
  color:var(--gold);
  font-size:16px;
  margin-bottom:7px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:13px;
}

.row:last-child{
  border-bottom:none;
}

.row span{
  color:var(--soft);
}

.row b{
  color:white;
}

/* MENÚ INFERIOR */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:72px;
  background:rgba(0,18,45,.98);
  border-top:1px solid rgba(247,215,116,.25);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
}

.nav-item{
  background:transparent;
  color:white;
  font-size:10.5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
}

.nav-item .icon{
  font-size:21px;
}

.nav-item.active{
  color:var(--gold);
}

@media(max-width:390px){
  .header{
    height:248px;
  }

  .avatar{
    width:94px;
    height:94px;
    bottom:-48px;
  }

  .identity{
    padding-top:54px;
  }

  .identity h1{
    font-size:24px;
  }

  .identity p{
    font-size:13px;
  }

  .badges span{
    font-size:9.5px;
    min-height:29px;
  }

  .stat b{
    font-size:18px;
  }

  .actions button{
    height:40px;
    font-size:9.5px;
  }
}
</style>
</head>

<body>

<main class="profile">

<section class="header">

  <div class="cover">
    <img src="file_00000000b87071f4b2cf26f846b51b6e.png" alt="Portada">
  </div>

  <button class="menu-profile">⋮</button>

  <div class="avatar">
    <img src="file_00000000f71471f499e5839986bab33b.png" alt="Foto de perfil">
  </div>

</section>

<section class="identity">

  <h1>Jesús Melián</h1>
  <p>👑 Fundador · Agencia JM Elite</p>

  <div class="badges">
    <span>🟣 Nivel 45</span>
    <span>💎 VIP 3</span>
    <span>🆔 19758906</span>
    <span>🏅 Star 7</span>
    <span>♂ Hombre</span>
    <span>🎂 49 años</span>
  </div>

</section>

<section class="stats">

  <div class="stat">
    <b>1981</b>
    <span>Seguidores</span>
  </div>

  <div class="stat">
    <b>34</b>
    <span>Emisoras</span>
  </div>

  <div class="stat">
    <b>125K</b>
    <span>Diamantes</span>
  </div>

  <div class="stat">
    <b>845</b>
    <span>Días</span>
  </div>

</section>

<section class="actions">

  <button class="action-blue">💬 Mensaje</button>
  <button class="action-gold">✏️ Editar</button>
  <button class="action-dark">➕ Añadir</button>
  <button class="action-dark">🔗 Compartir</button>
  <button class="action-dark">🔑 Copiar ID</button>
  <button class="action-dark">🗑️ Papelera</button>

</section>

<section class="card">

  <h3>Información</h3>

  <div class="row">
    <span>ID Poppo</span>
    <b>19758906</b>
  </div>

  <div class="row">
    <span>País</span>
    <b>España</b>
  </div>

  <div class="row">
    <span>Rol</span>
    <b>Fundador</b>
  </div>

</section>

</main>

<nav class="bottom-nav">

  <a class="nav-item" href="index.html">
    <span class="icon">🏠</span>
    <span>Inicio</span>
  </a>

  <a class="nav-item" href="sala.html">
    <span class="icon">🎙️</span>
    <span>Sala</span>
  </a>

  <a class="nav-item active" href="perfil.html">
    <span class="icon">👤</span>
    <span>Perfil</span>
  </a>

  <a class="nav-item" href="chat.html">
    <span class="icon">💬</span>
    <span>Chat</span>
  </a>

  <a class="nav-item" href="menu.html">
    <span class="icon">☰</span>
    <span>Más</span>
  </a>

</nav>

</body>
</html>
