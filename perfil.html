<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --soft:#dce8ff;
  --dark:#020713;
}

body{
  background:#020713;
  color:white;
  min-height:100vh;
  padding-bottom:82px;
}

button{
  border:0;
  cursor:pointer;
}

.profile{
  width:100%;
  min-height:100vh;
  background:linear-gradient(180deg,#00265f 0%,#005bdc 42%,#021334 100%);
  overflow:hidden;
}

/* CABECERA */
.header{
  position:relative;
  width:100%;
  .header{
    height:270px;
  }
}

.cover{
  width:100%;
  height:100%;
  position:relative;
  overflow:hidden;
  background:#061326;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  .cover img{
    object-position:center -50px;
  }
  display:block;
}

.cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.02) 0%,
    rgba(0,30,75,.20) 58%,
    rgba(0,91,220,.94) 100%
  );
}

/* BOTÓN 3 PUNTOS */
.menu-profile{
  position:absolute;
  top:14px;
  right:14px;
  width:42px;
  height:42px;
  border-radius:15px;
  background:rgba(0,15,40,.48);
  border:1px solid rgba(247,215,116,.34);
  color:white;
  font-size:23px;
  z-index:20;
}

/* FOTO PERFIL MEDIA LUNA */
.avatar{
  position:absolute;
  left:50%;
  bottom:-57px;
  transform:translateX(-50%);
  width:114px;
  height:114px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid var(--gold);
  background:#061326;
  box-shadow:0 0 24px rgba(0,170,255,.82);
  z-index:30;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* IDENTIDAD */
.identity{
  text-align:center;
  .identity{
    padding:50px 12px 0;
  }
}

.identity h1{
  font-size:28px;
  color:var(--gold);
  margin-bottom:4px;
  font-weight:800;
}

.identity p{
  font-size:15px;
  color:white;
  margin-bottom:11px;
}

/* INSIGNIAS */
.badges{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  padding:0 12px;
  margin-bottom:12px;
}

.badges span{
  min-height:34px;
  border-radius:999px;
  background:rgba(255,255,255,.065);
  border:1px solid rgba(247,215,116,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:white;
  white-space:nowrap;
}

/* ESTADÍSTICAS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:0 12px;
  margin-bottom:12px;
}

.stat{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(247,215,116,.20);
  border-radius:15px;
  text-align:center;
  padding:10px 3px;
}

.stat b{
  display:block;
  font-size:21px;
  color:var(--gold);
  margin-bottom:3px;
}

.stat span{
  font-size:10px;
  color:var(--soft);
}

/* SEIS BOTONES */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:0 12px;
  margin-bottom:14px;
}

.actions button{
  height:46px;
  border-radius:14px;
  font-size:11px;
  font-weight:bold;
}

.action-blue{
  background:linear-gradient(135deg,#007bff,#00b7ff);
  color:white;
}

.action-gold{
  background:linear-gradient(135deg,#d5a927,#ffcf55);
  color:#061326;
}

.action-dark{
  background:rgba(255,255,255,.06);
  color:white;
  border:1px solid rgba(247,215,116,.24);
}

/* INFORMACIÓN */
.card{
  margin:0 12px 16px;
  background:rgba(0,18,45,.62);
  border:1px solid rgba(247,215,116,.22);
  border-radius:18px;
  padding:14px;
}

.card h3{
  color:var(--gold);
  font-size:17px;
  margin-bottom:8px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:14px;
}

.row:last-child{
  border-bottom:none;
}

.row span{
  color:var(--soft);
}

.row b{
  color:white;
}

/* MENÚ INFERIOR */
.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:76px;
  background:rgba(0,18,45,.97);
  border-top:1px solid rgba(247,215,116,.22);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
}

.nav-item{
  background:transparent;
  color:white;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
}

.nav-item .icon{
  font-size:22px;
}

.nav-item.active{
  color:var(--gold);
}

@media(max-width:390px){
  .header{
    height:280px;
  }

  .cover img{
    object-position:center -24px;
  }

  .avatar{
    width:108px;
    height:108px;
    bottom:-54px;
  }

  .identity{
    padding-top:63px;
  }

  .identity h1{
    font-size:26px;
  }

  .identity p{
    font-size:14px;
  }

  .badges span{
    font-size:10.5px;
    min-height:32px;
  }

  .stat b{
    font-size:19px;
  }

  .actions button{
    height:44px;
    font-size:10.5px;
  }
}
</style>
</head>

<body>

<main class="profile">

  <section class="header">

    <div class="cover">
      <img src="file_00000000b87071f4b2cf26f846b51b6e.png" alt="Portada">
    </div>

    <button class="menu-profile">⋮</button>

    <div class="avatar">
      <img src="file_00000000f71471f499e5839986bab33b.png" alt="Foto de perfil">
    </div>

  </section>

  <section class="identity">

    <h1>Jesús Melián</h1>
    <p>👑 Fundador · Agencia JM Elite</p>

    <div class="badges">
      <span>🟣 Nivel 45</span>
      <span>💎 VIP 3</span>
      <span>🆔 19758906</span>
      <span>🏅 Star 7</span>
      <span>♂ Hombre</span>
      <span>🎂 49 años</span>
    </div>

  </section>

  <section class="stats">

    <div class="stat">
      <b>1981</b>
      <span>Seguidores</span>
    </div>

    <div class="stat">
      <b>34</b>
      <span>Emisoras</span>
    </div>

    <div class="stat">
      <b>125K</b>
      <span>Diamantes</span>
    </div>

    <div class="stat">
      <b>845</b>
      <span>Días</span>
    </div>

  </section>

  <section class="actions">

    <button class="action-blue">💬 Mensaje</button>
    <button class="action-gold">✏️ Editar</button>
    <button class="action-dark">➕ Añadir</button>
    <button class="action-dark">🔗 Compartir</button>
    <button class="action-dark">🔑 Copiar ID</button>
    <button class="action-dark">🗑️ Papelera</button>

  </section>

  <section class="card">

    <h3>Información</h3>

    <div class="row">
      <span>ID Poppo</span>
      <b>19758906</b>
    </div>

    <div class="row">
      <span>País</span>
      <b>España</b>
    </div>

    <div class="row">
      <span>Rol</span>
      <b>Fundador</b>
    </div>

  </section>

</main>

<nav class="bottom-nav">

  <button class="nav-item">
    <span class="icon">🏠</span>
    <span>Inicio</span>
  </button>

  <button class="nav-item">
    <span class="icon">🎙️</span>
    <span>Sala</span>
  </button>

  <button class="nav-item active">
    <span class="icon">👤</span>
    <span>Perfil</span>
  </button>

  <button class="nav-item">
    <span class="icon">💬</span>
    <span>Chat</span>
  </button>

  <button class="nav-item">
    <span class="icon">☰</span>
    <span>Más</span>
  </button>

</nav>

</body>
</html>
