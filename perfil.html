<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#020713;color:white}
:root{--blue:#168cff;--gold:#f7d774;--soft:#d9e5ff}

.topbar{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#020713;border-bottom:2px solid var(--blue)}
.icon{width:52px;height:52px;border-radius:16px;border:1px solid var(--blue);background:#07162c;color:white;font-size:24px}
.title{text-align:center}
.title h1{color:var(--gold);font-size:24px}
.title p{color:var(--soft);font-size:13px}

.cover{
height:210px;margin:16px;border-radius:28px;
border:1px solid rgba(247,215,116,.45);
background:radial-gradient(circle at top,#168cff,#07162c 45%,#020713);
position:relative;display:flex;align-items:flex-end;justify-content:center;
overflow:visible;
}
.cover:before{
content:"JM";position:absolute;font-size:125px;font-weight:bold;
color:rgba(255,255,255,.04);top:28px;
}

.avatar{
position:absolute;bottom:-55px;width:116px;height:116px;border-radius:50%;
border:4px solid var(--gold);background:#07162c;display:none;
align-items:center;justify-content:center;overflow:hidden;
box-shadow:0 0 25px rgba(22,140,255,.8);
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}

.content{padding:62px 16px 90px}
.name{text-align:center;margin-bottom:18px}
.name h2{font-size:32px;color:var(--gold)}
.name p{color:var(--soft);margin-top:5px}

.card{background:linear-gradient(180deg,#102644,#030813);border:1px solid rgba(247,215,116,.35);border-radius:24px;padding:18px;margin-bottom:14px}
.card h3{color:var(--gold);font-size:21px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.row:last-child{border-bottom:0}
.row span{color:var(--soft)}
.row b{text-align:right}
.bio{color:var(--soft);font-size:15px;line-height:1.55}

.socials{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.social{padding:14px;border-radius:16px;background:#07162c;border:1px solid rgba(22,140,255,.55);text-align:center;color:var(--soft);font-weight:bold}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.btn{border:0;border-radius:18px;padding:16px;font-size:16px;font-weight:bold}
.blue{background:linear-gradient(90deg,#005cff,#148bff);color:white}
.gold{background:linear-gradient(90deg,#d4af37,#ffcc55);color:#07111f}
.empty{text-align:center;color:var(--soft);padding:30px}
</style>
</head>
<body>

<header class="topbar">
  <button class="icon" onclick="location.href='emisoras.html'">←</button>

  <div class="title">
    <h1>PERFIL ELITE</h1>
    <p>Ficha oficial de emisora</p>
  </div>

  <button class="icon" onclick="location.reload()">⟳</button>
</header>

<section class="cover" id="cover">
  <div class="avatar" id="avatar"></div>
</section>

<main class="content">
  <div id="perfilContenido" class="empty">
    Cargando perfil...
  </div>
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",
  authDomain:"agencia-jm-elite.firebaseapp.com",
  projectId:"agencia-jm-elite",
  storageBucket:"agencia-jm-elite.firebasestorage.app",
  messagingSenderId:"171676205335",
  appId:"1:171676205335:web:95443528659ab804fe7752"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const avatar = document.getElementById("avatar");
const cover = document.getElementById("cover");
const cont = document.getElementById("perfilContenido");

const params = new URLSearchParams(location.search);
const perfilId = params.get("id");

async function cargarPerfil(){

  const id = perfilId || auth.currentUser.uid;

  const snap = await getDoc(doc(db,"usuarios",id));

  if(!snap.exists()){
    cont.innerHTML="Perfil no encontrado";
    return;
  }

  const u = snap.data();

  if(u.fotoPerfil){
    avatar.style.display="flex";
    avatar.innerHTML='<img src="'+u.fotoPerfil+'">';
  }

  if(u.fotoPortada){
    cover.style.backgroundImage='linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.6)),url("'+u.fotoPortada+'")';
    cover.style.backgroundSize="cover";
    cover.style.backgroundPosition="center";
  }

  const revision = u.estadoRevision || "pendiente";
    cont.className="";
  cont.innerHTML=`
    <section class="name">
      <h2>${u.nombre || "Emisora Elite"}</h2>
      <p>${u.rol || "emisora"} · Agencia JM Elite</p>
    </section>

    <section class="card">
      <h3>✨ Información principal</h3>
      <div class="row"><span>🌍 País</span><b>${u.pais || "No indicado"}</b></div>
      <div class="row"><span>🆔 Poppo ID</span><b>${u.poppoId || "No indicado"}</b></div>
      <div class="row"><span>✉️ Correo</span><b>${u.email || "No indicado"}</b></div>
      <div class="row"><span>🎙️ Estado</span><b>${u.estado || "activo"}</b></div>
    </section>

    <section class="card">
      <h3>🛡️ Estado del perfil</h3>
      <div class="row"><span>Revisión</span><b>${revision==="aprobado" ? "🟢 Aprobado" : revision==="rechazado" ? "🔴 Rechazado" : "🟡 Pendiente"}</b></div>
      <p class="bio">${revision==="aprobado" ? "Perfil aprobado por la administración." : revision==="rechazado" ? "Este perfil necesita cambios." : "Perfil pendiente de revisión."}</p>
    </section>

    <section class="card">
      <h3>📝 Presentación</h3>
      <p class="bio">${u.descripcion || "Esta emisora todavía no ha escrito su presentación."}</p>
    </section>

    <section class="card">
      <h3>📲 Redes y contacto</h3>
      <div class="socials">
        <div class="social">WhatsApp</div>
        <div class="social">Instagram</div>
        <div class="social">TikTok</div>
        <div class="social">Facebook</div>
      </div>
    </section>
<section class="card">
  <h3>🏅 Logros Poppo</h3>

  <div class="info-row">
    <span>🗓️ Miembro desde</span>
    <b>12/03/2024</b>
  </div>

  <div class="info-row">
    <span>⏳ Tiempo en Poppo</span>
    <b id="diasPoppo">Calculando...</b>
  </div>

  <div class="info-row">
    <span>🏅 Star Activo</span>
    <b>Nivel 7</b>
  </div>

  <div class="info-row">
    <span>💛 Poder del Fan</span>
    <b>Nivel 1</b>
  </div>
</section>
    <div class="actions">
      <button class="btn blue" onclick="alert('Chat privado próximamente')">💬 Mensaje</button>
      <button class="btn gold" onclick="location.href='editar-perfil.html'">📝 Editar perfil</button>
    </div>
  `;
}

onAuthStateChanged(auth,function(user){
  if(!user){
    location.replace("index.html");
    return;
  }
  cargarPerfil();
});
const fechaInicioPoppo = new Date("2024-03-12T00:00:00");
const hoy = new Date();

const diferencia = hoy - fechaInicioPoppo;
const diasPoppo = Math.floor(diferencia / (1000 * 60 * 60 * 24));

const diasPoppoBox = document.getElementById("diasPoppo");

if(diasPoppoBox){
  diasPoppoBox.textContent = diasPoppo + " días";
}
</script>
</body>
</html>
