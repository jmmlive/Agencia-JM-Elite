<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>JM Nexus IA</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --gold2:#ffbd32;
  --blue:#008cff;
  --blue2:#00c8ff;
  --deep:#020713;
  --panel:#061326;
  --soft:#dce8ff;
  --green:#59ffb1;
  --danger:#ff6175;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#020713;
  color:white;
}

body{
  min-height:100vh;
  overflow:hidden;
}

button,
textarea{
  font-family:inherit;
}

button{
  border:0;
  cursor:pointer;
  color:inherit;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(
      circle at top,
      #006cff70 0,
      #061326 28%,
      #020713 72%
    );
}


/* CABECERA */

.header{
  flex:none;
  padding:
    calc(12px + env(safe-area-inset-top))
    14px
    12px;
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(2,7,19,.92);
  border-bottom:1px solid rgba(0,183,255,.30);
  backdrop-filter:blur(18px);
  z-index:20;
}

.back{
  width:48px;
  height:48px;
  border-radius:17px;
  background:rgba(0,86,210,.24);
  border:1px solid rgba(0,183,255,.48);
  font-size:25px;
}

.identity{
  flex:1;
  min-width:0;
  display:flex;
  align-items:center;
  gap:11px;
}

.ai-logo{
  position:relative;
  width:52px;
  height:52px;
  flex:none;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(
      circle at 35% 30%,
      #31dcff,
      #0066ff 45%,
      #061326 72%
    );
  border:2px solid var(--gold);
  box-shadow:
    0 0 18px rgba(0,183,255,.75),
    0 0 28px rgba(247,215,116,.20);
  font-size:27px;
}

.ai-logo::after{
  content:"";
  position:absolute;
  right:0;
  bottom:1px;
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--green);
  border:2px solid #061326;
  box-shadow:0 0 10px var(--green);
}

.identity-text{
  min-width:0;
}

.identity h1{
  color:var(--gold);
  font-size:19px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.identity p{
  color:var(--soft);
  font-size:11px;
  margin-top:4px;
}

.voice-toggle{
  width:48px;
  height:48px;
  flex:none;
  border-radius:17px;
  background:rgba(0,86,210,.24);
  border:1px solid rgba(0,183,255,.48);
  font-size:22px;
}

.voice-toggle.active{
  color:#071426;
  background:
    linear-gradient(
      135deg,
      var(--gold),
      var(--gold2)
    );
  border-color:var(--gold);
}


/* CUERPO */

.chat-area{
  flex:1;
  overflow-y:auto;
  padding:15px 13px 145px;
  scroll-behavior:smooth;
}

.welcome{
  margin:6px 0 18px;
  padding:20px 17px;
  border-radius:25px;
  background:
    linear-gradient(
      145deg,
      rgba(0,87,210,.28),
      rgba(0,12,38,.84)
    );
  border:1px solid rgba(247,215,116,.34);
  box-shadow:
    0 0 25px rgba(0,120,255,.20);
  text-align:center;
}

.welcome-icon{
  width:76px;
  height:76px;
  margin:0 auto 13px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(
      circle,
      #19cfff,
      #0756d7 55%,
      #061326 72%
    );
  border:2px solid var(--gold);
  box-shadow:
    0 0 30px rgba(0,183,255,.60);
  font-size:39px;
}

.welcome h2{
  color:var(--gold);
  font-size:24px;
}

.welcome p{
  max-width:360px;
  margin:9px auto 0;
  color:var(--soft);
  font-size:14px;
  line-height:1.5;
}

.quick-title{
  margin:16px 2px 10px;
  color:var(--gold);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.7px;
}

.quick-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  margin-bottom:18px;
}

.quick{
  min-height:54px;
  padding:10px 12px;
  border-radius:17px;
  background:rgba(0,55,145,.22);
  border:1px solid rgba(0,183,255,.32);
  color:white;
  font-size:12px;
  font-weight:bold;
  text-align:left;
}

.quick span{
  margin-right:5px;
  font-size:19px;
}


/* MENSAJES */

.message-row{
  display:flex;
  margin:11px 0;
}

.message-row.user{
  justify-content:flex-end;
}

.message-row.ai{
  justify-content:flex-start;
}

.message{
  max-width:84%;
  padding:13px 15px;
  border-radius:20px;
  font-size:14px;
  line-height:1.5;
  word-wrap:break-word;
  white-space:pre-wrap;
}

.user .message{
  background:
    linear-gradient(
      135deg,
      #006cff,
      #00a9ff
    );
  border-bottom-right-radius:5px;
  box-shadow:
    0 0 18px rgba(0,126,255,.25);
}

.ai .message{
  background:rgba(7,25,55,.96);
  border:1px solid rgba(247,215,116,.30);
  border-bottom-left-radius:5px;
}

.ai-name{
  display:block;
  margin-bottom:6px;
  color:var(--gold);
  font-size:11px;
  font-weight:bold;
}

.typing{
  display:none;
  align-items:center;
  gap:6px;
  width:max-content;
  margin:10px 0;
  padding:12px 16px;
  border-radius:18px;
  background:#071937;
  border:1px solid rgba(0,183,255,.25);
}

.typing.show{
  display:flex;
}

.typing span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--gold);
  animation:pulse 1.2s infinite;
}

.typing span:nth-child(2){
  animation-delay:.2s;
}

.typing span:nth-child(3){
  animation-delay:.4s;
}

@keyframes pulse{

  0%,
  60%,
  100%{
    opacity:.25;
    transform:translateY(0);
  }

  30%{
    opacity:1;
    transform:translateY(-5px);
  }

}


/* CAJA DE ESCRITURA */

.composer{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:30;
  padding:
    10px 11px
    calc(11px + env(safe-area-inset-bottom));
  background:
    linear-gradient(
      180deg,
      rgba(2,7,19,0),
      #020713 22%,
      #020713
    );
}

.composer-box{
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:8px;
  border-radius:25px;
  background:rgba(6,19,38,.98);
  border:1px solid rgba(0,183,255,.42);
  box-shadow:
    0 0 25px rgba(0,120,255,.25);
}

.mic,
.send{
  width:48px;
  height:48px;
  flex:none;
  border-radius:17px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:23px;
}

.mic{
  background:rgba(0,92,220,.25);
  border:1px solid rgba(0,183,255,.44);
}

.mic.listening{
  background:var(--danger);
  border-color:#ff9aaa;
  animation:listenPulse 1.1s infinite;
}

@keyframes listenPulse{

  50%{
    box-shadow:
      0 0 0 9px
      rgba(255,97,117,.15);
  }

}

.send{
  color:#061326;
  background:
    linear-gradient(
      135deg,
      var(--gold),
      var(--gold2)
    );
  font-weight:bold;
}

textarea{
  flex:1;
  min-height:48px;
  max-height:120px;
  resize:none;
  border:0;
  outline:0;
  padding:13px 5px 8px;
  background:transparent;
  color:white;
  font-size:15px;
  line-height:1.35;
}

textarea::placeholder{
  color:#9eacc5;
}

.voice-status{
  display:none;
  margin:7px 10px 0;
  color:#ff9aaa;
  font-size:11px;
  text-align:center;
}

.voice-status.show{
  display:block;
}


/* PEQUEÑAS */

@media(max-width:380px){

  .header{
    gap:8px;
  }

  .back,
  .voice-toggle{
    width:44px;
    height:44px;
  }

  .ai-logo{
    width:48px;
    height:48px;
  }

  .identity h1{
    font-size:17px;
  }

}

</style>

</head>


<body>


<div class="app">


<header class="header">

  <button
    class="back"
    type="button"
    onclick="goBack()"
    aria-label="Volver"
  >
    ←
  </button>


  <div class="identity">

    <div class="ai-logo">
      🦅
    </div>

    <div class="identity-text">

      <h1>JM NEXUS IA</h1>

      <p>
        Asistente inteligente · Agencia JM Elite
      </p>

    </div>

  </div>


  <button
    id="voiceToggle"
    class="voice-toggle active"
    type="button"
    onclick="toggleVoice()"
    aria-label="Activar o desactivar voz"
  >
    🔊
  </button>

</header>



<main
  id="chatArea"
  class="chat-area"
>

  <section
    id="welcome"
    class="welcome"
  >

    <div class="welcome-icon">
      🦅
    </div>

    <h2>
      JM NEXUS IA
    </h2>

    <p>
      Soy el asistente inteligente de JM Elite.
      Puedes escribirme o hablarme.
      Estoy aquí para orientarte dentro de la agencia.
    </p>

  </section>


  <div class="quick-title">
    Preguntas rápidas
  </div>


  <section
    id="quickGrid"
    class="quick-grid"
  >

    <button
      class="quick"
      onclick="quickQuestion('¿Cómo funciona la agencia?')"
    >
      <span>🦅</span>
      Cómo funciona la agencia
    </button>


    <button
      class="quick"
      onclick="quickQuestion('¿Qué debo hacer en Poppo?')"
    >
      <span>🎙️</span>
      Ayuda con Poppo
    </button>


    <button
      class="quick"
      onclick="quickQuestion('Explícame las normas')"
    >
      <span>📖</span>
      Normas JM Elite
    </button>


    <button
      class="quick"
      onclick="quickQuestion('¿Cómo funcionan los pagos?')"
    >
      <span>💰</span>
      Pagos y bonos
    </button>

  </section>


  <div
    id="messages"
  ></div>


  <div
    id="typing"
    class="typing"
  >

    <span></span>
    <span></span>
    <span></span>

  </div>

</main>



<footer class="composer">

  <div class="composer-box">

    <button
      id="micButton"
      class="mic"
      type="button"
      onclick="startListening()"
      aria-label="Hablar"
    >
      🎙️
    </button>


    <textarea
      id="messageInput"
      rows="1"
      placeholder="Escribe o pulsa el micrófono..."
      oninput="autoResize()"
      onkeydown="handleKey(event)"
    ></textarea>


    <button
      class="send"
      type="button"
      onclick="sendMessage()"
      aria-label="Enviar"
    >
      ➤
    </button>

  </div>


  <div
    id="voiceStatus"
    class="voice-status"
  >
    🎙️ Te estoy escuchando...
  </div>

</footer>


</div>



<script>

let voiceEnabled=true;

let recognition=null;

let isListening=false;



const KNOWLEDGE=[

  {
    words:[
      "agencia",
      "funciona",
      "jm elite"
    ],

    answer:
      "JM Elite es la aplicación privada de la agencia. Desde aquí puedes acceder a tu perfil, formación, avisos, pagos, ranking, Sala Pro y herramientas de apoyo para emisoras."
  },

  {
    words:[
      "poppo",
      "directo",
      "transmitir",
      "emisora"
    ],

    answer:
      "En Poppo debes cuidar la constancia, el trato con las personas y el cumplimiento de las normas. Si tienes una duda concreta sobre directos, monedas, tareas o tu cuenta, pregúntame exactamente qué te ocurre."
  },

  {
    words:[
      "norma",
      "normas",
      "reglas"
    ],

    answer:
      "Las normas de JM Elite buscan proteger a las emisoras y mantener una agencia organizada. Debes respetar a compañeras y administración, cuidar tu cuenta y seguir las instrucciones oficiales de la agencia."
  },

  {
    words:[
      "pago",
      "pagos",
      "dinero",
      "bono",
      "bonos"
    ],

    answer:
      "La información de pagos y bonos debe revisarse siempre en la zona de Pagos de JM Elite. No des por válida una cantidad de memoria si existe un aviso o tabla más reciente de la agencia."
  },

  {
    words:[
      "sala",
      "sala pro"
    ],

    answer:
      "Sala Pro es el espacio interno de encuentro de JM Elite. Está pensado para reuniones, formación, seguimiento y actividades de la agencia."
  },

  {
    words:[
      "administrador",
      "administradora",
      "administración"
    ],

    answer:
      "La administración ayuda a organizar y acompañar a las emisoras. Las decisiones sensibles de gestión deben seguir los permisos definidos dentro de JM Elite."
  },

  {
    words:[
      "hola",
      "buenos dias",
      "buenas",
      "hey"
    ],

    answer:
      "Hola. Soy JM Nexus IA. 🦅 Puedes preguntarme sobre la agencia, Poppo, normas, pagos, formación o cómo usar JM Elite."
  }

];



function goBack(){

  window.location.href=
    "index.html";

}



function toggleVoice(){

  voiceEnabled=
    !voiceEnabled;


  const button=
    document.getElementById(
      "voiceToggle"
    );


  button.classList.toggle(
    "active",
    voiceEnabled
  );


  button.textContent=
    voiceEnabled
      ? "🔊"
      : "🔇";


  if(!voiceEnabled){

    window.speechSynthesis
      ?.cancel();

  }

}



function normalizeText(text){

  return String(
    text || ""
  )
    .toLowerCase()
    .normalize("NFD")
    .replace(
      /[\u0300-\u036f]/g,
      ""
    );

}



function findAnswer(text){

  const normalized=
    normalizeText(text);


  let bestAnswer="";

  let bestScore=0;


  KNOWLEDGE.forEach(item=>{

    let score=0;


    item.words.forEach(word=>{

      if(
        normalized.includes(
          normalizeText(word)
        )
      ){

        score++;

      }

    });


    if(score>bestScore){

      bestScore=score;

      bestAnswer=item.answer;

    }

  });


  if(bestScore>0){

    return bestAnswer;

  }


  return (
    "Todavía no tengo esa respuesta guardada en mi conocimiento de JM Elite. " +
    "Puedes reformular la pregunta o consultar con administración. " +
    "Mi base de conocimiento irá creciendo con la información oficial de la agencia."
  );

}



function addMessage(
  text,
  type
){

  const messages=
    document.getElementById(
      "messages"
    );


  const row=
    document.createElement(
      "div"
    );


  row.className=
    "message-row " + type;


  const bubble=
    document.createElement(
      "div"
    );


  bubble.className=
    "message";


  if(type==="ai"){

    const name=
      document.createElement(
        "span"
      );


    name.className=
      "ai-name";


    name.textContent=
      "🦅 JM NEXUS IA";


    bubble.appendChild(name);

  }


  const content=
    document.createElement(
      "span"
    );


  content.textContent=text;


  bubble.appendChild(content);


  row.appendChild(bubble);


  messages.appendChild(row);


  scrollBottom();

}



function scrollBottom(){

  const area=
    document.getElementById(
      "chatArea"
    );


  setTimeout(()=>{

    area.scrollTop=
      area.scrollHeight;

  },50);

}



function showTyping(show){

  document
    .getElementById("typing")
    .classList.toggle(
      "show",
      show
    );


  scrollBottom();

}



function answerQuestion(text){

  showTyping(true);


  const delay=
    550 +
    Math.min(
      text.length * 8,
      900
    );


  setTimeout(()=>{

    const answer=
      findAnswer(text);


    showTyping(false);


    addMessage(
      answer,
      "ai"
    );


    speak(answer);

  },delay);

}



function sendMessage(){

  const input=
    document.getElementById(
      "messageInput"
    );


  const text=
    input.value.trim();


  if(!text){

    return;

  }


  document
    .getElementById("welcome")
    .style.display=
      "none";


  document
    .getElementById("quickGrid")
    .style.display=
      "none";


  addMessage(
    text,
    "user"
  );


  input.value="";


  autoResize();


  answerQuestion(text);

}



function quickQuestion(text){

  document
    .getElementById("welcome")
    .style.display=
      "none";


  document
    .getElementById("quickGrid")
    .style.display=
      "none";


  addMessage(
    text,
    "user"
  );


  answerQuestion(text);

}



function speak(text){

  if(
    !voiceEnabled ||
    !("speechSynthesis" in window)
  ){

    return;

  }


  window.speechSynthesis.cancel();


  const utterance=
    new SpeechSynthesisUtterance(
      text
    );


  utterance.lang=
    "es-ES";


  utterance.rate=
    1;


  utterance.pitch=
    1;


  window.speechSynthesis.speak(
    utterance
  );

}



function startListening(){

  if(isListening){

    recognition?.stop();

    return;

  }


  const SpeechRecognition=
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;


  if(!SpeechRecognition){

    alert(
      "El reconocimiento de voz no está disponible en este navegador."
    );

    return;

  }


  recognition=
    new SpeechRecognition();


  recognition.lang=
    "es-ES";


  recognition.interimResults=
    false;


  recognition.maxAlternatives=
    1;


  recognition.onstart=
    function(){

      isListening=true;


      document
        .getElementById("micButton")
        .classList.add("listening");


      document
        .getElementById("voiceStatus")
        .classList.add("show");

  };


  recognition.onresult=
    function(event){

      const transcript=
        event
          .results[0][0]
          .transcript;


      document
        .getElementById("messageInput")
        .value=
          transcript;


      autoResize();


      setTimeout(
        sendMessage,
        220
      );

  };


  recognition.onerror=
    function(event){

      console.error(
        "Speech error:",
        event.error
      );


      if(
        event.error!=="no-speech"
      ){

        alert(
          "No pude escuchar bien. Prueba otra vez."
        );

      }

  };


  recognition.onend=
    function(){

      isListening=false;


      document
        .getElementById("micButton")
        .classList.remove("listening");


      document
        .getElementById("voiceStatus")
        .classList.remove("show");

  };


  try{

    recognition.start();

  }catch(error){

    console.error(error);

  }

}



function autoResize(){

  const input=
    document.getElementById(
      "messageInput"
    );


  input.style.height=
    "48px";


  input.style.height=
    Math.min(
      input.scrollHeight,
      120
    ) + "px";

}



function handleKey(event){

  if(
    event.key==="Enter" &&
    !event.shiftKey
  ){

    event.preventDefault();

    sendMessage();

  }

}



window.onload=function(){

  setTimeout(()=>{

    addMessage(

      "Hola. Soy JM Nexus IA. Puedes escribirme o pulsar el micrófono para hablar conmigo.",

      "ai"

    );

  },500);

};

</script>


</body>

  </html>
