<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Popu IA | JM Elite</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

:root{
  --gold:#f7d774;
  --gold2:#ffbd32;
  --blue:#008cff;
  --blue2:#00c8ff;
  --deep:#020713;
  --panel:#061326;
  --soft:#dce8ff;
  --green:#59ffb1;
  --danger:#ff6175;
}

html,
body{
  width:100%;
  min-height:100%;
  background:#020713;
  color:white;
}

body{
  min-height:100vh;
  overflow:hidden;
}

button,
textarea{
  font-family:inherit;
}

button{
  border:0;
  cursor:pointer;
  color:inherit;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(
      circle at top,
      #006cff70 0,
      #061326 28%,
      #020713 72%
    );
}


/* CABECERA */

.header{
  flex:none;

  padding:
    calc(12px + env(safe-area-inset-top))
    14px
    12px;

  display:flex;
  align-items:center;
  gap:12px;

  background:
    rgba(2,7,19,.94);

  border-bottom:
    1px solid
    rgba(0,183,255,.30);

  backdrop-filter:blur(18px);

  z-index:20;
}

.back{
  width:48px;
  height:48px;

  flex:none;

  border-radius:17px;

  background:
    rgba(0,86,210,.24);

  border:
    1px solid
    rgba(0,183,255,.48);

  font-size:25px;
}

.identity{
  flex:1;
  min-width:0;

  display:flex;
  align-items:center;
  gap:11px;
}

.ai-logo{
  position:relative;

  width:52px;
  height:52px;

  flex:none;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(
      circle at 35% 30%,
      #31dcff,
      #0066ff 45%,
      #061326 72%
    );

  border:
    2px solid
    var(--gold);

  box-shadow:
    0 0 18px
    rgba(0,183,255,.75),
    0 0 28px
    rgba(247,215,116,.20);

  font-size:27px;
}

.ai-logo::after{
  content:"";

  position:absolute;

  right:0;
  bottom:1px;

  width:12px;
  height:12px;

  border-radius:50%;

  background:
    var(--green);

  border:
    2px solid
    #061326;

  box-shadow:
    0 0 10px
    var(--green);
}

.identity-text{
  min-width:0;
}

.identity h1{
  color:var(--gold);

  font-size:19px;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.identity p{
  color:var(--soft);

  font-size:11px;

  margin-top:4px;
}

.voice-toggle{
  width:48px;
  height:48px;

  flex:none;

  border-radius:17px;

  background:
    rgba(0,86,210,.24);

  border:
    1px solid
    rgba(0,183,255,.48);

  font-size:22px;
}

.voice-toggle.active{
  color:#071426;

  background:
    linear-gradient(
      135deg,
      var(--gold),
      var(--gold2)
    );

  border-color:
    var(--gold);
}


/* ZONA CHAT */

.chat-area{
  flex:1;

  overflow-y:auto;

  padding:
    15px
    13px
    145px;

  scroll-behavior:smooth;
}

.welcome{
  margin:
    6px 0 18px;

  padding:
    20px 17px;

  border-radius:25px;

  background:
    linear-gradient(
      145deg,
      rgba(0,87,210,.28),
      rgba(0,12,38,.84)
    );

  border:
    1px solid
    rgba(247,215,116,.34);

  box-shadow:
    0 0 25px
    rgba(0,120,255,.20);

  text-align:center;
}

.welcome-icon{
  width:76px;
  height:76px;

  margin:
    0 auto 13px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(
      circle,
      #19cfff,
      #0756d7 55%,
      #061326 72%
    );

  border:
    2px solid
    var(--gold);

  box-shadow:
    0 0 30px
    rgba(0,183,255,.60);

  font-size:39px;
}

.welcome h2{
  color:var(--gold);

  font-size:24px;
}

.welcome p{
  max-width:360px;

  margin:
    9px auto 0;

  color:var(--soft);

  font-size:14px;

  line-height:1.5;
}

.user-chip{
  margin-top:13px;

  padding:
    8px 12px;

  display:inline-flex;
  align-items:center;
  gap:7px;

  border-radius:999px;

  background:
    rgba(0,96,220,.22);

  border:
    1px solid
    rgba(0,183,255,.36);

  color:#fff;

  font-size:12px;
}

.user-chip strong{
  color:var(--gold);
}

.quick-title{
  margin:
    16px 2px 10px;

  color:var(--gold);

  font-size:13px;

  text-transform:uppercase;

  letter-spacing:.7px;
}

.quick-grid{
  display:grid;

  grid-template-columns:
    1fr 1fr;

  gap:9px;

  margin-bottom:18px;
}

.quick{
  min-height:54px;

  padding:
    10px 12px;

  border-radius:17px;

  background:
    rgba(0,55,145,.22);

  border:
    1px solid
    rgba(0,183,255,.32);

  color:white;

  font-size:12px;

  font-weight:bold;

  text-align:left;
}

.quick span{
  margin-right:5px;

  font-size:19px;
}


/* MENSAJES */

.message-row{
  display:flex;

  margin:
    11px 0;
}

.message-row.user{
  justify-content:flex-end;
}

.message-row.ai{
  justify-content:flex-start;
}

.message{
  max-width:84%;

  padding:
    13px 15px;

  border-radius:20px;

  font-size:14px;

  line-height:1.5;

  word-wrap:break-word;

  white-space:pre-wrap;
}

.user .message{
  background:
    linear-gradient(
      135deg,
      #006cff,
      #00a9ff
    );

  border-bottom-right-radius:5px;

  box-shadow:
    0 0 18px
    rgba(0,126,255,.25);
}

.ai .message{
  background:
    rgba(7,25,55,.96);

  border:
    1px solid
    rgba(247,215,116,.30);

  border-bottom-left-radius:5px;
}

.ai-name{
  display:block;

  margin-bottom:6px;

  color:var(--gold);

  font-size:11px;

  font-weight:bold;
}

.typing{
  display:none;

  align-items:center;

  gap:6px;

  width:max-content;

  margin:
    10px 0;

  padding:
    12px 16px;

  border-radius:18px;

  background:#071937;

  border:
    1px solid
    rgba(0,183,255,.25);
}

.typing.show{
  display:flex;
}

.typing span{
  width:7px;
  height:7px;

  border-radius:50%;

  background:
    var(--gold);

  animation:
    pulse 1.2s infinite;
}

.typing span:nth-child(2){
  animation-delay:.2s;
}

.typing span:nth-child(3){
  animation-delay:.4s;
}

@keyframes pulse{

  0%,
  60%,
  100%{
    opacity:.25;
    transform:translateY(0);
  }

  30%{
    opacity:1;
    transform:translateY(-5px);
  }

}


/* ESCRITURA */

.composer{
  position:fixed;

  left:0;
  right:0;
  bottom:0;

  z-index:30;

  padding:
    10px 11px
    calc(
      11px +
      env(safe-area-inset-bottom)
    );

  background:
    linear-gradient(
      180deg,
      rgba(2,7,19,0),
      #020713 22%,
      #020713
    );
}

.composer-box{
  display:flex;

  align-items:flex-end;

  gap:8px;

  padding:8px;

  border-radius:25px;

  background:
    rgba(6,19,38,.98);

  border:
    1px solid
    rgba(0,183,255,.42);

  box-shadow:
    0 0 25px
    rgba(0,120,255,.25);
}

.mic,
.send{
  width:48px;
  height:48px;

  flex:none;

  border-radius:17px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:23px;
}

.mic{
  background:
    rgba(0,92,220,.25);

  border:
    1px solid
    rgba(0,183,255,.44);
}

.mic.listening{
  background:
    var(--danger);

  border-color:#ff9aaa;

  animation:
    listenPulse 1.1s infinite;
}

@keyframes listenPulse{

  50%{
    box-shadow:
      0 0 0 9px
      rgba(255,97,117,.15);
  }

}

.send{
  color:#061326;

  background:
    linear-gradient(
      135deg,
      var(--gold),
      var(--gold2)
    );

  font-weight:bold;
}

textarea{
  flex:1;

  min-height:48px;
  max-height:120px;

  resize:none;

  border:0;
  outline:0;

  padding:
    13px 5px 8px;

  background:transparent;

  color:white;

  font-size:15px;

  line-height:1.35;
}

textarea::placeholder{
  color:#9eacc5;
}

.voice-status{
  display:none;

  margin:
    7px 10px 0;

  color:#ff9aaa;

  font-size:11px;

  text-align:center;
}

.voice-status.show{
  display:block;
}


/* POPU */

.popu-face{
  overflow:visible;
}

.popu-eyes{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  color:white;
  font-size:18px;
  font-weight:900;
  letter-spacing:1px;
  text-shadow:0 0 12px rgba(255,255,255,.75);
}

.popu-face.speaking{
  animation:popuTalk .55s infinite alternate;
}

.popu-face.speaking .popu-eyes{
  animation:popuMouth .4s infinite alternate;
}

@keyframes popuTalk{
  from{
    transform:translateY(0) scale(1);
    box-shadow:
      0 0 18px rgba(0,183,255,.75),
      0 0 28px rgba(247,215,116,.20);
  }
  to{
    transform:translateY(-2px) scale(1.05);
    box-shadow:
      0 0 28px rgba(0,200,255,.95),
      0 0 36px rgba(247,215,116,.35);
  }
}

@keyframes popuMouth{
  from{transform:scaleY(.85)}
  to{transform:scaleY(1.12)}
}

.voice-invite{
  margin:0 0 17px;
  padding:13px;
  border-radius:20px;
  display:flex;
  align-items:center;
  gap:10px;
  background:
    linear-gradient(
      145deg,
      rgba(0,87,210,.24),
      rgba(0,12,38,.88)
    );
  border:1px solid rgba(247,215,116,.34);
}

.voice-invite.hidden{
  display:none;
}

.voice-invite-icon{
  width:44px;
  height:44px;
  flex:none;
  border-radius:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,92,220,.28);
  border:1px solid rgba(0,183,255,.38);
  font-size:21px;
}

.voice-invite-text{
  flex:1;
  min-width:0;
}

.voice-invite-text strong{
  display:block;
  color:var(--gold);
  font-size:13px;
}

.voice-invite-text span{
  display:block;
  margin-top:4px;
  color:var(--soft);
  font-size:10px;
  line-height:1.35;
}

.voice-invite button{
  flex:none;
  min-height:38px;
  padding:0 11px;
  border-radius:13px;
  color:#061326;
  background:
    linear-gradient(
      135deg,
      var(--gold),
      var(--gold2)
    );
  font-size:10px;
  font-weight:900;
}

@media(max-width:380px){

  .header{
    gap:8px;
  }

  .back,
  .voice-toggle{
    width:44px;
    height:44px;
  }

  .ai-logo{
    width:48px;
    height:48px;
  }

  .identity h1{
    font-size:17px;
  }

}

</style>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


</head>


<body>


<div class="app">
  <header class="header">

  <button
    class="back"
    type="button"
    onclick="goBack()"
    aria-label="Volver"
  >
    ←
  </button>


  <div class="identity">

    <div id="popuFace" class="ai-logo popu-face" aria-label="Popu IA">
      <span class="popu-eyes">•‿•</span>
    </div>

    <div class="identity-text">

      <h1>POPU IA</h1>

      <p id="connectionText">
        Sincronizando con JM Elite...
      </p>

    </div>

  </div>


  <button
    id="voiceToggle"
    class="voice-toggle"
    type="button"
    onclick="toggleVoice()"
    aria-label="Activar o desactivar voz"
  >
    🔇
  </button>

</header>



<main
  id="chatArea"
  class="chat-area"
>

  <section
    id="welcome"
    class="welcome"
  >

    <div class="welcome-icon popu-face welcome-popu">
      <span class="popu-eyes">•‿•</span>
    </div>

    <h2>
      POPU IA
    </h2>

    <p id="welcomeText">
      Estoy conectando con tu perfil y con el equipo de JM Elite.
    </p>

    <div class="user-chip">

      <span>👤</span>

      <span>
        Hablando con
        <strong id="currentUserName">
          identificando...
        </strong>
      </span>

    </div>

  </section>


  <section id="voiceInvite" class="voice-invite">

    <div class="voice-invite-icon">
      🔊
    </div>

    <div class="voice-invite-text">
      <strong>¿Quieres escuchar mi voz?</strong>
      <span>Puedo responderte hablando. Tú eliges.</span>
    </div>

    <button
      id="voiceInviteButton"
      type="button"
      onclick="enableVoiceFromInvite()"
    >
      Activar voz
    </button>

  </section>


  <div class="quick-title">
    Preguntas rápidas
  </div>


  <section
    id="quickGrid"
    class="quick-grid"
  >

    <button
      class="quick"
      type="button"
      onclick="quickQuestion('¿Quién soy?')"
    >
      <span>👤</span>
      ¿Quién soy?
    </button>


    <button
      class="quick"
      type="button"
      onclick="quickQuestion('¿Cuántas personas hay en la agencia?')"
    >
      <span>👥</span>
      Equipo JM Elite
    </button>


    <button
      class="quick"
      type="button"
      onclick="quickQuestion('¿Cómo funciona la agencia?')"
    >
      <span>🦅</span>
      Cómo funciona
    </button>


    <button
      class="quick"
      type="button"
      onclick="quickQuestion('¿Qué sabes de Poppo?')"
    >
      <span>🎙️</span>
      Ayuda Poppo
    </button>

  </section>


  <div id="messages"></div>


  <div
    id="typing"
    class="typing"
  >

    <span></span>
    <span></span>
    <span></span>

  </div>

</main>



<footer class="composer">

  <div class="composer-box">

    <button
      id="micButton"
      class="mic"
      type="button"
      onclick="startListening()"
      aria-label="Hablar"
    >
      🎙️
    </button>


    <textarea
      id="messageInput"
      rows="1"
      placeholder="Escribe o pulsa el micrófono..."
      oninput="autoResize()"
      onkeydown="handleKey(event)"
    ></textarea>


    <button
      class="send"
      type="button"
      onclick="sendMessage()"
      aria-label="Enviar"
    >
      ➤
    </button>

  </div>


  <div
    id="voiceStatus"
    class="voice-status"
  >
    🎙️ Te estoy escuchando...
  </div>

</footer>


</div>



<script>


const firebaseConfig={

  apiKey:
    "AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",

  authDomain:
    "agencia-jm-elite.firebaseapp.com",

  projectId:
    "agencia-jm-elite",

  storageBucket:
    "agencia-jm-elite.firebasestorage.app",

  messagingSenderId:
    "171676205335",

  appId:
    "1:171676205335:web:95443528659ab804fe7752"

};


if(!firebase.apps.length){

  firebase.initializeApp(
    firebaseConfig
  );

}


const db=
  firebase.firestore();



let voiceEnabled=
  localStorage.getItem("jm_popu_voice")==="on";

let recognition=null;

let isListening=false;

let currentUser=null;

let agencyMembers=[];

let membersLoaded=false;

let unsubscribeMembers=null;



function normalizeText(text){

  return String(
    text || ""
  )
    .toLowerCase()
    .normalize("NFD")
    .replace(
      /[\u0300-\u036f]/g,
      ""
    )
    .trim();

}



function safeValue(
  value,
  fallback=""
){

  if(
    value===undefined ||
    value===null ||
    value===""
  ){

    return fallback;

  }


  return String(value);

}



function getMemberName(member){

  return (
    member.artisticName ||
    member.nombreArtistico ||
    member.name ||
    member.nombre ||
    member.displayName ||
    member.email ||
    "Miembro JM Elite"
  );

}



function getMemberRole(member){

  return normalizeText(
    member.role ||
    member.rol ||
    "emisora"
  );

}



function getMemberCountry(member){

  return (
    member.country ||
    member.pais ||
    "País no indicado"
  );

}



function getMemberPoppoId(member){

  return (
    member.poppoId ||
    member.idPoppo ||
    member.poppoID ||
    ""
  );

}



function getMemberLevel(member){

  return (
    member.level ||
    member.nivel ||
    ""
  );

}



function isActiveMember(member){

  const status=
    normalizeText(
      member.status ||
      member.estado ||
      "activa"
    );


  return (
    status==="activa" ||
    status==="activo" ||
    status==="active" ||
    status==="miembro"
  );

}



function publicMember(member){

  return {

    email:
      safeValue(member.email),

    artisticName:
      getMemberName(member),

    role:
      getMemberRole(member),

    country:
      getMemberCountry(member),

    poppoId:
      safeValue(
        getMemberPoppoId(member)
      ),

    level:
      safeValue(
        getMemberLevel(member)
      ),

    status:
      safeValue(
        member.status ||
        member.estado ||
        "activa"
      )

  };

}



function getSessionData(){

  let storedUser={};


  try{

    storedUser=
      JSON.parse(
        localStorage.getItem(
          "jm_user"
        ) || "{}"
      );

  }catch(error){

    storedUser={};

  }


  return {

    email:
      normalizeText(
        localStorage.getItem(
          "jm_email"
        ) ||
        storedUser.email ||
        ""
      ),

    role:
      normalizeText(
        localStorage.getItem(
          "jm_role"
        ) ||
        storedUser.rol ||
        storedUser.role ||
        ""
      ),

    artisticName:
      storedUser.artisticName ||
      storedUser.nombreArtistico ||
      storedUser.name ||
      ""

  };

}



async function identifyCurrentUser(){

  const session=
    getSessionData();


  if(!session.email){

    currentUser=null;

    updateIdentityUI();

    return;

  }


  const localMatch=
    agencyMembers.find(member=>

      normalizeText(member.email)===
      session.email

    );


  if(localMatch){

    currentUser=
      publicMember(localMatch);

    updateIdentityUI();

    return;

  }


  try{

    const snapshot=
      await db
        .collection("usuarios")
        .where(
          "email",
          "==",
          session.email
        )
        .limit(1)
        .get();


    if(!snapshot.empty){

      currentUser=
        publicMember(
          snapshot.docs[0].data()
        );

    }else{

      currentUser={

        email:
          session.email,

        artisticName:
          session.artisticName ||
          session.email.split("@")[0],

        role:
          session.role ||
          "emisora",

        country:
          "País no indicado",

        poppoId:"",

        level:"",

        status:"activa"

      };

    }


  }catch(error){

    console.error(
      "Error identificando usuario:",
      error
    );


    currentUser={

      email:
        session.email,

      artisticName:
        session.artisticName ||
        session.email.split("@")[0],

      role:
        session.role ||
        "emisora",

      country:
        "País no indicado",

      poppoId:"",

      level:"",

      status:"activa"

    };

  }


  updateIdentityUI();

}



function updateIdentityUI(){

  const nameElement=
    document.getElementById(
      "currentUserName"
    );


  const welcomeText=
    document.getElementById(
      "welcomeText"
    );


  if(currentUser){

    const name=
      currentUser.artisticName;


    nameElement.textContent=
      name;


    welcomeText.textContent=
      "Hola " +
      name +
      ". Ya tengo identificado tu perfil dentro de JM Elite. Puedes escribirme o hablarme.";

  }else{

    nameElement.textContent=
      "usuario no identificado";


    welcomeText.textContent=
      "No he podido identificar tu perfil. Vuelve al inicio e inicia sesión para que pueda dirigirme a ti correctamente.";

  }

}



function startAgencySync(){

  if(unsubscribeMembers){

    unsubscribeMembers();

  }


  document
    .getElementById(
      "connectionText"
    )
    .textContent=
      "Sincronizando con JM Elite...";


  unsubscribeMembers=
    db
      .collection("usuarios")
      .onSnapshot(

        async snapshot=>{

          agencyMembers=
            snapshot.docs
              .map(doc=>({

                firestoreId:
                  doc.id,

                ...doc.data()

              }))
              .filter(
                isActiveMember
              );


          membersLoaded=true;


          document
            .getElementById(
              "connectionText"
            )
            .textContent=
              agencyMembers.length +
              " perfiles sincronizados · JM Elite";


          await identifyCurrentUser();

        },


        error=>{

          console.error(
            "Error sincronizando agencia:",
            error
          );


          membersLoaded=false;


          document
            .getElementById(
              "connectionText"
            )
            .textContent=
              "Conexión limitada con JM Elite";


          identifyCurrentUser();

        }

      );

}
  function findMemberByName(text){

  const normalized=
    normalizeText(text);


  return agencyMembers.find(member=>{

    const name=
      normalizeText(
        getMemberName(member)
      );


    if(!name){

      return false;

    }


    return (
      normalized.includes(name) ||
      name
        .split(" ")
        .filter(word=>word.length>3)
        .some(word=>
          normalized.includes(word)
        )
    );

  });

}



function roleLabel(role){

  const value=
    normalizeText(role);


  if(
    value==="agente" ||
    value==="fundador"
  ){

    return "agente fundador";

  }


  if(
    value==="administrador" ||
    value==="administradora"
  ){

    return "administrador";

  }


  return "emisora";

}



function describeMember(member){

  const data=
    publicMember(member);


  let answer=
    data.artisticName +
    " forma parte de JM Elite como " +
    roleLabel(data.role) +
    ".";


  if(
    data.country &&
    data.country!=="País no indicado"
  ){

    answer+=
      " Su país registrado es " +
      data.country +
      ".";

  }


  if(data.poppoId){

    answer+=
      " Su ID Poppo registrado es " +
      data.poppoId +
      ".";

  }


  if(data.level){

    answer+=
      " Figura con nivel " +
      data.level +
      ".";

  }


  return answer;

}



function randomAnswer(list){

  return list[
    Math.floor(
      Math.random() *
      list.length
    )
  ];

}

  if(!currentUser){

  if(currentUser.poppoId){

function getAgencyCountAnswer(){

  if(!membersLoaded){

    return (
      "Todavía estoy sincronizando los perfiles de JM Elite. " +
      "Pregúntame otra vez en unos segundos."
    );

  }


  const total=
    agencyMembers.length;


  const admins=
    agencyMembers.filter(member=>{

      const role=
        getMemberRole(member);


      return (
        role==="administrador" ||
        role==="administradora"
      );

    }).length;


  const agents=
    agencyMembers.filter(member=>{

      const role=
        getMemberRole(member);


      return (
        role==="agente" ||
        role==="fundador"
      );

    }).length;


  const emitters=
    Math.max(
      total -
      admins -
      agents,
      0
    );


  return (
    "Ahora mismo tengo sincronizados " +
    total +
    " perfiles activos de JM Elite. " +
    "Veo " +
    agents +
    " agente fundador, " +
    admins +
    " perfiles de administración y " +
    emitters +
    " emisoras."
  );

}

function findAnswer(text){

  const normalized=
    normalizeText(text);


  /* IDENTIDAD */


  if(
    normalized.includes("quien soy") ||
    normalized.includes("sabes quien soy") ||
    normalized.includes("me conoces")
  ){

    return getCurrentUserAnswer();

  }


  if(
    normalized.includes(
      "cuantas personas"
    ) ||
    normalized.includes(
      "cuantos perfiles"
    ) ||
    normalized.includes(
      "cuanta gente"
    ) ||
    normalized.includes(
      "cuantas emisoras"
    )
  ){

    return getAgencyCountAnswer();

  }


  /* CONVERSACIÓN NATURAL */


  if(
    normalized==="gracias" ||
    normalized.includes(
      "muchas gracias"
    ) ||
    normalized.includes(
      "gracias por tu ayuda"
    ) ||
    normalized.includes(
      "te lo agradezco"
    )
  ){

    const name=
      currentUser
        ? currentUser.artisticName
        : "";


    return randomAnswer([

      "Gracias a ti" +
      (
        name
          ? ", " + name
          : ""
      ) +
      ". 🤖 Estoy aquí para ayudarte dentro de JM Elite.",


      "Para eso estoy. 💙 Seguimos creciendo juntos en JM Elite.",


      "Gracias a ti por confiar en Popu IA. 🤖 Pregúntame cuando lo necesites.",


      "Siempre a tu disposición dentro de JM Elite. 💙"

    ]);

  }


  if(
    normalized==="hola" ||
    normalized==="buenas" ||
    normalized.includes(
      "buenos dias"
    ) ||
    normalized.includes(
      "buenas tardes"
    ) ||
    normalized.includes(
      "buenas noches"
    )
  ){

    const name=
      currentUser
        ? currentUser.artisticName
        : "";


    return randomAnswer([

      "Hola" +
      (
        name
          ? ", " + name
          : ""
      ) +
      ". 🦅 ¿En qué puedo ayudarte?",


      "Hola. 💙 Estoy conectado con JM Elite. Cuéntame qué necesitas.",


      "Bienvenido a Popu IA. 🤖 Estoy preparado para ayudarte."

    ]);

  }


  if(
    normalized.includes(
      "como estas"
    ) ||
    normalized==="que tal"
  ){

    return (
      "Estoy conectado y preparado. 🦅 " +
      "Gracias por preguntar. ¿En qué puedo ayudarte?"
    );

  }


  if(
    normalized.includes(
      "quien eres"
    ) ||
    normalized.includes(
      "como te llamas"
    ) ||
    normalized.includes(
      "tu nombre"
    )
  ){

    return (
      "Soy Popu IA. 🤖 " +
      "El asistente inteligente de Agencia JM Elite. " +
      "Reconozco el perfil que me habla y sincronizo el equipo activo de la agencia."
    );

  }


  if(
    normalized.includes("adios") ||
    normalized.includes(
      "hasta luego"
    ) ||
    normalized.includes(
      "nos vemos"
    )
  ){

    const name=
      currentUser
        ? currentUser.artisticName
        : "";


    return (
      "Hasta luego" +
      (
        name
          ? ", " + name
          : ""
      ) +
      ". 🤖 Aquí estaré cuando vuelvas."
    );

  }


  /* PERSONAS DE LA AGENCIA */


  const foundMember=
    findMemberByName(text);


  if(foundMember){

    return describeMember(
      foundMember
    );

  }


  /* CONOCIMIENTO JM ELITE */


  let bestAnswer="";

  let bestScore=0;


  KNOWLEDGE.forEach(item=>{

    let score=0;


    item.words.forEach(word=>{

      if(
        normalized.includes(
          normalizeText(word)
        )
      ){

        score++;

      }

    });


    if(score>bestScore){

      bestScore=score;

      bestAnswer=item.answer;

    }

  });


  if(bestScore>0){

    return bestAnswer;

  }


  return (
    "Todavía no tengo información suficiente para responderte eso con seguridad. 🦅 " +
    "Mi conocimiento de JM Elite y Poppo seguirá creciendo con la información oficial de la agencia."
  );

  }
  function addMessage(text,type){

  const messages=
    document.getElementById("messages");

  const row=
    document.createElement("div");

  row.className=
    "message-row " + type;


  const bubble=
    document.createElement("div");

  bubble.className="message";


  if(type==="ai"){

    const name=
      document.createElement("span");

    name.className="ai-name";

    name.textContent=
      "🤖 POPU IA";

    bubble.appendChild(name);

  }


  const content=
    document.createElement("span");

  content.textContent=text;

  bubble.appendChild(content);

  row.appendChild(bubble);

  messages.appendChild(row);

  scrollBottom();

}



function scrollBottom(){

  const area=
    document.getElementById("chatArea");

  setTimeout(()=>{

    area.scrollTop=
      area.scrollHeight;

  },50);

}



function showTyping(show){

  document
    .getElementById("typing")
    .classList.toggle(
      "show",
      show
    );

  scrollBottom();

}



function answerQuestion(text){

  showTyping(true);


  const delay=
    500 +
    Math.min(
      text.length * 7,
      800
    );


  setTimeout(()=>{

    const answer=
      findAnswer(text);

    showTyping(false);

    addMessage(
      answer,
      "ai"
    );

    speak(answer);

  },delay);

}



function sendMessage(){

  const input=
    document.getElementById(
      "messageInput"
    );

  const text=
    input.value.trim();


  if(!text){

    return;

  }


  document
    .getElementById("welcome")
    .style.display="none";


  document
    .getElementById("quickGrid")
    .style.display="none";


  addMessage(
    text,
    "user"
  );


  input.value="";

  autoResize();

  answerQuestion(text);

}



function quickQuestion(text){

  document
    .getElementById("welcome")
    .style.display="none";


  document
    .getElementById("quickGrid")
    .style.display="none";


  addMessage(
    text,
    "user"
  );


  answerQuestion(text);

}



function syncVoiceUI(){

  const button=
    document.getElementById(
      "voiceToggle"
    );

  const invite=

      "voiceInvite"
    );

  if(button){

    button.classList.toggle(

    );

    );

  }

function setPopuSpeaking(
  speaking
){

  document
    .querySelectorAll(
      ".popu-face"
    )
    .forEach(face=>{

      face.classList.toggle(
        "speaking",
        speaking
      );

    });

}


function toggleVoice(){

  voiceEnabled=
    !voiceEnabled;


  localStorage.setItem(

    "jm_popu_voice",

    voiceEnabled
      ? "on"
      : "off"

  );


  syncVoiceUI();


  if(
    !voiceEnabled &&
    "speechSynthesis" in window
  ){

    window
      .speechSynthesis
      .cancel();

    setPopuSpeaking(false);

  }


  if(voiceEnabled){

    addMessage(
      "🔊 Voz activada. Ahora puedo responderte hablando.",
      "ai"
    );

    speak(
      "Voz activada. Ahora puedo responderte hablando."
    );

  }

}

function speak(text){

  if(
    !voiceEnabled ||
    !(
      "speechSynthesis"
      in window
    )
  ){

    return;

  }


  window
    .speechSynthesis
    .cancel();


  setPopuSpeaking(true);


  const utterance=
    new SpeechSynthesisUtterance(
      text
    );


  utterance.lang="es-ES";

  utterance.rate=.98;

  utterance.pitch=1.05;


  utterance.onend=function(){

    setPopuSpeaking(false);

  };


  utterance.onerror=function(){

    setPopuSpeaking(false);

  };


  window
    .speechSynthesis
    .speak(
      utterance
    );

}

function startListening(){

  if(isListening){

    if(recognition){

      recognition.stop();

    }

    return;

  }


  const SpeechRecognition=

    window.SpeechRecognition ||

    window.webkitSpeechRecognition;


  if(!SpeechRecognition){

    alert(
      "El reconocimiento de voz no está disponible en este navegador."
    );

    return;

  }


  recognition=
    new SpeechRecognition();


  recognition.lang="es-ES";

  recognition.interimResults=false;

  recognition.maxAlternatives=1;


  recognition.onstart=
    function(){

      isListening=true;


      document
        .getElementById("micButton")
        .classList.add("listening");


      document
        .getElementById("voiceStatus")
        .classList.add("show");

    };


  recognition.onresult=
    function(event){

      const transcript=
        event
          .results[0][0]
          .transcript;


      document
        .getElementById("messageInput")
        .value=
          transcript;


      autoResize();


      setTimeout(
        sendMessage,
        220
      );

    };


  recognition.onerror=
    function(event){

      console.error(
        "Error de voz:",
        event.error
      );


      if(
        event.error!=="no-speech" &&
        event.error!=="aborted"
      ){

        alert(
          "No pude escucharte bien. Prueba otra vez."
        );

      }

    };


  recognition.onend=
    function(){

      isListening=false;


      document
        .getElementById("micButton")
        .classList.remove("listening");


      document
        .getElementById("voiceStatus")
        .classList.remove("show");

    };


  try{

    recognition.start();

  }catch(error){

    console.error(
      "No se pudo iniciar el micrófono:",
      error
    );

  }

}



function autoResize(){

  const input=
    document.getElementById(
      "messageInput"
    );


  input.style.height="48px";


  input.style.height=

    Math.min(
      input.scrollHeight,
      120
    ) + "px";

}



function handleKey(event){

  if(
    event.key==="Enter" &&
    !event.shiftKey
  ){

    event.preventDefault();

    sendMessage();

  }

}

  if(unsubscribeMembers){

    unsubscribeMembers();

  window.location.href=
