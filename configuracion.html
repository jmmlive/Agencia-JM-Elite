<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Configuración | JM Elite</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>*{box-sizing:border-box;font-family:Arial}body{margin:0;background:radial-gradient(circle at top,#006bff66,#020713 55%);color:#fff;min-height:100vh;padding:18px}.wrap{max-width:520px;margin:auto}.top{display:flex;gap:12px;align-items:center;margin-bottom:22px}.back{width:46px;height:46px;border-radius:15px;border:1px solid #00a2ff77;background:#082554;color:white;font-size:22px}h1{margin:0;color:#f7d774}.sub,.info{color:#dce8ff;font-size:13px}.card{background:#071837e8;border:1px solid #00a2ff55;border-radius:24px;padding:20px;box-shadow:0 0 28px #007bff33}.card h2{color:#f7d774;margin-top:0}label{display:block;font-size:13px;font-weight:bold;margin:13px 0 7px}input{width:100%;height:50px;border-radius:15px;border:1px solid #00a2ff77;background:#020d25;color:white;padding:0 14px;font-size:16px}.btn{width:100%;height:52px;border:0;border-radius:16px;margin-top:20px;background:linear-gradient(135deg,#d4a72d,#ffcf55);color:#061326;font-weight:900;font-size:16px}.msg{display:none;margin-top:15px;padding:13px;border-radius:14px}.show{display:block}.ok{background:#073b2a;border:1px solid #32e69a}.bad{background:#4b1020;border:1px solid #ff607d}.account{margin-top:16px;color:#9eb6db;font-size:12px;text-align:center}</style></head>
<body><div class="wrap"><div class="top"><button class="back" onclick="location.href='index.html'">‹</button><div><h1>Configuración</h1><div class="sub">Seguridad de tu cuenta JM Elite</div></div></div>
<section class="card"><h2>🔐 Cambiar contraseña</h2><p class="info">Usa mínimo 8 caracteres, con letras y números.</p><label>Contraseña actual</label><input id="currentPass" type="password"><label>Nueva contraseña</label><input id="newPass" type="password"><label>Repite la nueva contraseña</label><input id="repeatPass" type="password"><button id="saveBtn" class="btn" onclick="changePassword()">CAMBIAR CONTRASEÑA</button><div id="msg" class="msg"></div><div id="account" class="account"></div></section></div>
<script>
const firebaseConfig={apiKey:"AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",authDomain:"agencia-jm-elite.firebaseapp.com",projectId:"agencia-jm-elite",storageBucket:"agencia-jm-elite.firebasestorage.app",messagingSenderId:"171676205335",appId:"1:171676205335:web:95443528659ab804fe7752"};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();const email=(localStorage.getItem("jm_email")||"").trim().toLowerCase();const logged=localStorage.getItem("jm_logged")==="yes";const msg=document.getElementById("msg");document.getElementById("account").textContent=email?"Cuenta: "+email:"";if(!logged||!email)location.replace("index.html");function show(t,ok=false){msg.textContent=t;msg.className="msg show "+(ok?"ok":"bad")}
async function changePassword(){const current=document.getElementById("currentPass").value.trim(),next=document.getElementById("newPass").value.trim(),repeat=document.getElementById("repeatPass").value.trim(),btn=document.getElementById("saveBtn");if(!current||!next||!repeat){show("Completa los tres campos.");return}if(next.length<8||!/[A-Za-z]/.test(next)||!/[0-9]/.test(next)){show("La nueva contraseña debe tener mínimo 8 caracteres, letras y números.");return}if(next!==repeat){show("Las nuevas contraseñas no coinciden.");return}if(next===current){show("La nueva contraseña debe ser diferente.");return}btn.disabled=true;btn.textContent="GUARDANDO...";try{const snap=await db.collection("usuarios").where("email","==",email).limit(1).get();if(snap.empty){show("No encuentro tu cuenta activa.");return}const doc=snap.docs[0],u=doc.data();if(String(u.password||"")!==current){show("La contraseña actual no es correcta.");return}await doc.ref.update({password:next,passwordChangedAt:firebase.firestore.FieldValue.serverTimestamp()});["currentPass","newPass","repeatPass"].forEach(id=>document.getElementById(id).value="");show("✅ Contraseña cambiada correctamente.",true)}catch(e){console.error(e);show("No se pudo cambiar la contraseña. Revisa la conexión e inténtalo otra vez.")}finally{btn.disabled=false;btn.textContent="CAMBIAR CONTRASEÑA"}}
</script></body></html>
