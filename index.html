<script>

const AGENT_EMAILS=[
  "jesus@jmelite.com",
  "admin@jmelite.com",
  "elpepolan35@gmail.com"
];


const firebaseConfig={

  apiKey:
    "AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",

  authDomain:
    "agencia-jm-elite.firebaseapp.com",

  projectId:
    "agencia-jm-elite",

  storageBucket:
    "agencia-jm-elite.firebasestorage.app",

  messagingSenderId:
    "171676205335",

  appId:
    "1:171676205335:web:95443528659ab804fe7752"

};


firebase.initializeApp(
  firebaseConfig
);


const db=
  firebase.firestore();


let registerMode="";

let messageTimer=null;


function cleanText(value){

  return String(
    value || ""
  ).trim();

}


function cleanEmail(value){

  return cleanText(value)
    .toLowerCase();

}


function getCurrentEmail(){

  return cleanEmail(
    localStorage.getItem("jm_email")
  );

}


function getRole(){

  return cleanText(
    localStorage.getItem("jm_role")
  );

}


function getPermissions(){

  try{

    return JSON.parse(
      localStorage.getItem(
        "jm_permissions"
      ) || "{}"
    );

  }catch(error){

    return {};

  }

}


function isLogged(){

  return (
    localStorage.getItem("jm_logged")
    ===
    "yes"
  );

}


function isAgent(email){

  return AGENT_EMAILS.includes(
    cleanEmail(email)
  );

}


function canManage(){

  const role=getRole();

  return (
    role==="agente" ||
    role==="administrador" ||
    isAgent(getCurrentEmail())
  );

}


function canInvite(){

  const permissions=
    getPermissions();

  return (
    canManage() ||
    permissions.canInvite===true
  );

}


function showMessage(
  text,
  duration=2800
){

  const box=
    document.getElementById(
      "systemMessage"
    );

  if(!box){

    return;

  }

  clearTimeout(messageTimer);

  box.textContent=text;

  box.classList.add("show");

  messageTimer=setTimeout(
    function(){

      box.classList.remove("show");

    },
    duration
  );

}


function applyPermissions(){

  document
    .querySelectorAll(".agent-only")
    .forEach(function(element){

      element.classList.toggle(
        "show",
        canManage()
      );

    });


  document
    .querySelectorAll(".manager-only")
    .forEach(function(element){

      element.classList.toggle(
        "show",
        canInvite()
      );

    });

}


function saveSession(
  email,
  role,
  permissions,
  extra
){

  const finalEmail=
    cleanEmail(email);

  const finalRole=
    cleanText(role) || "emisora";

  const finalPermissions=
    permissions || {};

  const finalExtra=
    extra || {};


  localStorage.setItem(
    "jm_logged",
    "yes"
  );

  localStorage.setItem(
    "jm_email",
    finalEmail
  );

  localStorage.setItem(
    "jm_role",
    finalRole
  );

  localStorage.setItem(
    "jm_permissions",
    JSON.stringify(
      finalPermissions
    )
  );

  localStorage.setItem(
    "jm_user",
    JSON.stringify({

      email:finalEmail,

      rol:finalRole,

      ...finalExtra

    })
  );


  applyPermissions();

}


function clearSession(){

  [
    "jm_logged",
    "jm_email",
    "jm_role",
    "jm_permissions",
    "jm_user"

  ].forEach(function(key){

    localStorage.removeItem(key);

  });

}


function protectAgentSession(){

  const email=
    getCurrentEmail();


  if(
    isLogged() &&
    isAgent(email)
  ){

    saveSession(

      email,

      "administrador",

      {
        canInvite:true
      },

      {
        artisticName:"Jesús"
      }

    );

  }

}


function checkLogin(){

  const loginScreen=
    document.getElementById(
      "loginScreen"
    );


  protectAgentSession();


  if(isLogged()){

    loginScreen.classList.remove(
      "show"
    );

  }else{

    loginScreen.classList.add(
      "show"
    );

  }


  applyPermissions();

}


function goTo(
  page,
  permission
){

  const requiredPermission=
    permission || "";


  if(!isLogged()){

    document
      .getElementById("loginScreen")
      .classList.add("show");


    showMessage(
      "🔐 Inicia sesión para continuar."
    );


    return;

  }


  if(
    requiredPermission==="admin" &&
    !canManage()
  ){

    showMessage(
      "⛔ No tienes permiso de administración."
    );


    return;

  }


  if(
    requiredPermission==="invite" &&
    !canInvite()
  ){

    showMessage(
      "⛔ No tienes permiso para invitar."
    );


    return;

  }


  if(!page){

    showMessage(
      "⚠️ Acceso no disponible."
    );


    return;

  }


  window.location.assign(page);

}


function mainLoginAction(){

  if(registerMode!==""){

    sendRegisterRequest(
      registerMode
    );

    return;

  }


  login();

}


async function login(){

  const email=
    cleanEmail(
      document
        .getElementById("emailInput")
        .value
    );


  const password=
    cleanText(
      document
        .getElementById("passInput")
        .value
    );


  if(!email || !password){

    showMessage(
      "⚠️ Pon correo y contraseña."
    );

    return;

  }


  if(isAgent(email)){

    saveSession(

      email,

      "administrador",

      {
        canInvite:true
      },

      {
        artisticName:"Jesús"
      }

    );


    document
      .getElementById("loginScreen")
      .classList.remove("show");


    showMessage(
      "👑 Administración JM Elite activa."
    );


    return;

  }


  try{

    const snapshot=
      await db
        .collection("usuarios")
        .where(
          "email",
          "==",
          email
        )
        .limit(1)
        .get();


    if(snapshot.empty){

      showMessage(
        "⛔ Cuenta no encontrada o no aprobada."
      );

      return;

    }


    const user=
      snapshot.docs[0].data();


    if(
      cleanText(user.password)
      !==
      password
    ){

      showMessage(
        "⛔ Contraseña incorrecta."
      );

      return;

    }


    const status=
      cleanText(
        user.status ||
        user.estado
      ).toLowerCase();


    if(
      status &&
      status!=="activa" &&
      status!=="activo"
    ){

      showMessage(
        "⏳ Tu cuenta todavía no está activa."
      );

      return;

    }


    const role=
      cleanText(
        user.role ||
        user.rol
      ) ||
      "emisora";


    saveSession(

      email,

      role,

      user.permissions || {},

      {

        artisticName:
          user.artisticName ||
          user.nombre ||
          "",

        poppoId:
          user.poppoId ||
          ""

      }

    );


    document
      .getElementById("loginScreen")
      .classList.remove("show");


    showMessage(
      "✅ Bienvenida a JM Elite."
    );


  }catch(error){

    console.error(error);


    showMessage(
      "❌ Error al iniciar sesión: " +
      error.message,
      5000
    );

  }

}

async function sendRegisterRequest(type){

  const email=
    cleanEmail(
      document
        .getElementById("emailInput")
        .value
    );

  const password=
    cleanText(
      document
        .getElementById("passInput")
        .value
    );

  const artisticName=
    cleanText(
      document
        .getElementById("nameInput")
        .value
    );

  const poppoId=
    cleanText(
      document
        .getElementById("poppoIdInput")
        .value
    );

  const country=
    cleanText(
      document
        .getElementById("countryInput")
        .value
    );

  const agencyCode=
    cleanText(
      document
        .getElementById("agencyCodeInput")
        .value
    );

  const recommendationCode=
    cleanText(
      document
        .getElementById("recommendationCodeInput")
        .value
    );


  if(
    !email ||
    !password ||
    !artisticName ||
    !poppoId ||
    !country ||
    !agencyCode
  ){

    showMessage(
      "⚠️ Completa todos los datos obligatorios."
    );

    return;

  }


  if(
    type==="invitacion" &&
    !recommendationCode
  ){

    showMessage(
      "⚠️ Falta el código de recomendación."
    );

    return;

  }


  try{

    const userSnapshot=
      await db
        .collection("usuarios")
        .where(
          "email",
          "==",
          email
        )
        .limit(1)
        .get();


    if(!userSnapshot.empty){

      showMessage(
        "⛔ Ese correo ya tiene una cuenta."
      );

      return;

    }


    const requestSnapshot=
      await db
        .collection("pending_requests")
        .where(
          "email",
          "==",
          email
        )
        .limit(1)
        .get();


    if(!requestSnapshot.empty){

      showMessage(
        "⏳ Ya existe una solicitud con ese correo."
      );

      return;

    }


    await db
      .collection("pending_requests")
      .add({

        id:
          "JM-" +
          Date.now(),

        email:email,

        password:password,

        artisticName:artisticName,

        poppoId:poppoId,

        country:country,

        agencyAccessCode:
          agencyCode,

        recommendationCode:
          recommendationCode,

        invitationCode:
          recommendationCode,

        invitedBy:
          recommendationCode || "",

        registerType:type,

        appStartDate:
          new Date().toISOString(),

        appDay:1,

        level:1,

        badge:"Nueva",

        role:"emisora",

        permissions:{
          canInvite:false
        },

        status:"pendiente",

        createdAt:
          firebase
            .firestore
            .FieldValue
            .serverTimestamp(),

        date:
          new Date()
            .toLocaleString()

      });


    showMessage(
      "✅ Solicitud enviada para revisión.",
      4000
    );


    clearRegisterForm();

    backToLogin();


  }catch(error){

    console.error(error);

    showMessage(
      "❌ Error al enviar solicitud: " +
      error.message,
      5000
    );

  }

}


function clearRegisterForm(){

  [
    "emailInput",
    "passInput",
    "nameInput",
    "poppoIdInput",
    "countryInput",
    "agencyCodeInput",
    "recommendationCodeInput"

  ].forEach(function(id){

    const input=
      document.getElementById(id);

    if(input){

      input.value="";

    }

  });

}


async function recoverPassword(){

  const email=
    cleanEmail(
      document
        .getElementById("emailInput")
        .value
    );


  if(!email){

    showMessage(
      "⚠️ Escribe primero tu correo."
    );

  }


  try{

    await db
      .collection("recovery_requests")
      .add({

        status:"pendiente",

        createdAt:
          firebase
            .firestore
            .FieldValue
            .serverTimestamp(),

          new Date()
            .toLocaleString()

      });


    showMessage(
      "✅ Solicitud de recuperación enviada.",
      4000
    );


  }catch(error){

    console.error(error);

    showMessage(
      "❌ Error de recuperación: " +
      error.message,
      5000
    );

  }

}


function logout(){

  clearSession();

  closeDrawerDirect();

  backToLogin();

  document
    .getElementById("loginScreen")
    .classList.add("show");

  showMessage(
    "👋 Sesión cerrada."
  );

}


function openDrawer(){

  if(!isLogged()){

    document
      .getElementById("loginScreen")
      .classList.add("show");

    return;

  }


  applyPermissions();

  document
    .getElementById("drawer")
    .classList.add("show");

  document
    .body
    .classList
    .add("lock");

}


function closeDrawer(event){

  if(
    event.target.id==="drawer"
  ){

    closeDrawerDirect();

  }

}


function closeDrawerDirect(){

  const drawer=
    document.getElementById("drawer");


  if(drawer){

    drawer.classList.remove("show");

  }


  document
    .body
    .classList
    .remove("lock");

}


function autoFillInviteCode(){

  const params=
    new URLSearchParams(
      window.location.search
    );

  const inviteCode=
    cleanText(
      params.get("invite")
    );


  if(!inviteCode){

    return false;

  }


  clearSession();

  document
    .getElementById("loginScreen")
    .classList.add("show");

  openInviteRegister();


  const input=
    document.getElementById(
      "recommendationCodeInput"
    );


  input.value=inviteCode;

  input.readOnly=true;


  showMessage(
    "🎁 Invitación JM Elite detectada."
  );


  return true;

}


async function loadPendingNotifications(){

  const bell=
    document.getElementById(
      "notificationBell"
    );


  if(
    !bell ||
    !canManage()
  ){

    return;

  }


  try{

    const snapshot=
      await db
        .collection("pending_requests")
        .where(
          "status",
          "==",
          "pendiente"
        )
        .get();


    if(snapshot.size>0){

      bell.textContent=
        "🔔 " + snapshot.size;

    }else{

      bell.textContent="🔔";

    }


  }catch(error){

    console.error(
      "Error cargando notificaciones",
      error
    );

  }

}


document.addEventListener(
  "keydown",
  function(event){

    if(event.key==="Escape"){

      closeDrawerDirect();

    }


    if(
      event.key==="Enter" &&
      document
        .getElementById("loginScreen")
        .classList
        .contains("show")
    ){

      mainLoginAction();

    }

  }
);


window.addEventListener(
  "pageshow",
  function(){

    checkLogin();

    loadPendingNotifications();

  }
);


window.onload=
async function(){

  const params=
    new URLSearchParams(
      window.location.search
    );


  if(params.get("reset")==="1"){

    clearSession();

    window.history.replaceState(
      {},
      "",
      "index.html"
    );

    backToLogin();

    document
      .getElementById("loginScreen")
      .classList.add("show");

    return;

  }


  if(autoFillInviteCode()){

    return;

  }


  checkLogin();

  await loadPendingNotifications();

};
