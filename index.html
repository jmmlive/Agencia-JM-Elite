<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agencia JM Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

:root{
  --gold:#f6d46a;
  --blue:#006cff;
  --blue2:#00a8ff;
  --dark:#020713;
  --panel:#061326;
  --soft:#dce8ff;
}

body{
  background:#020713;
  color:white;
  min-height:100vh;
  padding-bottom:76px;
}

a{text-decoration:none;color:inherit}
button{border:0;cursor:pointer}

.app{
  min-height:100vh;
  padding:10px;
  background:
    radial-gradient(circle at top,#005dff 0%,#061326 38%,#020713 82%);
}

/* LOGIN */
.login{
  position:fixed;
  inset:0;
  z-index:9999;
  background:radial-gradient(circle at top,#006cff,#020713 72%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login.hidden{display:none}

.login-box{
  width:100%;
  max-width:360px;
  border-radius:24px;
  padding:24px;
  background:rgba(0,12,38,.94);
  border:1px solid rgba(246,212,106,.45);
  box-shadow:0 0 30px rgba(0,140,255,.45);
  text-align:center;
}

.login-logo{
  font-size:56px;
  margin-bottom:10px;
}

.login-box h1{
  color:var(--gold);
  font-size:28px;
  margin-bottom:8px;
}

.login-box p{
  color:var(--soft);
  font-size:14px;
  margin-bottom:18px;
}

.login-box input{
  width:100%;
  height:48px;
  margin-bottom:12px;
  border-radius:15px;
  border:1px solid rgba(0,168,255,.55);
  background:#061326;
  color:white;
  padding:0 14px;
  outline:none;
}

.login-box button{
  width:100%;
  height:50px;
  border-radius:16px;
  background:linear-gradient(135deg,#d8a92d,#ffcf55);
  color:#061326;
  font-weight:900;
  font-size:16px;
}

/* CABECERA */
.top-header{
  position:relative;
  height:66px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}

.top-icon{
  width:46px;
  height:46px;
  border-radius:16px;
  background:rgba(0,16,55,.72);
  border:1px solid rgba(246,212,106,.28);
  color:white;
  font-size:24px;
  box-shadow:0 0 16px rgba(0,140,255,.20);
}

.header-logo{
  height:56px;
  min-width:120px;
  border-radius:999px;
  background:rgba(0,14,45,.72);
  border:1px solid rgba(246,212,106,.38);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gold);
  font-weight:900;
  letter-spacing:1px;
  box-shadow:0 0 22px rgba(0,140,255,.28);
}

.notify{
  position:relative;
}

.notify:after{
  content:"";
  position:absolute;
  top:9px;
  right:10px;
  width:9px;
  height:9px;
  border-radius:50%;
  background:#ffbf2f;
}
  /*=================================
  BLOQUE 2 · BANNER PRINCIPAL
==================================*/

.hero{

position:relative;

height:250px;

border-radius:26px;

overflow:hidden;

background:#061326;

border:1px solid rgba(0,168,255,.55);

box-shadow:
0 0 28px rgba(0,140,255,.35);

margin-bottom:16px;

}

.hero img{

width:100%;
height:100%;

object-fit:cover;
object-position:center top;

display:block;

filter:
brightness(.90)
contrast(1.08)
saturate(1.15);

}

.hero::after{

content:"";

position:absolute;

inset:0;

background:
linear-gradient(
180deg,
rgba(0,0,0,.10),
rgba(0,0,0,.20),
rgba(2,7,19,.75)
);

}

.hero-top{

position:absolute;

top:14px;
left:14px;
right:14px;

display:flex;
justify-content:space-between;

z-index:5;

}

.hero-btn{

width:44px;
height:44px;

border-radius:15px;

background:rgba(0,12,38,.55);

border:1px solid rgba(255,255,255,.18);

backdrop-filter:blur(8px);

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

color:white;

}

.hero-text{

position:absolute;

left:18px;
bottom:20px;

z-index:5;

}

.hero-text h1{

font-size:30px;

color:var(--gold);

margin-bottom:6px;

}

.hero-text p{

font-size:14px;

color:white;

opacity:.92;

}

.status-bar{

margin-top:14px;

display:grid;

grid-template-columns:1fr 1fr 1fr auto;

gap:8px;

}

.status-card{

height:56px;

border-radius:16px;

background:rgba(0,16,55,.75);

border:1px solid rgba(0,168,255,.35);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}

.status-card b{

font-size:16px;

}

.status-card span{

font-size:11px;

color:var(--soft);

}

.enter-room{

padding:0 18px;

border-radius:16px;

background:linear-gradient(135deg,#006cff,#00a8ff);

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

color:white;

box-shadow:0 0 18px rgba(0,140,255,.35);

                         }
  /*=================================
  BLOQUE 3 · TARJETAS PREMIUM
==================================*/

.section-title{

margin:20px 0 12px;

font-size:17px;

font-weight:700;

color:var(--gold);

display:flex;
align-items:center;
gap:8px;

}

.section-title::after{

content:"";

flex:1;

height:1px;

background:linear-gradient(90deg,var(--gold),transparent);

}

.grid-3{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:10px;

margin-bottom:16px;

}

.grid-2{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:10px;

margin-bottom:16px;

}

.card{

position:relative;

min-height:120px;

border-radius:22px;

padding:14px;

background:
linear-gradient(180deg,#0b2d78,#061326);

border:1px solid rgba(0,168,255,.40);

box-shadow:
0 0 18px rgba(0,140,255,.22);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

transition:.25s;

}

.card:active{

transform:scale(.97);

}

.card .icon{

font-size:34px;

margin-bottom:10px;

}

.card b{

font-size:15px;

color:white;

}

.card small{

margin-top:5px;

font-size:11px;

color:var(--soft);

}

.card.blue{

background:linear-gradient(180deg,#006cff,#061326);

}

.card.green{

background:linear-gradient(180deg,#008c78,#061326);

}

.card.purple{

background:linear-gradient(180deg,#6b2dff,#061326);

}

.card.gold{

background:linear-gradient(180deg,#8c6900,#061326);

}

.card.red{

background:linear-gradient(180deg,#b22030,#061326);

}

.arrow{

position:absolute;

right:10px;

bottom:10px;

font-size:18px;

color:white;

opacity:.75;

}

  <style>
.side-menu{
  position:fixed;
  top:0;
  left:-290px;
  width:280px;
  height:100vh;
  background:#061326;
  border-right:1px solid rgba(246,212,106,.35);
  z-index:9999;
  padding:22px 16px;
  transition:.25s;
  box-shadow:0 0 30px rgba(0,140,255,.35);
}

.side-menu.open{left:0}

.menu-header h2{
  color:var(--gold);
  margin-bottom:18px;
}

.side-menu button{
  width:100%;
  height:46px;
  margin-bottom:9px;
  border-radius:14px;
  background:rgba(0,50,160,.45);
  border:1px solid rgba(0,168,255,.35);
  color:white;
  text-align:left;
  padding-left:14px;
  font-size:15px;
}

.logout-btn{
  background:rgba(160,0,35,.70)!important;
}

.bottom-nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:74px;
  background:rgba(0,12,38,.98);
  border-top:1px solid rgba(246,212,106,.25);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  z-index:999;
}

.nav-item{
  color:white;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
}

.nav-item span{
  font-size:24px;
}

.nav-item.active{
  color:var(--gold);
}
</style>

<script>
function openMenu(){
  document.getElementById("sideMenu").classList.add("open");
}

document.addEventListener("click",function(e){
  const menu=document.getElementById("sideMenu");
  if(!menu) return;

  const clickedMenu=menu.contains(e.target);
  const clickedButton=e.target.closest(".top-icon");

  if(!clickedMenu && !clickedButton){
    menu.classList.remove("open");
  }
});

function logout(){
  localStorage.removeItem("jm_logged");
  localStorage.removeItem("jm_email");
  alert("Sesión cerrada.");
  location.reload();
}
</script>
