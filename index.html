<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Agencia JM Elite</title>


<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}


:root{

  --gold:#f7d774;

  --gold2:#ffbd32;

  --blue:#007bff;

  --blue2:#00b7ff;

  --deep:#020713;

  --panel:#061326;

  --soft:#dce8ff;

  --danger:#ff4b5f;

  --green:#39ffcb;

}


html{

  scroll-behavior:smooth;

}


body{

  min-height:100vh;

  padding-bottom:78px;

  background:#020713;

  color:white;

}


body.lock{

  overflow:hidden;

}


a{

  color:inherit;

  text-decoration:none;

}


button{

  border:0;

  color:inherit;

  cursor:pointer;

}


button,
a{

  -webkit-tap-highlight-color:transparent;

}


button:focus-visible,
a:focus-visible,
input:focus-visible{

  outline:2px solid var(--gold);

  outline-offset:3px;

}


/* =========================
   LOGIN
========================= */


.login{

  position:fixed;

  inset:0;

  z-index:9999;

  display:none;

  align-items:center;

  justify-content:center;

  padding:20px;

  background:#020713;

}


.login.show{

  display:flex;

}


.login-bg{

  position:absolute;

  inset:0;

  background:
    url("agencia-jm-equipo-banner.png")
    center/cover no-repeat;

  filter:
    brightness(.34)
    saturate(1.3);

}


.login-bg::after{

  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      180deg,
      rgba(0,90,255,.35),
      #020713 86%
    );

}


.login-card{

  position:relative;

  width:100%;

  max-width:390px;

  padding:22px;

  border-radius:28px;

  background:
    rgba(0,12,38,.86);

  border:
    1px solid
    rgba(247,215,116,.45);

  backdrop-filter:blur(18px);

  box-shadow:
    0 0 38px
    rgba(0,140,255,.55);

  text-align:center;

}


.login-card h1{

  color:var(--gold);

  font-size:31px;

  margin-bottom:6px;

}


.login-card p{

  color:var(--soft);

  font-size:14px;

  margin-bottom:16px;

}


.input{

  min-height:48px;

  margin-bottom:10px;

  padding:0 13px;

  border-radius:16px;

  background:
    rgba(0,12,38,.86);

  border:
    1px solid
    rgba(0,183,255,.48);

  display:flex;

  align-items:center;

  gap:10px;

}


.input:focus-within{

  border-color:var(--gold);

  box-shadow:
    0 0 0 2px
    rgba(247,215,116,.12);

}


.input input{

  flex:1;

  min-width:0;

  height:46px;

  border:0;

  outline:0;

  background:transparent;

  color:white;

  font-size:15px;

}


.input input::placeholder{

  color:#aebbd2;

}


.login-btn{

  width:100%;

  height:50px;

  margin-top:4px;

  border-radius:17px;

  background:
    linear-gradient(
      135deg,
      #d4a72d,
      #ffcf55
    );

  color:#061326;

  font-size:17px;

  font-weight:900;

}


.login-btn:active{

  transform:scale(.985);

}


.login-links{

  display:grid;

  grid-template-columns:
    1fr 1fr;

  gap:9px;

  margin-top:12px;

}


.login-links button{

  min-height:40px;

  padding:5px;

  border-radius:999px;

  background:
    rgba(0,12,38,.65);

  border:
    1px solid
    rgba(0,183,255,.35);

  color:white;

  font-size:12px;

}


.login-foot{

  margin-top:14px;

  color:var(--soft);

  font-size:12px;

}


.register-extra{

  display:none;

  margin-top:8px;

}


.register-extra.show{

  display:block;

}


/* =========================
   APP
========================= */


.app{

  min-height:100vh;

  padding:10px;

  background:
    radial-gradient(
      circle at top,
      #006cff88 0%,
      #061326 35%,
      #020713 78%
    );

}


/* =========================
   HERO
========================= */


.hero{

  position:relative;

  height:225px;

  overflow:hidden;

  border-radius:26px;

  border:
    1px solid
    rgba(0,183,255,.58);

  background:#061326;

  box-shadow:
    0 0 28px
    rgba(0,140,255,.42);

}


.hero img{

  width:100%;

  height:100%;

  object-fit:cover;

  object-position:center top;

  display:block;

  filter:
    saturate(1.22)
    contrast(1.08)
    brightness(.90);

}


.hero::after{

  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      90deg,
      rgba(0,0,0,.72),
      transparent 55%,
      rgba(0,0,0,.35)
    ),
    linear-gradient(
      180deg,
      rgba(0,0,0,.05),
      rgba(2,7,19,.72)
    );

}


.hero-actions{

  position:absolute;

  top:14px;

  left:14px;

  right:14px;

  z-index:5;

  display:flex;

  justify-content:space-between;

}


.hero-btn{

  width:48px;

  height:48px;

  border-radius:17px;

  background:
    rgba(0,12,38,.60);

  border:
    1px solid
    rgba(255,255,255,.22);

  backdrop-filter:blur(10px);

  font-size:27px;

}


.hero-btn:active{

  transform:scale(.94);

}


.bell{

  position:relative;

}


.bell.has-pending::after{

  content:"";

  position:absolute;

  top:9px;

  right:9px;

  width:11px;

  height:11px;

  border-radius:50%;

  background:var(--gold2);

  box-shadow:
    0 0 10px
    var(--gold2);

}


.hero-title{

  position:absolute;

  z-index:5;

  left:18px;

  bottom:20px;

}


.hero-title h1{

  color:white;

  font-size:29px;

  line-height:1.02;

}


.hero-title h1 span{

  display:block;

  color:var(--gold);

}


.hero-title p{

  margin-top:8px;

  font-size:14px;

}


.hero-line{

  width:66px;

  height:3px;

  margin-top:11px;

  border-radius:99px;

  background:var(--gold);

}


/* =========================
   ESTADO SALA
========================= */


.status{

  min-height:48px;

  margin:10px 0 16px;

  padding:5px 7px;

  border-radius:999px;

  background:
    rgba(0,12,38,.76);

  border:
    1px solid
    rgba(0,183,255,.30);

  display:grid;

  grid-template-columns:
    1.1fr .8fr .9fr auto;

  align-items:center;

  gap:4px;

}


.status div{

  text-align:center;

  border-right:
    1px solid
    rgba(255,255,255,.10);

}


.status strong{

  display:block;

  font-size:13px;

}


.status span{

  color:var(--soft);

  font-size:9px;

}


.status .live{

  color:#69ff55;

  font-weight:900;

}


.status button{

  min-height:34px;

  padding:0 13px;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #006cff,
      #00b7ff
    );

  font-size:12px;

  font-weight:800;

}


/* =========================
   SECCIONES
========================= */


.section-title{

  display:flex;

  align-items:center;

  gap:8px;

  margin:18px 0 10px;

  color:var(--gold);

  font-size:16px;

  text-transform:uppercase;

}


.section-title::after{

  content:"";

  flex:1;

  height:1px;

  background:
    linear-gradient(
      90deg,
      var(--gold),
      transparent
    );

}


.icon-panel{

  margin-bottom:16px;

  padding:14px 10px;

  border-radius:24px;

  background:
    rgba(0,12,38,.48);

  border:
    1px solid
    rgba(0,183,255,.22);

}


.icon-grid{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:12px;

}


.icon-link{

  min-width:0;

  background:transparent;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:flex-start;

  gap:7px;

  text-align:center;

}


.icon-circle{

  width:58px;

  height:58px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  background:
    rgba(0,12,38,.65);

  border:
    1px solid
    rgba(0,183,255,.45);

  box-shadow:
    0 0 18px
    rgba(0,140,255,.35);

  font-size:28px;

}


.icon-link:active .icon-circle{

  transform:scale(.94);

}


.icon-link b{

  color:white;

  font-size:12px;

}


.icon-link small{

  color:var(--soft);

  font-size:10px;

}


.purple{

  border-color:#b856ff;

  box-shadow:
    0 0 18px
    #9b32ff66;

}


.green{

  border-color:#39ffcb;

  box-shadow:
    0 0 18px
    #39ffcb55;

}


.gold{

  border-color:var(--gold);

  box-shadow:
    0 0 18px
    rgba(247,215,116,.50);

}


.red{

  border-color:#ff5b60;

  box-shadow:
    0 0 18px
    #ff5b6066;

}


.dots-icon{

  display:flex;

  justify-content:center;

  align-items:center;

  gap:8px;

}


.dots-icon span{

  width:8px;

  height:8px;

  border-radius:50%;

  background:white;

}


/* =========================
   DRAWER
========================= */


.drawer{

  position:fixed;

  inset:0;

  z-index:9000;

  display:none;

  background:
    rgba(0,0,0,.68);

}


.drawer.show{

  display:block;

}


.drawer-panel{

  width:82%;

  max-width:320px;

  height:100%;

  padding:22px 16px;

  overflow-y:auto;

  background:
    rgba(6,19,38,.98);

  border-right:
    1px solid
    rgba(247,215,116,.35);

}


.drawer h2{

  margin-bottom:16px;

  color:var(--gold);

}


.drawer-menu{

  display:flex;

  flex-direction:column;

}


.drawer-menu button{

  width:100%;

  min-height:46px;

  margin-bottom:9px;

  padding:0 14px;

  border-radius:15px;

  background:
    rgba(0,60,180,.38);

  border:
    1px solid
    rgba(0,183,255,.35);

  color:white;

  display:flex;

  align-items:center;

  text-align:left;

  font-size:15px;

}


.agent-only,
.manager-only{

  display:none!important;

}


.agent-only.show,
.manager-only.show{

  display:flex!important;

}


.logout{

  background:
    rgba(130,0,25,.75)!important;

  border-color:
    rgba(255,80,80,.45)!important;

}


/* =========================
   BARRA INFERIOR
========================= */


.bottom-nav{

  position:fixed;

  left:0;

  right:0;

  bottom:0;

  z-index:999;

  height:74px;

  background:
    rgba(0,12,38,.98);

  border-top:
    1px solid
    rgba(247,215,116,.26);

  display:grid;

  grid-template-columns:
    repeat(5,1fr);

}


.nav-item{

  background:transparent;

  color:white;

  font-size:11px;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  gap:3px;

}


.nav-item .icon{

  font-size:24px;

}


.nav-item.active{

  color:var(--gold);

}


/* =========================
   MENSAJE SISTEMA
========================= */


.system-message{

  position:fixed;

  left:16px;

  right:16px;

  bottom:90px;

  z-index:9500;

  display:none;

  max-width:420px;

  margin:auto;

  padding:14px 16px;

  border-radius:16px;

  background:#07172f;

  border:
    1px solid
    rgba(0,183,255,.55);

  box-shadow:
    0 0 25px
    rgba(0,120,255,.35);

  color:white;

  font-size:14px;

  line-height:1.4;

}


.system-message.show{

  display:block;

}


@media(max-width:380px){

  .icon-grid{

    gap:9px;

  }


  .icon-circle{

    width:54px;

    height:54px;

    font-size:25px;

  }


  .status{

    grid-template-columns:
      1fr .75fr .8fr auto;

  }


  .status button{

    padding:0 8px;

  }

}

</style>


<script
  src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"
></script>


<script
  src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"
></script>


</head>


<body>
  <section
  id="loginScreen"
  class="login"
  aria-label="Acceso JM Elite"
>

      >

    </div>


    <div class="input">

      <span>🔒</span>

      <input
        id="passInput"
        type="password"
        autocomplete="current-password"
        placeholder="Contraseña"

    </div>


    <div
      id="registerExtra"
      class="register-extra"
    >

      <div class="input">

        <span>👤</span>

        <input

          type="text"
          placeholder="Nombre artístico"
        >

      </div>


      <div class="input">

        <span>🆔</span>

        <input
          id="poppoIdInput"
          type="text"
          inputmode="numeric"
          placeholder="ID Poppo"
        >

      </div>


      <div class="input">

        <span>🌍</span>

        <input
          id="countryInput"
          type="text"
          placeholder="País"
        >

      </div>


      <div class="input">

        <span>🔑</span>

        <input
          id="agencyCodeInput"
          type="text"

      </div>


      <div class="input">

        <span>🎁</span>

        <input
          id="recommendationCodeInput"
          type="text"
          placeholder="Código de recomendación"

      </div>

    </div>


    <button
      id="mainLoginBtn"
      class="login-btn"
      type="button"
      onclick="mainLoginAction()"

      ENTRAR

    <div class="login-links">

      <button
        type="button"
        onclick="openNormalRegister()"

        Registro normal
      </button>


      <button
        type="button"
        onclick="openInviteRegister()"
      >
        Registro invitación
      </button>


      <button
        type="button"
        onclick="recoverPassword()"
      >
        Recuperar
      </button>


      <button
        type="button"
        onclick="backToLogin()"
      >
        Volver
      </button>

    </div>


    <div class="login-foot">
      🔐 Seguridad y confianza · Agencia JM Elite
    </div>

  </div>

</section>



<section

      <button

</section>

></div>



<script>


const AGENT_EMAILS=[

  "jesus@jmelite.com",

  "admin@jmelite.com",

  "elpepolan35@gmail.com"

];


const firebaseConfig={

  apiKey:
    "AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",

  authDomain:
    "agencia-jm-elite.firebaseapp.com",

  projectId:
    "agencia-jm-elite",

  storageBucket:
    "agencia-jm-elite.firebasestorage.app",

  messagingSenderId:
    "171676205335",

  appId:
    "1:171676205335:web:95443528659ab804fe7752"

};


firebase.initializeApp(firebaseConfig);


const db=
  firebase.firestore();


let registerMode="";


let messageTimer=null;



function cleanText(value){

  return String(
    value || ""
  ).trim();

}



function cleanEmail(value){

  return cleanText(value)
    .toLowerCase();

}



function isAgent(email){

  return AGENT_EMAILS.includes(
    cleanEmail(email)
  );

}



function getRole(){

  return cleanText(
    localStorage.getItem("jm_role")
  );

}



function getPermissions(){

  try{

    return JSON.parse(
      localStorage.getItem(
        "jm_permissions"
      ) || "{}"
    );

  }catch(error){

    return {};

  }

}



function getCurrentEmail(){

  return cleanEmail(
    localStorage.getItem("jm_email")
  );

}



function isLogged(){

  return (
    localStorage.getItem("jm_logged")
    ===
    "yes"
  );

}



function canManage(){

  const role=getRole();


  return (

    role==="agente" ||

    role==="administrador" ||

    isAgent(
      getCurrentEmail()
    )

  );

}



function canInvite(){

  const permissions=
    getPermissions();


  return (

    canManage() ||

    permissions.canInvite===true

  );

}



function showSystemMessage(
  text,
  duration=2600
){

  const box=
    document.getElementById(
      "systemMessage"
    );


  if(!box){

    return;

  }


  clearTimeout(
    messageTimer
  );


  box.textContent=text;


  box.classList.add(
    "show"
  );


  messageTimer=setTimeout(
    ()=>{

      box.classList.remove(
        "show"
      );

    },
    duration
  );

}



function applyPermissions(){

  document
    .querySelectorAll(
      ".agent-only"
    )
    .forEach(element=>{

      element.classList.toggle(
        "show",
        canManage()
      );

    });


  document
    .querySelectorAll(
      ".manager-only"
    )
    .forEach(element=>{

      element.classList.toggle(
        "show",
        canInvite()
      );

    });

}



function saveSession(
  email,
  role,
  permissions={},
  extra={}
){

  const finalEmail=
    cleanEmail(email);


  const finalRole=
    cleanText(role) ||
    "emisora";


  localStorage.setItem(
    "jm_logged",
    "yes"
  );


  localStorage.setItem(
    "jm_email",
    finalEmail
  );


  localStorage.setItem(
    "jm_role",
    finalRole
  );


  localStorage.setItem(
    "jm_permissions",
    JSON.stringify(
      permissions || {}
    )
  );


  localStorage.setItem(
    "jm_user",
    JSON.stringify({

      email:finalEmail,

      rol:finalRole,

      ...extra

    })
  );


  applyPermissions();

}
  function clearSession(){

  [
    "jm_logged",
    "jm_email",
    "jm_role",
    "jm_permissions",
    "jm_user"

  ].forEach(key=>{

    localStorage.removeItem(key);

  });

}



function checkLogin(){

  const loginScreen=
    document.getElementById(
      "loginScreen"
    );


  const email=
    getCurrentEmail();


  if(
    isLogged() &&
    isAgent(email)
  ){

    localStorage.setItem(
      "jm_role",
      "administrador"
    );


    localStorage.setItem(
      "jm_permissions",
      JSON.stringify({
        canInvite:true
      })
    );

  }


  if(isLogged()){

    loginScreen?.classList.remove(
      "show"
    );

  }else{

    loginScreen?.classList.add(
      "show"
    );

  }


  applyPermissions();

}



function goTo(
  page,
  permission=""
){

  if(!isLogged()){

    document
      .getElementById("loginScreen")
      ?.classList.add("show");


    showSystemMessage(
      "🔐 Inicia sesión para continuar."
    );


    return;

  }


  if(
    permission==="admin" &&
    !canManage()
  ){

    showSystemMessage(
      "⛔ No tienes permiso de administración."
    );


    return;

  }


  if(
    permission==="invite" &&
    !canInvite()
  ){

    showSystemMessage(
      "⛔ No tienes permiso para invitar usuarios."
    );


    return;

  }


  if(!page){

    showSystemMessage(
      "⚠️ Acceso no disponible."
    );


    return;

  }


  window.location.href=page;

}



function mainLoginAction(){

  if(registerMode){

    sendRegisterRequest(
      registerMode
    );


    return;

  }


  login();

}



async function login(){

  const email=
    cleanEmail(
      document
        .getElementById("emailInput")
        .value
    );


  const password=
    cleanText(
      document
        .getElementById("passInput")
        .value
    );


  if(
    !email ||
    !password
  ){

    showSystemMessage(
      "⚠️ Pon correo y contraseña."
    );


    return;

  }


  if(isAgent(email)){

    saveSession(

      email,

      "administrador",

      {
        canInvite:true
      },

      {
        artisticName:"Jesús"
      }

    );


    document
      .getElementById("loginScreen")
      .classList.remove("show");


    showSystemMessage(
      "👑 Administración JM Elite activa."
    );


    return;

  }


  try{

    const snapshot=
      await db
        .collection("usuarios")
        .where(
          "email",
          "==",
          email
        )
        .limit(1)
        .get();


    if(snapshot.empty){

      showSystemMessage(
        "⛔ Cuenta no encontrada o todavía no aprobada."
      );


      return;

    }


    const user=
      snapshot.docs[0].data();


    if(
      cleanText(user.password)
      !==
      password
    ){

      showSystemMessage(
        "⛔ Contraseña incorrecta."
      );


      return;

    }


    const status=
      cleanText(
        user.status ||
        user.estado
      ).toLowerCase();


    if(
      status &&
      status!=="activa" &&
      status!=="activo"
    ){

      showSystemMessage(
        "⏳ Tu cuenta todavía no está activa."
      );


      return;

    }


    const role=
      cleanText(
        user.role ||
        user.rol
      ) ||
      "emisora";


    saveSession(

      email,

      role,

      user.permissions || {},

      {

        artisticName:
          user.artisticName ||
          user.nombre ||
          "",

        poppoId:
          user.poppoId ||
          ""

      }

    );


    document
      .getElementById("loginScreen")
      .classList.remove("show");


    showSystemMessage(
      "✅ Bienvenida a JM Elite."
    );


  }catch(error){

    console.error(error);


    showSystemMessage(
      "❌ Error al iniciar sesión: " +
      error.message,
      5000
    );

  }

}



function openNormalRegister(){

  registerMode="normal";


  document
    .getElementById("registerExtra")
    .classList.add("show");


  document
    .getElementById(
      "recommendationCodeInput"
    )
    .placeholder=
      "Código de recomendación (opcional)";


  document
    .getElementById("loginSubtitle")
    .textContent=
      "Registro normal de emisora";


  document
    .getElementById("mainLoginBtn")
    .textContent=
      "ENVIAR SOLICITUD";

}



function openInviteRegister(){

  registerMode="invitacion";


  document
    .getElementById("registerExtra")
    .classList.add("show");


  document
    .getElementById(
      "recommendationCodeInput"
    )
    .placeholder=
      "Código de recomendación";


  document
    .getElementById("loginSubtitle")
    .textContent=
      "Registro por invitación";


  document
    .getElementById("mainLoginBtn")
    .textContent=
      "ENVIAR SOLICITUD";

}



function backToLogin(){

  registerMode="";


  document
    .getElementById("registerExtra")
    .classList.remove("show");


  document
    .getElementById("loginSubtitle")
    .textContent=
      "Acceso privado para emisoras";


  document
    .getElementById("mainLoginBtn")
    .textContent=
      "ENTRAR";

}



async function sendRegisterRequest(
  type
){

  const email=
    cleanEmail(
      document
        .getElementById("emailInput")
        .value
    );


  const password=
    cleanText(
      document
        .getElementById("passInput")
        .value
    );


  const artisticName=
    cleanText(
      document
        .getElementById("nameInput")
        .value
    );


  const poppoId=
    cleanText(
      document
        .getElementById("poppoIdInput")
        .value
    );


  const country=
    cleanText(
      document
        .getElementById("countryInput")
        .value
    );


  const agencyCode=
    cleanText(
      document
        .getElementById("agencyCodeInput")
        .value
    );


  const recommendationCode=
    cleanText(
      document
        .getElementById(
          "recommendationCodeInput"
        )
        .value
    );


  if(
    !email ||
    !password ||
    !artisticName ||
    !poppoId ||
    !country ||
    !agencyCode
  ){

    showSystemMessage(
      "⚠️ Completa todos los datos obligatorios."
    );


    return;

  }


  if(
    type==="invitacion" &&
    !recommendationCode
  ){

    showSystemMessage(
      "⚠️ Falta el código de recomendación."
    );


    return;

  }


  try{

    const duplicateUser=
      await db
        .collection("usuarios")
        .where(
          "email",
          "==",
          email
        )
        .limit(1)
        .get();


    if(!duplicateUser.empty){

      showSystemMessage(
        "⛔ Ese correo ya tiene una cuenta."
      );


      return;

    }


    const duplicateRequest=
      await db
        .collection("pending_requests")
        .where(
          "email",
          "==",
          email
        )
        .limit(1)
        .get();


    if(!duplicateRequest.empty){

      showSystemMessage(
        "⏳ Ya existe una solicitud con ese correo."
      );


      return;

    }


    await db
      .collection("pending_requests")
      .add({

        id:
          "JM-" +
          Date.now(),

        email:email,

        password:password,

        artisticName:artisticName,

        poppoId:poppoId,

        country:country,

        agencyAccessCode:
          agencyCode,

        recommendationCode:
          recommendationCode,

        invitationCode:
          recommendationCode,

        invitedBy:
          recommendationCode || "",

        registerType:type,

        appStartDate:
          new Date().toISOString(),

        appDay:1,

        level:1,

        badge:"Nueva",

        role:"emisora",

        permissions:{
          canInvite:false
        },

        status:"pendiente",

        createdAt:
          firebase.firestore
            .FieldValue
            .serverTimestamp(),

        date:
          new Date()
            .toLocaleString()

      });


    showSystemMessage(
      "✅ Solicitud enviada para revisión.",
      4000
    );


    clearRegisterForm();


    backToLogin();


  }catch(error){

    console.error(error);


    showSystemMessage(
      "❌ Error al enviar solicitud: " +
      error.message,
      5000
    );

  }

}



function clearRegisterForm(){

  [
    "emailInput",
    "passInput",
    "nameInput",
    "poppoIdInput",
    "countryInput",
    "agencyCodeInput",
    "recommendationCodeInput"

  ].forEach(id=>{

    const input=
      document.getElementById(id);


    if(input){

      input.value="";

    }

  });

  }
  function recoverPassword(){

  const email=
    cleanEmail(
      document
        .getElementById("emailInput")
        .value
    );


  if(!email){

    showSystemMessage(
      "⚠️ Escribe primero tu correo."
    );

    return;

  }


  db
    .collection("usuarios")
    .where(
      "email",
      "==",
      email
    )
    .limit(1)
    .get()

    .then(snapshot=>{

      if(snapshot.empty){

        showSystemMessage(
          "⛔ No encontramos una cuenta con ese correo."
        );

        return;

      }


      return db
        .collection("recovery_requests")
        .add({

          email:email,

          status:"pendiente",

          createdAt:
            firebase.firestore
              .FieldValue
              .serverTimestamp(),

          date:
            new Date()
              .toLocaleString()

        });

    })

    .then(result=>{

      if(!result){

        return;

      }


      showSystemMessage(
        "✅ Solicitud de recuperación enviada a administración.",
        4500
      );

    })

    .catch(error=>{

      console.error(error);


      showSystemMessage(
        "❌ Error en recuperación: " +
        error.message,
        5000
      );

    });

}



function logout(){

  clearSession();


  closeDrawerDirect();


  backToLogin();


  document
    .getElementById("loginScreen")
    .classList.add("show");


  showSystemMessage(
    "👋 Sesión cerrada correctamente."
  );

}



function openDrawer(){

  if(!isLogged()){

    document
      .getElementById("loginScreen")
      .classList.add("show");


    return;

  }


  applyPermissions();


  document
    .getElementById("drawer")
    .classList.add("show");


  document
    .body
    .classList
    .add("lock");

}



function closeDrawer(event){

  if(
    event.target.id
    ===
    "drawer"
  ){

    closeDrawerDirect();

  }

}



function closeDrawerDirect(){

  document
    .getElementById("drawer")
    ?.classList
    .remove("show");


  document
    .body
    .classList
    .remove("lock");

}



function autoFillInviteCode(){

  const params=
    new URLSearchParams(
      window.location.search
    );


  const inviteCode=
    cleanText(
      params.get("invite")
    );


  if(!inviteCode){

    return false;

  }


  clearSession();


  document
    .getElementById("loginScreen")
    .classList.add("show");


  openInviteRegister();


  const input=
    document.getElementById(
      "recommendationCodeInput"
    );


  if(input){

    input.value=
      inviteCode;


    input.readOnly=true;

  }


  showSystemMessage(
    "🎁 Invitación JM Elite detectada."
  );


  return true;

}



async function loadPendingNotifications(){

  const bell=
    document.getElementById(
      "notificationBell"
    );


  if(!bell){

    return;

  }


  bell.classList.remove(
    "has-pending"
  );


  if(!canManage()){

    return;

  }


  try{

    const snapshot=
      await db
        .collection("pending_requests")
        .where(
          "status",
          "==",
          "pendiente"
        )
        .get();


    const pendingCount=
      snapshot.size;


    if(pendingCount>0){

      bell.classList.add(
        "has-pending"
      );


      bell.setAttribute(
        "aria-label",
        pendingCount +
        " solicitudes pendientes"
      );


      bell.title=
        pendingCount +
        " solicitudes pendientes";

    }

  }catch(error){

    console.error(
      "Error cargando pendientes:",
      error
    );

  }

}



function protectCurrentSession(){

  const email=
    getCurrentEmail();


  if(
    isLogged() &&
    isAgent(email)
  ){

    saveSession(

      email,

      "administrador",

      {
        canInvite:true
      },

      {
        artisticName:"Jesús"
      }

    );

  }

}



document.addEventListener(
  "keydown",
  event=>{

    if(
      event.key
      ===
      "Escape"
    ){

      closeDrawerDirect();

    }


    if(
      event.key
      ===
      "Enter"
      &&
      document
        .getElementById("loginScreen")
        ?.classList
        .contains("show")
    ){

      mainLoginAction();

    }

  }
);



document.addEventListener(
  "visibilitychange",
  ()=>{

    if(
      document.visibilityState
      ===
      "visible"
    ){

      protectCurrentSession();


      applyPermissions();


      loadPendingNotifications();

    }

  }
);



window.addEventListener(
  "pageshow",
  ()=>{

    protectCurrentSession();


    checkLogin();


    loadPendingNotifications();

  }
);



window.onload=
async function(){

  const params=
    new URLSearchParams(
      window.location.search
    );


  if(
    params.get("reset")
    ===
    "1"
  ){

    clearSession();


    window.history.replaceState(
      {},
      "",
      "index.html"
    );


    document
      .getElementById("loginScreen")
      .classList.add("show");


    backToLogin();


    return;

  }


  if(autoFillInviteCode()){

    return;

  }


  protectCurrentSession();


  checkLogin();


  await loadPendingNotifications();

};


</script>
