<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Emisoras - Agencia JM Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#020713;color:white}
:root{--blue:#168cff;--gold:#f7d774;--soft:#d9e5ff}
.topbar{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:#020713;border-bottom:2px solid var(--blue)}
.icon{width:52px;height:52px;border-radius:16px;border:1px solid var(--blue);background:#07162c;color:white;font-size:24px}
.title{text-align:center}
.title h1{font-size:24px;color:var(--gold)}
.title p{font-size:13px;color:var(--soft)}
.content{padding:16px;padding-bottom:90px}
.panel{background:rgba(3,8,18,.88);border:1px solid rgba(247,215,116,.35);border-radius:22px;padding:16px;margin-bottom:14px}
.panel h2{color:var(--gold);margin-bottom:8px}
.panel p{color:var(--soft)}
.card{display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,#102644,#030813);border:1px solid rgba(247,215,116,.35);border-radius:20px;padding:14px;margin-bottom:12px}
.avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--gold);background:#07162c;display:flex;align-items:center;justify-content:center;font-size:30px}
.info{flex:1}
.info h3{color:var(--gold);font-size:18px}
.info p{color:var(--soft);font-size:13px;margin-top:4px}
.badge{padding:7px 10px;border-radius:12px;background:#08264b;color:#7cffb2;font-size:12px;border:1px solid #168cff}
.empty{text-align:center;color:var(--soft);padding:30px}
</style>
</head>

<body>

<header class="topbar">
  <button class="icon" onclick="location.replace('index.html')">←</button>
  <div class="title">
    <h1>MIS EMISORAS</h1>
    <p>Perfiles registrados en la agencia</p>
  </div>
  <button class="icon" onclick="cargarEmisoras()">⟳</button>
</header>

<main class="content">
  <section class="panel">
    <h2>👥 Emisoras registradas</h2>
    <p>Aquí aparecerán automáticamente las personas que se registren en la aplicación.</p>
  </section>

  <div id="listaEmisoras" class="empty">Cargando emisoras...</div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",
  authDomain: "agencia-jm-elite.firebaseapp.com",
  projectId: "agencia-jm-elite",
  storageBucket: "agencia-jm-elite.firebasestorage.app",
  messagingSenderId: "171676205335",
  appId: "1:171676205335:web:95443528659ab804fe7752"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const lista = document.getElementById("listaEmisoras");

window.cargarEmisoras = async function(){
  lista.innerHTML = "Cargando emisoras...";

  try{
    const querySnapshot = await getDocs(collection(db, "usuarios"));

    if(querySnapshot.empty){
      lista.className = "empty";
      lista.innerHTML = "Todavía no hay emisoras registradas.";
      return;
    }

    lista.className = "";
    lista.innerHTML = "";

    querySnapshot.forEach((docu) => {
      const u = docu.data();

      const card = document.createElement("div");
      card.className = "card";
      card.onclick = function(){
  location.href = "perfil.html?id=" + docu.id;
};

      
        card.innerHTML = `
  <div class="avatar">
    ${u.fotoPerfil ? '<img src="' + u.fotoPerfil + '">' : '👤'}
  </div>

  <div class="info">
    <h3>${u.nombre || "Sin nombre"} ✅</h3>
    <p>🌍 ${u.pais || "País no indicado"}</p>
    <p>🆔 ID Poppo: ${u.poppoId || "—"}</p>
    <p>⭐ Nivel: ${u.nivel || "—"}</p>
  </div>

  <div class="badge">🟢 Activa</div>
`;
      `;

      lista.appendChild(card);
    });

  }catch(error){
    lista.className = "empty";
    lista.innerHTML = "Error cargando emisoras: " + error.message;
  }
};

onAuthStateChanged(auth, function(user){
  if(!user){
    location.replace("index.html");
    return;
  }

  cargarEmisoras();
});
</script>

</body>
</html>
