<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro | Agencia JM Elite</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020713;
color:white;
min-height:100vh;
background:
linear-gradient(rgba(2,7,19,.82),rgba(2,7,19,.92)),
url("agencia-jm-equipo-banner.png") center/cover no-repeat fixed;
}

.container{
max-width:430px;
margin:auto;
padding:22px 18px 40px;
}

.logo{
text-align:center;
margin:18px 0 26px;
}

.logo h1{
font-size:34px;
color:#f7d774;
}

.logo p{
margin-top:8px;
color:#dce8ff;
font-size:14px;
}

.card{
background:rgba(0,12,38,.82);
border:1px solid rgba(247,215,116,.30);
border-radius:26px;
padding:22px;
backdrop-filter:blur(14px);
box-shadow:0 0 30px rgba(0,140,255,.35);
}

.input{
margin-bottom:14px;
}

.input label{
display:block;
margin-bottom:6px;
font-size:13px;
color:#f7d774;
}

.input input{
width:100%;
height:48px;
border-radius:14px;
border:1px solid rgba(0,183,255,.35);
background:#08162f;
color:white;
padding:0 14px;
font-size:15px;
outline:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>JM Elite</h1>
<p>Solicitud de ingreso a la agencia</p>
</div>

<div class="card">
  <div class="input">
<label>📸 Foto de perfil</label>
<input type="file" accept="image/*">
</div>

<div class="input">
<label>🎤 Nombre artístico</label>
<input type="text" id="artisticName" placeholder="Nombre artístico">
</div>

<div class="input">
<label>👤 Nombre y apellidos</label>
<input type="text" id="fullName" placeholder="Nombre completo">
</div>

<div class="input">
<label>🌍 País</label>
<input type="text" id="country" placeholder="País">
</div>

<div class="input">
<label>📱 Teléfono</label>
<input type="tel" id="phone" placeholder="Teléfono">
</div>

<div class="input">
<label>📧 Correo electrónico</label>
<input type="email" id="email" placeholder="Correo electrónico">
</div>

<div class="input">
<label>🔒 Contraseña</label>
<input type="password" id="password" placeholder="Contraseña">
</div>

<div class="input">
<label>🔒 Confirmar contraseña</label>
<input type="password" id="password2" placeholder="Repetir contraseña">
</div>
<div class="input">
<label>🔑 Código de acceso a la agencia *</label>
<input type="text" id="agencyCode" placeholder="Código obligatorio">
</div>

<div class="input">
<label>🎁 Código de recomendación (opcional)</label>
<input type="text" id="inviteCode" placeholder="Si alguien te invitó, escríbelo aquí">
</div>

<div class="input">
<label>
<input type="checkbox" id="acceptRules">
Acepto las normas y la política de la Agencia JM Elite.
</label>
</div>

<button id="sendRequest" style="
width:100%;
height:52px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#d4a72d,#ffcf55);
color:#061326;
font-size:17px;
font-weight:900;
margin-top:18px;
cursor:pointer;
">
📨 Enviar solicitud
</button>

<p style="
margin-top:16px;
font-size:13px;
color:#dce8ff;
text-align:center;
">
Tu solicitud será revisada por un agente o una administradora antes de activar tu cuenta.
</p>
</div>

</div>

<script>

document.getElementById("sendRequest").addEventListener("click",function(){

const solicitud={

fecha:new Date().toLocaleString(),

nombreArtistico:document.getElementById("artisticName").value,

nombreCompleto:document.getElementById("fullName").value,

pais:document.getElementById("country").value,

telefono:document.getElementById("phone").value,

correo:document.getElementById("email").value,

contrasena:document.getElementById("password").value,

codigoAgencia:document.getElementById("agencyCode").value,

codigoRecomendacion:document.getElementById("inviteCode").value,

estado:"Pendiente de aprobación"

};

if(
!solicitud.nombreArtistico||
!solicitud.nombreCompleto||
!solicitud.correo||
!solicitud.contrasena||
!solicitud.codigoAgencia
){
alert("Completa todos los campos obligatorios.");
return;
}

if(!document.getElementById("acceptRules").checked){
alert("Debes aceptar las normas.");
return;
}

let solicitudes=JSON.parse(localStorage.getItem("jm_solicitudes"))||[];

solicitudes.push(solicitud);

localStorage.setItem("jm_solicitudes",JSON.stringify(solicitudes));

alert("✅ Solicitud enviada correctamente.\n\nUn agente o una administradora revisará tu solicitud.");

window.location.href="index.html";

});

</script>

</body>
  </html>
