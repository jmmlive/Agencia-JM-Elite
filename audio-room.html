<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Audio Room</title><style>
:root{--bg:#05030a;--panel:#120a1d;--panel2:#1a0e2a;--purple:#a62cff;--purple2:#6d19ef;--gold:#ffd21c;--white:#faf8ff;--muted:#aea6b9;--line:rgba(184,76,255,.28);--green:#2de789;--red:#ff4b62;--blue:#38bfff;--shadow:0 22px 65px rgba(0,0,0,.5)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;color:var(--white);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 50% -10%,rgba(113,31,255,.25),transparent 34%),linear-gradient(180deg,#08040f,#040208);overflow-x:hidden}button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}a{text-decoration:none;color:inherit}.app{width:min(100%,520px);min-height:100vh;margin:auto;padding-bottom:96px}.topbar{position:sticky;top:0;z-index:30;display:grid;grid-template-columns:46px 1fr 46px;align-items:center;gap:10px;padding:14px max(14px,env(safe-area-inset-right));padding-top:max(14px,env(safe-area-inset-top));background:rgba(5,3,10,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.icon{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:#170d25;color:#fff;border:1px solid var(--line)}.title{text-align:center}.title strong{display:block;font-size:18px}.title span{display:block;font-size:10px;color:var(--muted);margin-top:2px}main{padding:16px 14px 30px}.hero,.panel{border-radius:25px;border:1px solid var(--line);background:linear-gradient(145deg,#1a0c2a,#09050f);box-shadow:var(--shadow)}.hero{padding:22px 18px;background:radial-gradient(circle at 84% 20%,rgba(255,210,28,.15),transparent 30%),linear-gradient(145deg,#1d0c2e,#08040d)}.hero h1{margin:0 0 8px;font-size:29px;line-height:1}.hero p{margin:0;color:#d2cadb;font-size:13px;line-height:1.5}.grid{display:grid;gap:14px;margin-top:18px}.card{position:relative;overflow:hidden;min-height:190px;padding:18px;border-radius:25px;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:flex-end;box-shadow:var(--shadow)}.card.live{background:radial-gradient(circle at 80% 17%,rgba(222,59,255,.35),transparent 35%),linear-gradient(145deg,#250c36,#08040d)}.card.audio{background:radial-gradient(circle at 80% 17%,rgba(56,191,255,.28),transparent 35%),linear-gradient(145deg,#071d2e,#05080e)}.card.games{opacity:.82;background:radial-gradient(circle at 80% 17%,rgba(255,210,28,.2),transparent 35%),linear-gradient(145deg,#231800,#080603)}.badge{position:absolute;top:14px;left:14px;padding:6px 9px;border-radius:999px;font-size:9px;font-weight:950;border:1px solid currentColor;background:rgba(5,3,10,.75)}.live .badge{color:#e66bff}.audio .badge{color:#57caff}.games .badge{color:var(--gold)}.symbol{position:absolute;right:18px;top:16px;font-size:51px;font-weight:950;opacity:.14}.card h2{margin:0 0 6px;font-size:24px}.card p{margin:0 0 16px;max-width:82%;font-size:12px;line-height:1.45;color:#d0c8d9}.action{align-self:flex-start;padding:11px 16px;border-radius:14px;color:#fff;font-size:12px;font-weight:950;background:linear-gradient(90deg,var(--purple2),#c431ff)}.audio .action{background:linear-gradient(90deg,#09649d,#20acef)}.games .action{background:#ffe35b;color:#5d4a00}.section-title{margin:20px 0 10px;font-size:14px}.field{display:grid;gap:7px;margin-top:13px}.field label{font-size:11px;font-weight:850;color:#d7d0df}.field input,.field textarea,.field select{width:100%;border-radius:15px;border:1px solid var(--line);background:#0b0611;color:#fff;padding:13px 14px;outline:none}.field textarea{min-height:88px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:#bd4aff;box-shadow:0 0 0 3px rgba(189,74,255,.12)}.switch-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.06)}.switch-row strong{font-size:12px}.switch-row span{display:block;color:var(--muted);font-size:10px;margin-top:3px}.switch{width:48px;height:27px;border-radius:999px;background:#2a2031;padding:3px;transition:.2s}.switch i{display:block;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s}.switch.on{background:var(--purple)}.switch.on i{transform:translateX(21px)}.primary{width:100%;margin-top:16px;padding:14px;border-radius:16px;color:#fff;font-weight:950;background:linear-gradient(90deg,#711cff,#c532ff);box-shadow:0 0 26px rgba(178,45,255,.32)}.secondary{width:100%;margin-top:9px;padding:13px;border-radius:16px;color:#fff;font-weight:850;background:#1b1127;border:1px solid var(--line)}.cover{position:relative;height:230px;border-radius:22px;overflow:hidden;background:radial-gradient(circle at 50% 35%,#7f2cff,#2c103f 38%,#0a0510 75%);border:1px solid var(--line);display:grid;place-items:center}.cover img{width:100%;height:100%;object-fit:cover}.cover-placeholder{text-align:center;color:#d8d0df}.cover-placeholder b{display:block;font-size:32px}.cover-placeholder span{font-size:11px}.cover-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.cover-actions label,.cover-actions button{padding:11px;border-radius:14px;text-align:center;background:#1b1029;color:#fff;border:1px solid var(--line);font-size:11px;font-weight:850}.notice{margin-top:12px;padding:11px 12px;border-radius:14px;background:rgba(255,210,28,.08);border:1px solid rgba(255,210,28,.22);color:#eee0a6;font-size:10px;line-height:1.45}.bottom{position:fixed;z-index:35;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,520px);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px max(8px,env(safe-area-inset-bottom));background:rgba(10,6,16,.98);border-top:1px solid var(--line);border-radius:24px 24px 0 0}.nav{display:grid;justify-items:center;gap:4px;padding:7px 2px;background:transparent;color:#a69eaf;font-size:9px;font-weight:800}.nav svg{width:21px;height:21px}.nav.active{color:#fff}.nav.center{transform:translateY(-13px);width:60px;height:60px;border-radius:50%;justify-self:center;place-content:center;background:radial-gradient(circle at 35% 25%,#c34fff,#6115ef 58%,#25073d);border:2px solid #c64dff;box-shadow:0 0 26px rgba(166,42,255,.48)}.nav.center span{display:none}.toast{position:fixed;z-index:100;left:50%;bottom:105px;transform:translate(-50%,20px);opacity:0;pointer-events:none;transition:.2s;width:min(calc(100% - 28px),480px);padding:12px 14px;border-radius:15px;background:#1a1026;border:1px solid var(--line);font-size:12px;font-weight:850}.toast.show{opacity:1;transform:translate(-50%,0)}
.room{padding:84px 14px 115px;min-height:100vh}.room-head{position:fixed;z-index:20;top:0;left:50%;transform:translateX(-50%);width:min(100%,520px);display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:14px;background:rgba(5,3,10,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}.room-head h1{margin:0;text-align:center;font-size:17px}.room-head p{margin:3px 0 0;text-align:center;font-size:9px;color:var(--muted)}.host{display:grid;justify-items:center;margin:5px 0 20px}.host b{width:78px;height:78px;border-radius:50%;display:grid;place-items:center;font-size:29px;background:linear-gradient(145deg,#9135ff,#261038);border:3px solid var(--gold)}.host strong{margin-top:7px}.host span{font-size:9px;color:var(--gold)}.seats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px 9px}.seat{position:relative;display:grid;justify-items:center;gap:5px;background:transparent;color:#fff}.seat b{width:55px;height:55px;border-radius:50%;display:grid;place-items:center;background:#170d22;border:2px dashed #6d6377}.seat.occupied b{background:linear-gradient(145deg,#7d2ae8,#251035);border-style:solid;border-color:#bd51ff}.seat small{font-size:8px;color:#c9c2d2}.lamp{position:absolute;z-index:2;right:7px;top:2px;width:10px;height:10px;border-radius:50%;background:transparent}.lamp.green{background:var(--green);box-shadow:0 0 8px var(--green)}.lamp.red{background:var(--red);box-shadow:0 0 8px var(--red)}.room-chat{margin-top:20px;padding:13px;border-radius:20px;background:#0d0714;border:1px solid var(--line);display:grid;gap:8px}.room-chat div{font-size:10px}.controls{position:fixed;z-index:20;bottom:0;left:50%;transform:translateX(-50%);width:min(100%,520px);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px 9px max(10px,env(safe-area-inset-bottom));background:rgba(7,4,12,.97);border-top:1px solid var(--line)}.control{height:48px;border-radius:16px;background:#1b1027;color:#fff;border:1px solid var(--line)}.control.main{background:linear-gradient(145deg,#7620ff,#c833ff)}.seat-panel{position:fixed;z-index:40;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:min(100%,520px);padding:18px 14px 25px;border-radius:26px 26px 0 0;background:#140b1d;border:1px solid var(--line);transition:.22s}.seat-panel.show{transform:translateX(-50%) translateY(0)}.seat-panel h3{margin:0 0 10px}.seat-panel button{width:100%;padding:12px;border-radius:13px;background:#231432;color:#fff;margin-top:8px;text-align:left}.seat-panel .danger{color:#ff667b}.summary{position:fixed;z-index:50;inset:0;background:rgba(0,0,0,.75);display:none;place-items:end center}.summary.show{display:grid}.sheet{width:min(100%,520px);padding:20px 15px 25px;border-radius:28px 28px 0 0;background:#110918;border:1px solid var(--line)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}.stat{padding:12px;border-radius:15px;background:#190f23}.stat b{display:block}.stat span{font-size:9px;color:var(--muted)}
</style></head><body><header class="room-head"><button class="icon" onclick="location.href='index.html'">⌂</button><div><h1 id="roomTitle">Audio Room</h1><p id="roomSeats">Sala solo de audio</p></div><button class="icon" onclick="showToast('Opciones de sala')">⋮</button></header><main class="room"><div class="host"><b>J</b><strong>Jesús</strong><span>ANFITRIÓN</span></div><section class="seats"><button class="seat occupied" onclick="seatMenu(1)"><span class="lamp green"></span><b>J</b><small>Jesús</small></button><button class="seat occupied" onclick="seatMenu(2)"><span class="lamp green"></span><b>R</b><small>Ruth</small></button><button class="seat occupied" onclick="seatMenu(3)"><span class="lamp green"></span><b>Y</b><small>Yandira</small></button><button class="seat occupied" onclick="seatMenu(4)"><span class="lamp red"></span><b>A</b><small>Ana</small></button><button class="seat " onclick="seatMenu(5)"><span class="lamp "></span><b>+</b><small>Silla 5</small></button><button class="seat " onclick="seatMenu(6)"><span class="lamp "></span><b>+</b><small>Silla 6</small></button><button class="seat " onclick="seatMenu(7)"><span class="lamp "></span><b>+</b><small>Silla 7</small></button><button class="seat " onclick="seatMenu(8)"><span class="lamp "></span><b>+</b><small>Silla 8</small></button><button class="seat " onclick="seatMenu(9)"><span class="lamp "></span><b>+</b><small>Silla 9</small></button><button class="seat " onclick="seatMenu(10)"><span class="lamp "></span><b>+</b><small>Silla 10</small></button><button class="seat " onclick="seatMenu(11)"><span class="lamp "></span><b>+</b><small>Silla 11</small></button><button class="seat " onclick="seatMenu(12)"><span class="lamp "></span><b>+</b><small>Silla 12</small></button><button class="seat " onclick="seatMenu(13)"><span class="lamp "></span><b>+</b><small>Silla 13</small></button><button class="seat " onclick="seatMenu(14)"><span class="lamp "></span><b>+</b><small>Silla 14</small></button><button class="seat " onclick="seatMenu(15)"><span class="lamp "></span><b>+</b><small>Silla 15</small></button><button class="seat " onclick="seatMenu(16)"><span class="lamp "></span><b>+</b><small>Silla 16</small></button></section><section class="room-chat"><div><b style="color:#e66bff">Ruth:</b> Buenas noches.</div><div><b style="color:#ffd21c">Jesús:</b> Comenzamos la sala.</div></section></main><nav class="controls"><button class="control" onclick="showToast('Micrófono')">🎙</button><button class="control" onclick="showToast('Altavoz')">🔊</button><button class="control main" onclick="showToast('Solicitudes de silla')">✋</button><button class="control" onclick="showToast('Regalos')">🎁</button><button class="control" onclick="endRoom()">■</button></nav><section class="seat-panel" id="seatPanel"><h3 id="seatTitle">Control de persona</h3><button onclick="showToast('Persona bajada de la silla')">Bajar de la silla</button><button onclick="showToast('Persona silenciada')">Silenciar</button><button onclick="showToast('Administración concedida')">Poner administradora</button><button class="danger" onclick="showToast('Expulsada durante 20 minutos')">Expulsar · 20 minutos</button><button onclick="document.getElementById('seatPanel').classList.remove('show')">Cerrar</button></section><div class="toast" id="toast"></div><div class="summary" id="summary"><div class="sheet"><h2>Resumen de Audio Room</h2><div class="stats"><div class="stat"><b id="duration">00:00</b><span>Duración</span></div><div class="stat"><b>328</b><span>Oyentes</span></div><div class="stat"><b>14</b><span>Personas en silla</span></div><div class="stat"><b>9</b><span>Tareas completadas</span></div><div class="stat"><b>5.820</b><span>Regalos</span></div><div class="stat"><b>3</b><span>Pendientes</span></div></div><button class="primary" onclick="location.href='index.html'">Volver al Inicio</button><button class="secondary" onclick="location.href='salas.html'">Volver a Salas</button></div></div><script>let sec=0,toastTimer;setInterval(()=>sec++,1000);const cfg=JSON.parse(localStorage.getItem('jemmoAudioConfig')||'{}');if(cfg.title)document.getElementById('roomTitle').textContent=cfg.title;if(cfg.seats)document.getElementById('roomSeats').textContent=cfg.seats+' sillas · solo audio';function showToast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),2300)}function seatMenu(i){document.getElementById('seatTitle').textContent='Control de silla '+i;document.getElementById('seatPanel').classList.add('show')}function endRoom(){const m=String(Math.floor(sec/60)).padStart(2,'0'),s=String(sec%60).padStart(2,'0');document.getElementById('duration').textContent=m+':'+s;document.getElementById('summary').classList.add('show')}</script></body></html>
