function mostrarFotos(){

  const previewPerfil=
    document.getElementById(

  const avatarFallback=

    previewPortada.src=

}


async function subirImagen(
  archivo,
  tipo
){

  if(!archivo){
    return;
  }


  if(
    !archivo.type ||
    !archivo.type.startsWith("image/")
  ){

    alert(
      "Selecciona una imagen válida."
    );

    return;
  }


  if(
    archivo.size >
    5 * 1024 * 1024
  ){

    alert(
      "La imagen es demasiado grande. Máximo 5 MB."
    );

    return;
  }


  if(!usuarioActualId){

    alert(
      "No se encontró el perfil."
    );

    return;
  }


  try{

    estadoSubida(
      "📤 Subiendo imagen...",
      true
    );


    const extension=(
      archivo.name
      .split(".")
      .pop() ||
      "jpg"
    ).toLowerCase();


    const ruta=
      "perfiles/"+
      usuarioActualId+
      "/"+
      tipo+
      "."+
      extension;


    const archivoRef=
      ref(
        storage,
        ruta
      );


    await uploadBytes(
      archivoRef,
      archivo,
      {
        contentType:archivo.type
      }
    );


    const url=
      await getDownloadURL(
        archivoRef
      );


    if(tipo === "perfil"){

      fotoPerfilActual=url;

    }else{

      fotoPortadaActual=url;
    }


    mostrarFotos();


    estadoSubida(
      "✅ Imagen subida correctamente"
    );


    setTimeout(function(){

      estadoSubida("");

    },2500);


  }catch(error){

    console.error(error);


    estadoSubida("");


    alert(
      "Error al subir la imagen: "+
      error.message
    );
  }
}


function configurarSubidaImagenes(){

  const archivoPerfil=
    document.getElementById(
      "archivoPerfil"
    );

  const archivoPortada=
    document.getElementById(
      "archivoPortada"

  archivoPerfil.onchange=
    async function(){

      const archivo=
        this.files[0];

      await subirImagen(
        archivo,
        "perfil"
      );

      this.value="";
    };


  archivoPortada.onchange=
    async function(){

      const archivo=
        this.files[0];

      await subirImagen(
        archivo,
        "portada"
      );

      this.value="";
    };
}

    async function buscarMiDocumento(){

  if(!emailActual){
    return null;
  }

  const consulta=query(
    collection(db,"usuarios"),
    where("email","==",emailActual)
  );

  const snap=await getDocs(consulta);

  if(snap.empty){
    return null;
  }

  return snap.docs[0];
}


async function cargarDatos(){

  if(
    localStorage.getItem("jm_logged")
    !==
    "yes"
  ){

    location.replace("index.html");

    return;
  }

  try{

    miDocumento=
      await buscarMiDocumento();

    if(!miDocumento){

      contenido.innerHTML=
        '<div class="loading">No se encontró tu cuenta.</div>';

      return;
    }


    const misDatos=
      miDocumento.data();


    const miRol=(
      misDatos.role ||
      misDatos.rol ||
      ""
    ).toLowerCase();


    if(perfilSolicitado){

      const refSolicitada=
        doc(
          db,
          "usuarios",
          perfilSolicitado
        );


      const snapSolicitada=
        await getDoc(
          refSolicitada
        );


      if(!snapSolicitada.exists()){

        contenido.innerHTML=
          '<div class="loading">No se encontró este perfil.</div>';

        return;
      }


      const perfilAjeno=
        perfilSolicitado !==
        miDocumento.id;


      if(
        perfilAjeno &&
        miRol !== "administrador" &&
        miRol !== "agente"
      ){

        alert(
          "No tienes permiso para editar este perfil."
        );


        location.href=
          "perfil.html";


        return;
      }


      usuarioActualId=
        perfilSolicitado;


      usuarioActual=
        snapSolicitada.data();

    }else{

      usuarioActualId=
        miDocumento.id;


      usuarioActual=
        misDatos;
    }


    fotoPerfilActual=
      usuarioActual.fotoPerfil ||
      usuarioActual.photoURL ||
      "";


    fotoPortadaActual=
      usuarioActual.fotoPortada ||
      usuarioActual.coverURL ||
      "";


    mostrarFotos();


    pintarFormulario(
      usuarioActual
    );


  }catch(error){

    console.error(error);


    contenido.innerHTML=
      '<div class="loading">Error cargando perfil: '+
      error.message+
      '</div>';
  }
}


window.guardarPerfil=
async function(){

  if(!usuarioActualId){

    alert(
      "No se encontró el perfil."
    );

    return;
  }


  const aceptaNormas=
    document.getElementById(
      "aceptaNormas"
    );


  if(
    !aceptaNormas ||
    !aceptaNormas.checked
  ){

    alert(
      "Debes aceptar las normas de la agencia."
    );

    return;
  }


  const nombre=
    valor("nombre");


  const pais=
    valor("pais");


  const nivel=
    valor("nivel");


  if(!nombre){

    alert(
      "Pon tu nombre visible."
    );

    return;
  }


  const guardarBtn=
    document.getElementById(
      "guardarBtn"
    );


  try{

    if(guardarBtn){

      guardarBtn.disabled=true;

      guardarBtn.textContent=
        "Guardando...";
    }


    const refUsuario=
      doc(
        db,
        "usuarios",
        usuarioActualId
      );


    await setDoc(
      refUsuario,
      {

        nombre:nombre,

        nombreArtistico:nombre,

        artisticName:nombre,


        pais:pais,

        country:pais,


        poppoId:
          valor("poppoId"),


        fechaInicioPoppo:
          valor("fechaInicioPoppo"),


        nivel:nivel,

        level:nivel,


        edad:
          valor("edad"),


        genero:
          valor("genero"),


        descripcion:
          valor("descripcion"),


        seguidores:
          valor("seguidores"),


        diamantes:
          valor("diamantes"),


        vip:
          valor("vip"),


        star:
          valor("star"),


        fan:
          valor("fan"),


        fotoPerfil:
          fotoPerfilActual,


        fotoPortada:
          fotoPortadaActual,


        whatsapp:
          valor("whatsapp"),


        instagram:
          valor("instagram"),


        tiktok:
          valor("tiktok"),


        facebook:
          valor("facebook"),


        aceptaNormas:true,

        estadoRevision:
          "pendiente",


        actualizado:
          serverTimestamp()

      },
      {
        merge:true
      }
    );


    alert(
      "✅ Perfil guardado correctamente."
    );


    location.href=
      "perfil.html?id="+
      usuarioActualId;


  }catch(error){

    console.error(error);


    alert(
      "Error al guardar: "+
      error.message
    );


    if(guardarBtn){

      guardarBtn.disabled=false;

      guardarBtn.textContent=
        "Guardar perfil";
    }
  }
};


cargarDatos();

</script>
