<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración | JM Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#020713;color:white;min-height:100vh;padding:16px}
a{text-decoration:none;color:inherit}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.header h1{color:#f7d774;font-size:26px}
.btn{border:0;border-radius:14px;padding:12px 14px;font-weight:bold;cursor:pointer}
.back{background:#082554;color:white;border:1px solid #00b7ff}
.card{background:rgba(0,20,60,.78);border:1px solid rgba(0,183,255,.35);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 0 18px rgba(0,140,255,.18)}
.card h2{color:#f7d774;margin-bottom:10px}
.info{color:#dce8ff;font-size:14px;line-height:1.6}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.approve{background:linear-gradient(135deg,#00c853,#64ff8f);color:#03130a}
.reject{background:linear-gradient(135deg,#c62828,#ff6b6b);color:white}
.empty{text-align:center;color:#dce8ff;padding:30px 10px}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#3b2d00;color:#f7d774;font-size:12px;margin-top:6px}
</style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="header">
  <h1>👑 Panel de Administración</h1>
  <a class="btn back" href="index.html">Volver</a>
</div>
<div class="card">
<h2>👑 Centro de Control</h2>

<div class="actions">
<button class="btn back" onclick="location.href='emisoras.html'">👥 Emisoras</button>

<button class="btn back" onclick="location.href='invitaciones.html'">📩 Invitaciones</button>

<button class="btn back" onclick="location.href='pagos.html'">💰 Pagos</button>

<button class="btn back" onclick="location.href='ranking.html'">🏆 Ranking</button>

<button class="btn back" onclick="location.href='avisos.html'">📢 Avisos</button>

<button class="btn back" onclick="location.href='academia.html'">🎓 Academia</button>

<button class="btn back" onclick="location.href='configuracion.html'">⚙️ Configuración</button>

<button class="btn reject" onclick="borrarPruebas()">🧪 Laboratorio</button>
</div>
</div>

<div class="card">
<h2>📋 Solicitudes pendientes</h2>
<div id="requestsBox"></div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyBSGaEv1sLmfLDKMNLtlUMRcxBPTASF_AQ",
  authDomain:"agencia-jm-elite.firebaseapp.com",
  projectId:"agencia-jm-elite",
  storageBucket:"agencia-jm-elite.firebasestorage.app",
  messagingSenderId:"171676205335",
  appId:"1:171676205335:web:95443528659ab804fe7752"
};

if(!firebase.apps.length){
  firebase.initializeApp(firebaseConfig);
}

const db=firebase.firestore();

const usuario=JSON.parse(localStorage.getItem("jm_user") || "{}");

if(usuario.rol!=="administrador"){
  alert("Acceso denegado.");
  location.href="index.html";
}

function loadRequests(){

  const box=document.getElementById("requestsBox");

  db.collection("pending_requests")
  .where("status","==","pendiente")
  .onSnapshot(snapshot=>{

    box.innerHTML="";

    const botonInvitaciones=document.querySelector(
      'button[onclick*="invitaciones.html"]'
    );

    if(botonInvitaciones){
      botonInvitaciones.innerHTML=
      "📩 Invitaciones" +
      (snapshot.size>0 ? " 🔴 " + snapshot.size : "");
    }

    if(snapshot.empty){
      box.innerHTML=
      '<div class="empty">No hay solicitudes pendientes.</div>';
      return;
    }

    snapshot.forEach(doc=>{

      const s=doc.data();

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <h2>👤 ${s.artisticName || "Sin nombre"}</h2>

        <div class="info">
          <b>País:</b> ${s.country || "-"}<br>
          <b>Correo:</b> ${s.email || "-"}<br>
          <b>Código invitación:</b> ${s.invitationCode || "Sin código"}<br>
          <b>Invitada por:</b> ${s.invitedBy || "Nadie"}<br>
          <b>Fecha:</b> ${s.date || "-"}<br>

          <span class="badge">⏳ Pendiente</span>
        </div>

        <div class="actions">
          <button class="btn approve"
          onclick="approveRequest('${doc.id}')">
          ✅ Aprobar
          </button>

          <button class="btn reject"
          onclick="rejectRequest('${doc.id}')">
          ❌ Rechazar
          </button>
        </div>
      `;

      box.appendChild(div);

    });

  },error=>{
    box.innerHTML=
    '<div class="empty">Error al cargar solicitudes.</div>';

    alert("Error: "+error.message);
  });
}

function approveRequest(id){

  db.collection("pending_requests").doc(id).get()
  .then(doc=>{

    if(!doc.exists){
      alert("No se encontró la solicitud.");
      return;
    }

    const s=doc.data();

    return db.collection("usuarios").add({
      id:s.id || "JM-"+Date.now(),
      email:s.email || "",
      password:s.password || "",
      artisticName:s.artisticName || "",
      country:s.country || "",
      invitationCode:s.invitationCode || "",
      invitedBy:s.invitedBy || "",
      registerType:s.registerType || "",
      appStartDate:s.appStartDate || new Date().toISOString(),
      appDay:s.appDay || 1,
      level:s.level || 1,
      badge:s.badge || "Nueva",
      status:"activa",
      role:"emisora",
      approvedAt:new Date().toLocaleString()
    }).then(()=>{
      return db.collection("pending_requests").doc(id).delete();
    });

  })
  .then(()=>{
    alert("✅ Solicitud aprobada. La emisora ya está activa.");
  })
  .catch(error=>{
    alert("Error al aprobar: "+error.message);
  });
}

function rejectRequest(id){

  if(!confirm("¿Rechazar esta solicitud?")){
    return;
  }

  db.collection("pending_requests").doc(id).delete()
  .then(()=>{
    alert("❌ Solicitud rechazada.");
  })
  .catch(error=>{
    alert("Error al rechazar: "+error.message);
  });
}

async function borrarPruebas(){

  if(!confirm("¿Eliminar los registros de prueba?")){
    return;
  }

  try{

    const pendientes=await db.collection("pending_requests").get();

    for(const doc of pendientes.docs){

      const u=doc.data();

      const texto=(
        (u.artisticName || "")+" "+
        (u.email || "")
      ).toLowerCase();

      if(
        texto.includes("prueba") ||
        texto.includes("test") ||
        texto.includes("demo")
      ){
        await doc.ref.delete();
      }
    }

    const usuarios=await db.collection("usuarios").get();

    for(const doc of usuarios.docs){

      const u=doc.data();

      const texto=(
        (u.artisticName || "")+" "+
        (u.email || "")
      ).toLowerCase();

      if(
        texto.includes("prueba") ||
        texto.includes("test") ||
        texto.includes("demo")
      ){
        await doc.ref.delete();
      }
    }

    alert("🗑️ Registros de prueba eliminados.");

  }catch(error){
    alert("Error en laboratorio: "+error.message);
  }
}

loadRequests();
</script>
</body>
</html>
