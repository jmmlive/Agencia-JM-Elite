<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Agente | JM Elite</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#020713;color:white;min-height:100vh;padding:16px}
a{text-decoration:none;color:inherit}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.header h1{color:#f7d774;font-size:26px}
.btn{border:0;border-radius:14px;padding:12px 14px;font-weight:bold;cursor:pointer}
.back{background:#082554;color:white;border:1px solid #00b7ff}
.card{background:rgba(0,20,60,.78);border:1px solid rgba(0,183,255,.35);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 0 18px rgba(0,140,255,.18)}
.card h2{color:#f7d774;margin-bottom:10px}
.info{color:#dce8ff;font-size:14px;line-height:1.6}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.approve{background:linear-gradient(135deg,#00c853,#64ff8f);color:#03130a}
.reject{background:linear-gradient(135deg,#c62828,#ff6b6b);color:white}
.empty{text-align:center;color:#dce8ff;padding:30px 10px}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#3b2d00;color:#f7d774;font-size:12px;margin-top:6px}
</style>
</head>

<body>

<div class="header">
  <h1>👑 Panel de Agente</h1>
  <a class="btn back" href="index.html">Volver</a>
</div>

<div class="card">
  <h2>📋 Solicitudes pendientes</h2>
  <div id="requestsBox"></div>
</div>

<script>
function loadRequests(){
  const box=document.getElementById("requestsBox");
  const solicitudes=JSON.parse(localStorage.getItem("jm_solicitudes")) || [];

  const pendientes=solicitudes.filter(s=>s.estado==="Pendiente de aprobación");

  if(pendientes.length===0){
    box.innerHTML='<div class="empty">No hay solicitudes pendientes.</div>';
    return;
  }

  box.innerHTML="";

  pendientes.forEach((s,index)=>{
    const realIndex=solicitudes.indexOf(s);

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h2>👤 ${s.nombreArtistico || "Sin nombre"}</h2>
      <div class="info">
        <b>Nombre completo:</b> ${s.nombreCompleto || "-"}<br>
        <b>País:</b> ${s.pais || "-"}<br>
        <b>Teléfono:</b> ${s.telefono || "-"}<br>
        <b>Correo:</b> ${s.correo || "-"}<br>
        <b>Código agencia:</b> ${s.codigoAgencia || "-"}<br>
        <b>Código recomendación:</b> ${s.codigoRecomendacion || "Sin recomendación"}<br>
        <b>Fecha:</b> ${s.fecha || "-"}<br>
        <span class="badge">⏳ Pendiente</span>
      </div>

      <div class="actions">
        <button class="btn approve" onclick="approveRequest(${realIndex})">✅ Aprobar</button>
        <button class="btn reject" onclick="rejectRequest(${realIndex})">❌ Rechazar</button>
      </div>
    `;
    box.appendChild(div);
  });
}

function approveRequest(i){
  let solicitudes=JSON.parse(localStorage.getItem("jm_solicitudes")) || [];
  let aprobados=JSON.parse(localStorage.getItem("jm_approved_users")) || [];

  solicitudes[i].estado="Aprobada";
  solicitudes[i].aprobadaEn=new Date().toLocaleString();

  aprobados.push(solicitudes[i]);

  localStorage.setItem("jm_solicitudes",JSON.stringify(solicitudes));
  localStorage.setItem("jm_approved_users",JSON.stringify(aprobados));

  alert("✅ Solicitud aprobada.");
  loadRequests();
}

function rejectRequest(i){
  let solicitudes=JSON.parse(localStorage.getItem("jm_solicitudes")) || [];

  solicitudes[i].estado="Rechazada";
  solicitudes[i].rechazadaEn=new Date().toLocaleString();

  localStorage.setItem("jm_solicitudes",JSON.stringify(solicitudes));

  alert("❌ Solicitud rechazada.");
  loadRequests();
}

loadRequests();
</script>

</body>
</html>
